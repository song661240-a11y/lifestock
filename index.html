                        setAuthError(null);

                        setAuthError("Firebase 連線異常，請確認控制台已開啟匿名登入。"); 
                    } 
                }; 
                const unsub = auth.onAuthStateChanged(usr => { 
                    if(usr) setUser(usr); 
                    else initAuth(); 
                }); 
                return () => unsub();
            }, []);

            const handleGoogleLogin = async () => {
                try {
                    const provider = new firebase.auth.GoogleAuthProvider();
                    if (auth.currentUser && auth.currentUser.isAnonymous) {
                        try { 
                            await auth.currentUser.linkWithPopup(provider); 
                            showToast("成功綁定 Google 帳號！"); 
                        } catch (e) { 
                            if (e.code === 'auth/credential-already-in-use') { 
                                await auth.signInWithCredential(e.credential); 
                                showToast("已載入現有雲端資料。"); 
                            } else {
                                throw e; 
                            }
                        }
                    } else { 
                        await auth.signInWithPopup(provider); 
                        showToast("Google 登入成功！"); 
                    }
                    setAuthError(null);
                } catch (e) { 
                    setAuthError(e.message); 
                }
            };

            const handleLogout = async () => { 
                await auth.signOut(); 
                showToast("已登出帳號，切換為訪客模式。"); 
                setView('dashboard');
            };

            const getFirebaseRefs = () => {
                if (!user) return null;
                return { 
                    confRef: db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('config').doc('current'), 
                    recsRef: db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('trading_records') 
                };
            };
            
            useEffect(() => { 
                const refs = getFirebaseRefs(); 
                if (!refs) return;
                
                setIsSwitching(true);
                
                const unsubRecs = refs.recsRef.onSnapshot(
                    s => {
                        if (s && s.docs) {
                            setRecords(s.docs.map(d => ({id: d.id, ...d.data()})));
                        }
                    }, 
                    e => setAuthError("資料庫權限不足。")
                ); 
                
                const unsubConf = refs.confRef.onSnapshot(s => { 
                    if (s.exists) { 
                        const d = s.data() || {}; 
                        setInputs(p => ({ 
                            ...p, 
                            ...d, 
                            satellites: getArr(d.satellites).length > 0 ? getArr(d.satellites) : defSats, 
                            core_ladder: getArr(d.core_ladder).length > 0 ? getArr(d.core_ladder) : defLad, 
                            core_up_ladder: getArr(d.core_up_ladder).length > 0 ? getArr(d.core_up_ladder) : defUpLad, 
                            reserve_pct_normal: d.reserve_pct_normal !== undefined ? d.reserve_pct_normal : defInputs.reserve_pct_normal,
                            reserve_pct_ath: d.reserve_pct_ath !== undefined ? d.reserve_pct_ath : defInputs.reserve_pct_ath,
                            qty_boxx: d.qty_boxx !== undefined ? d.qty_boxx : (d.qty_sgov || 0) 
                        })); 
                    }
                    setIsSwitching(false); 
                }, () => setIsSwitching(false)); 
                
                return () => { unsubRecs(); unsubConf(); };
            }, [user]);

            // --- API 流量防護鎖 (Debounce) ---
            const symbolsString = useMemo(() => {
                let syms = ['QQQ', 'TQQQ', 'BOXX'];
                getArr(inputs.satellites).forEach(s => { 
                    if(s && s.underlying) syms.push(s.underlying.trim().toUpperCase()); 
                    if(s && s.leveraged) syms.push(s.leveraged.trim().toUpperCase()); 
                });
                return [...new Set(syms.filter(Boolean))].sort().join(',');
            }, [inputs.satellites]);

            const [debouncedSymbols, setDebouncedSymbols] = useState(symbolsString);
            useEffect(() => {
                const timer = setTimeout(() => setDebouncedSymbols(symbolsString), 800);
                return () => clearTimeout(timer);
            }, [symbolsString]);

            const fetchPrices = useCallback(async (force = false) => { 
                const targetSyms = force ? symbolsString : debouncedSymbols;
                if (!targetSyms || loadingPrices) return;
                const symsArray = targetSyms.split(',').filter(Boolean); 
                if (!symsArray.length) return;
                
                setLoadingPrices(true); 
                try { 
                    const res = await Promise.allSettled(symsArray.map(s => fetch(`https://finnhub.io/api/v1/quote?symbol=${s}&token=${FINNHUB_KEY}`).then(r => r.json()).then(d => ({s, p: d.c})))); 
                    setPrices(p => ({
                        ...p, 
                        ...res.reduce((acc, c) => (c.status === 'fulfilled' && c.value.p > 0 ? {...acc, [c.value.s]: c.value.p} : acc), {})
                    })); 
                } catch(e) {} finally { 
                    setLoadingPrices(false); 
                } 
            }, [debouncedSymbols, symbolsString, loadingPrices]);

            useEffect(() => { 
                if(debouncedSymbols) fetchPrices(); 
            }, [debouncedSymbols]);

            const showToast = (txt) => { setMessage(txt); setTimeout(() => setMessage(null), 3000); };
            const handleInput = (f, v) => setInputs(p => ({ ...p, [f]: v }));
            
            const syncToCloud = async (f, v) => { 
                const refs = getFirebaseRefs(); 
                if (refs) await refs.confRef.set({ [f]: sanitize(v) }, { merge: true }); 
            };

            const updateArr = (arr, id, field, value) => {
                setInputs(p => {
                    const currentArr = getArr(p[arr]);
                    const newArr = currentArr.map(i => i.id === id ? { ...i, [field]: value } : i);
                    return { ...p, [arr]: newArr };
                });
            };
            
            const removeArr = (arr, id) => { 
                const newArr = getArr(inputs[arr]).filter(i => i.id !== id); 
                setInputs(p => ({ ...p, [arr]: newArr })); 
                syncToCloud(arr, newArr); 
                showToast("已刪除"); 
            };
            
            const addArr = (arr, def) => { 
                const newArr = [...getArr(inputs[arr]), { id: Date.now().toString(), ...def }]; 
                setInputs(p => ({ ...p, [arr]: newArr })); 
                syncToCloud(arr, newArr); 
                showToast("已新增"); 
            };

            const saveRecord = async () => { 
                const refs = getFirebaseRefs(); 
                if (!refs) return;
                if (isSaving) return; 
                
                setIsSaving(true); 
                try { 
                    const cln = sanitize(inputs); 
                    await refs.recsRef.add({ 
                        date: new Date(recordDate).toISOString(), 
                        total_equity: metrics.totalCapital || 0, 
                        prices: sanitize(prices), 
                        inputs: cln 
                    }); 
                    await refs.confRef.set(cln, { merge: true }); 
                    showToast("紀錄已儲存"); 
                } catch(e) {} 
                setIsSaving(false); 
            };
            
            const deleteRecord = async () => { 
                const refs = getFirebaseRefs(); 
                if (!refs || !modal.data) return; 
                await refs.recsRef.doc(modal.data.id).delete(); 
                showToast("紀錄已刪除"); 
                setModal({type: null}); 
            };
            
            const editRecord = async () => { 
                const refs = getFirebaseRefs(); 
                if (!refs || !modal.data) return; 
                const u = {}; 
                if (modal.temp.date) u.date = modal.temp.date; 
                if (modal.temp.equity) u.total_equity = parseFloat(modal.temp.equity); 
                if (Object.keys(u).length) { 
                    await refs.recsRef.doc(modal.data.id).update(u); 
                    showToast("紀錄已更新"); 
                } 
                setModal({type: null}); 
            };
            
            // --- 核心運算引擎 V_Final ---
            const metrics = useMemo(() => {
                const getP = (t) => prices[String(t || "").trim().toUpperCase()] || 0;
                const getV = (k) => getNum(inputs[k]);
                
                const pQQQ = getP('QQQ'); 
                const pTQQQ = getP('TQQQ'); 
                const pBOXX = getP('BOXX') || 100; 
                
                const calcAsset = (type, qty, price, optVal, optLevRatio, multiplier = 1) => {
                    if (type === 'option') return { val: getNum(optVal), exp: getNum(optVal) * getNum(optLevRatio) };
                    return { val: getNum(qty) * price, exp: getNum(qty) * price * multiplier };
                };

                const c1 = calcAsset(inputs.core_1_type, getV('qty_core_1'), pQQQ, getV('opt_p_c1'), getV('opt_d_c1'), 1);
                const c2 = calcAsset(inputs.core_2_type, getV('qty_core_2'), pTQQQ, getV('opt_p_c2'), getV('opt_d_c2'), 3); 
                
                const valCore1 = c1.val; 
                const valCore2 = c2.val; 
                const vBOXX = pBOXX * getV('qty_boxx'); 
                const cash = getV('cash_balance');
                
                let vSatU = 0, vSatL = 0, vSatC = 0, expSat = 0;
                
                const colors = [
                    {u:'#3b82f6', l:'#93c5fd', c:'#1d4ed8'}, // Blue
                    {u:'#10b981', l:'#6ee7b7', c:'#047857'}, // Emerald
                    {u:'#f59e0b', l:'#fcd34d', c:'#b45309'}, // Amber
                    {u:'#8b5cf6', l:'#c4b5fd', c:'#6d28d9'}  // Violet
                ];
                
                const pieData = [];
                if (valCore1 > 0) pieData.push({ name: inputs.core_1_type==='option'?'QQQ Call':'QQQ', value: valCore1, exposure: c1.exp, fill: '#1e293b' });
                if (valCore2 > 0) pieData.push({ name: inputs.core_2_type==='option'?'Leveraged Call':'TQQQ', value: valCore2, exposure: c2.exp, fill: '#64748b' });

                const safeSatellites = getArr(inputs.satellites);
                const safeLadder = getArr(inputs.core_ladder).sort((a,b) => getNum(a.drop_pct) - getNum(b.drop_pct));
                const safeUpLadder = getArr(inputs.core_up_ladder).sort((a,b) => getNum(a.rise_pct) - getNum(b.rise_pct));

                // 第一遍：算出總市值
                safeSatellites.forEach(s => { 
                    if (s) {
                        vSatU += getP(s.underlying) * getNum(s.qty_u); 
                        vSatL += getP(s.leveraged) * getNum(s.qty_l); 
                        vSatC += getNum(s.opt_p_c); 
                    }
                });
                
                const tRes = cash + vBOXX; 
                const tCore = valCore1 + valCore2;
                const tCap = tRes + tCore + vSatU + vSatL + vSatC;
                const safeT = tCap > 0 ? tCap : 1;
                const boxxPct = (vBOXX / safeT) * 100;
                const isBoxxFrozen = boxxPct < 3; // 末日凍結防線

                // 第二遍：衛星策略計算
                const mappedSatStats = safeSatellites.map((s, i) => {
                    const uP = getP(s.underlying); 
                    const lP = getP(s.leveraged);  
                    
                    const vU = uP * getNum(s.qty_u); 
                    const vL = lP * getNum(s.qty_l); 
                    const vC = getNum(s.opt_p_c);
                    const expC = vC * getNum(s.opt_d_c);
                    
                    const cV = vU + vL + vC; 
                    expSat += (vU * 1) + (vL * 2) + expC;
                    
                    if (vU > 0) pieData.push({ name: s.underlying || '正股', value: vU, exposure: vU * 1, fill: colors[i%colors.length].u });
                    if (vL > 0) pieData.push({ name: s.leveraged || '槓桿', value: vL, exposure: vL * 2, fill: colors[i%colors.length].l });
                    if (vC > 0) pieData.push({ name: (s.underlying || '標的') + ' Call', value: vC, exposure: expC, fill: colors[i%colors.length].c });

                    const tPct = getNum(s.target_pct); 
                    const cPct = (cV / safeT) * 100; 
                    const tVal = tCap * (tPct / 100); 
                    const dPct = getNum(s.ma200) > 0 ? ((uP - getNum(s.ma200)) / getNum(s.ma200)) * 100 : 0;
                    const peakDD = getNum(s.peak_p) > 0 ? ((getNum(s.peak_p) - uP) / getNum(s.peak_p)) * 100 : 0;
                    const costDD = getNum(s.avg_cost) > 0 ? ((getNum(s.avg_cost) - uP) / getNum(s.avg_cost)) * 100 : 0;
                    
                    let st = "未定", col = "text-slate-500", act = "觀察中";
                    const ex = tVal > 0 ? (cV - tVal) / tVal : 0; 
                    let sDiff = 0, alert = "";

                    if (vL > 0 || vU > 0 || vC > 0) {
                        if (ex >= getNum(s.profit_pct)/100 && uP > getNum(s.ma200)) { 
                            st = `收割 (+${(ex*100).toFixed(1)}%)`; col = "text-fin-up"; act = `獲利達標，建議分批退場。`; 
                            sDiff = tVal - cV;
                        } 
                        else if (isBoxxFrozen && costDD >= getNum(s.loss_pct)) {
                            st = "末日凍結"; col = "text-red-600 font-black"; act = "BOXX < 3%，停止補倉，保全母艦。"; 
                            alert = "末日凍結中";
                            sDiff = 0;
                        }
                        else if (uP < getNum(s.ma200) && peakDD >= 20 && vC === 0) {
                            st = "啟動 LEAPS"; col = "text-fin-info"; act = "達雙重條件，現股轉 Deep ITM Call"; 
                            sDiff = -vU; // 提示將現股賣出轉換
                        }
                        else if (costDD >= getNum(s.loss_pct)) { 
                            if (getNum(s.rescues) < 3) { 
                                st = `觸發補倉 (-${costDD.toFixed(1)}%)`; col = "text-fin-down"; act = `動用戰術 BOXX 補回 10% 基準。`; 
                                sDiff = tVal - cV; 
                            } else { 
                                st = "補倉達上限"; col = "text-slate-600"; act = "已連補 3 次，停止補倉防禦等待。"; 
                            } 
                        }
                        else { 
                            st = "穩定防禦中"; col = "text-brand-600"; act = `未達收割/補倉標準，維持部位。`; 
                        }
                    } else {
                        if (!s.underlying) { 
                            act = "輸入代號"; 
                        } else if (dPct <= 5 && dPct >= -5) { 
                            st = "均線範圍"; col = "text-fin-up"; act = `可建立初步倉位。`; 
                            sDiff = tVal;
                        } else if (dPct < -5) { 
                            st = "低於均線"; col = "text-fin-down"; act = "偏弱持續觀察。"; 
                        } else { 
                            st = "高於均線"; col = "text-fin-info"; act = "乖離偏大暫停。"; 
                        }
                    }
                    
                    if (Math.abs(sDiff) < 50) sDiff = 0;
                    return { ...s, cV, vU, vL, vC, expC, uP, lP, tPct, cPct, tVal, dPct, st, col, act, sDiff, alert };
                });

                const gExp = c1.exp + c2.exp + expSat;
                const safeGrowthForLev = (tCore + vSatU + vSatL + vSatC) > 0 ? (tCore + vSatU + vSatL + vSatC) : 1;
                const gLev = gExp / safeGrowthForLev;
                const tLev = gExp / safeT; 
                
                // 大盤核心參數與 V_Final 邏輯
                const qAth = getV('qqq_ath');
                const q20ma = getV('qqq_20ma');
                const cDD = qAth > 0 && pQQQ < qAth ? ((qAth - pQQQ) / qAth) * 100 : 0;
                const cRise = qAth > 0 && pQQQ >= qAth ? ((pQQQ - qAth) / qAth) * 100 : -1;
                
                const tLow = getV('tqqq_low');
                const tBounce = tLow > 0 ? ((pTQQQ - tLow) / tLow) * 100 : 0;
                
                // BOXX 動態基準：突破 ATH +7% 時提升至 15%
                const tgtRPct = cRise >= 7 ? getV('reserve_pct_ath') : getV('reserve_pct_normal');
                let tgtTqqqFromQqqPct = 0;
                let tgtTqqqFromBoxxPct = 0;
                let tTqqqPct = 0; 
                let phase = "正常巡航";

                if (cRise >= 0) {
                    let activeUp = null; 
                    safeUpLadder.forEach(s => { if (cRise >= getNum(s.rise_pct)) activeUp = s; });
                    if (activeUp) { 
                        tTqqqPct = getNum(activeUp.target_pct); 
                        phase = activeUp.target_pct === 0 ? "ATH 結清，全回 QQQ" : `創高收割 (保留 ${tTqqqPct}%)`; 
                    } else {
                        phase = `準備創高收割`;
                        tTqqqPct = valCore2 / safeT * 100; // 維持現有
                    }
                } else {
                    safeLadder.forEach(l => { 
                        if (cDD >= getNum(l.drop_pct)) {
                            tgtTqqqFromQqqPct += getNum(l.move_pct);
                            // use_boxx 是對戰略 BOXX (即 reserve_normal 的一半) 的使用比例
                            tgtTqqqFromBoxxPct += (getNum(l.use_boxx)/100) * (getV('reserve_pct_normal') / 2);
                        }
                    });
                    // 極限限制：最多轉 60% QQQ
                    tgtTqqqFromQqqPct = Math.min(tgtTqqqFromQqqPct, 60);
                    tTqqqPct = tgtTqqqFromQqqPct + tgtTqqqFromBoxxPct;
                    phase = `回撤加碼中 (目標槓桿 ${tTqqqPct.toFixed(1)}%)`;

                    // 反彈降風險 (雙重確認)
                    if (tBounce >= 10 && tBounce < 20) {
                        if (pQQQ > q20ma && q20ma > 0) {
                            phase = "反彈 10% 收割確認 (站上20MA)";
                            tTqqqPct = Math.max(0, tTqqqPct - 15);
                        } else {
                            phase = "防死貓反彈 (未過 20MA，暫不卸載)";
                        }
                    } else if (tBounce >= 20) {
                        phase = "反彈 20% 趨勢確立收割";
                        tTqqqPct = Math.max(0, tTqqqPct - 30);
                    }
                }

                // 實際計算應動用的總金額
                const tTqqqVal = tCap * (tTqqqPct / 100);
                
                // 動態調整 BOXX 目標：如果我們把戰略 BOXX 拿去買 TQQQ 了，那此時的 BOXX 目標水位就應該下降
                let activeBoxxTargetPct = tgtRPct;
                if (cRise < 0) activeBoxxTargetPct = Math.max(0, tgtRPct - tgtTqqqFromBoxxPct);
                const tgtBoxxVal = tCap * (activeBoxxTargetPct / 100);

                let cDiff = tTqqqVal - valCore2; // 需買賣的 TQQQ 差額
                let bDiff = tgtBoxxVal - vBOXX;  // 需買賣的 BOXX 差額
                
                // QQQ 負責吃掉剩下的空間 (Core 池總額 - Target TQQQ - Target BOXX)
                const currentCorePool = valCore1 + valCore2 + vBOXX;
                const tgtQqqVal = currentCorePool - tTqqqVal - tgtBoxxVal;
                let qDiff = tgtQqqVal - valCore1;

                let cAct = "維持現有配置"; 
                let cCol = "text-slate-600"; 
                
                if (cDiff > 50) { cAct = `衰退加碼指令觸發`; cCol = "text-fin-down"; } 
                else if (cDiff < -50) {
                    if (cRise < 0 && getV('tqqq_avg_cost') > 0 && pTQQQ < getV('tqqq_avg_cost') && inputs.core_2_type !== 'option') { 
                        cAct = `低於成本保護中，鐵律防禦不賣出`; 
                        cCol = "text-fin-warn"; 
                        cDiff = 0; qDiff = 0; bDiff = 0; // 取消這筆操作
                    } else {
                        cAct = `反彈/創高收割指令觸發`; cCol = "text-fin-up";
                    }
                }

                if (valCore2 <= 0 && tTqqqVal <= 0) {
                    phase = "空手巡航，無槓桿部位"; cAct = "配置達標"; cCol = "text-slate-500"; cDiff = 0; qDiff = 0; bDiff = 0;
                }

                if (Math.abs(cDiff) < 50) cDiff = 0;
                if (Math.abs(bDiff) < 50) bDiff = 0;
                if (Math.abs(qDiff) < 50) qDiff = 0;

                let pEq = 0;
                const safeRecords = Array.isArray(records) ? [...records] : [];
                const gData = safeRecords.sort((a,b) => new Date(a.date) - new Date(b.date)).map(r => { 
                    if(r && r.total_equity > pEq) pEq = r.total_equity; 
                    return { 
                        date: r?.date, 
                        equity: r?.total_equity, 
                        dd: pEq > 0 ? ((r?.total_equity || 0) - pEq) / pEq * 100 : 0 
                    }; 
                });

                return { 
                    totalCapital: tCap, 
                    safeTotal: safeT, 
                    satStats: mappedSatStats, 
                    graphData: gData, 
                    pieData, 
                    growthLeverageRatio: gLev, 
                    totalLeverageRatio: tLev,
                    cls: { 
                        c: { u: valCore1, l: valCore2, t: tCore, p: (tCore/safeT)*100 }, 
                        s: { u: vSatU, l: vSatL, c: vSatC, t: (vSatU+vSatL+vSatC), p: ((vSatU+vSatL+vSatC)/safeT)*100 }, 
                        r: { b: vBOXX, c: cash, t: tRes, p: (tRes/safeT)*100 } 
                    },
                    tgt: { 
                        r: { p: tgtRPct } 
                    },
                    core: { 
                        pQQQ, pTQQQ, qAth, cDD, cRise, tTqqqPct, phase, cAct, cCol, cDiff, qDiff, bDiff,
                        dnL: safeLadder.map(s => ({ p: getNum(s.drop_pct), m: getNum(s.move_pct), tr: qAth*(1-getNum(s.drop_pct)/100), t: cDD>=getNum(s.drop_pct) })), 
                        upL: safeUpLadder.map(s => ({ p: getNum(s.rise_pct), tp: getNum(s.target_pct), tr: qAth*(1+getNum(s.rise_pct)/100), t: cRise>=getNum(s.rise_pct) })) 
                    }
                };
            }, [prices, inputs, records]);

            const c1Lev = inputs.core_1_type === 'option' ? getNum(inputs.opt_d_c1) : 1;
            const simC1 = metrics.cls.c.u * Math.max(0, 1 - (simDropQ * c1Lev / 100));
            const c2Lev = inputs.core_2_type === 'option' ? getNum(inputs.opt_d_c2) : 3; 
            const simC2 = metrics.cls.c.l * Math.max(0, 1 - (simDropQ * c2Lev / 100));

            let simSatU = 0, simSatL = 0, simSatC = 0;
            getArr(inputs.satellites).forEach(s => {
                const uP = prices[s.underlying] || 0;
                const lP = prices[s.leveraged] || 0;
                const vU = uP * getNum(s.qty_u);
                const vL = lP * getNum(s.qty_l);
                const vC = getNum(s.opt_p_c);
                const optLev = getNum(s.opt_d_c) || 2;
                simSatU += vU * Math.max(0, 1 - (simDropS * 1 / 100));
                simSatL += vL * Math.max(0, 1 - (simDropS * 2 / 100)); 
                simSatC += vC * Math.max(0, 1 - (simDropS * optLev / 100)); 
            });

            const simTotal = simC1 + simC2 + simSatU + simSatL + simSatC + metrics.cls.r.t;
            const simLoss = metrics.totalCapital - simTotal;
            const simLossPct = metrics.totalCapital > 0 ? (simLoss / metrics.totalCapital) * 100 : 0;

            return (
                <div className="pb-32 min-h-screen transition-colors font-bold select-none bg-slate-50 text-slate-800">
                    {message && <div className="fixed top-24 left-1/2 -translate-x-1/2 z-[60] bg-white border border-brand-200 px-6 py-3 rounded-full shadow-lg text-sm flex items-center gap-2 animate-in fade-in slide-in-from-top-4"><Icon name="CheckCircle" className="text-fin-up"/>{message}</div>}
                    {authError && <div className="fixed top-4 inset-x-4 z-[70] bg-red-50 border-l-4 border-red-500 p-4 rounded-lg shadow-lg flex gap-3 animate-in slide-in-from-top-4"><Icon name="AlertCircle" className="text-red-500"/><div className="flex-1"><h4 className="text-red-800 text-sm">提示</h4><p className="text-red-600 text-xs">{authError}</p><button onClick={handleLogout} className="mt-2 text-xs bg-red-100 hover:bg-red-200 text-red-700 px-3 py-1.5 rounded-lg active:scale-95 transition-all">緊急登出</button></div><button onClick={() => setAuthError(null)} className="text-red-400 p-1 self-start"><Icon name="X" size={16}/></button></div>}
                    {isSwitching && !authError && <div className="loading-overlay"><div className="w-10 h-10 border-4 border-slate-600 border-t-white rounded-full animate-spin"/><div className="text-sm">同步中...</div></div>}

                    {modal.type === 'DELETE_RECORD' && <Modal title="刪除紀錄" icon="Trash2" isOpen={true} onClose={() => setModal({type:null})}><p className="text-sm text-slate-600 mb-4">確定刪除此紀錄？</p><button onClick={deleteRecord} className="w-full bg-fin-down text-white py-4 rounded-xl active:scale-95">刪除</button></Modal>}
                    {modal.type === 'EDIT_RECORD' && <Modal title="編輯紀錄" icon="Edit2" isOpen={true} onClose={() => setModal({type:null})}><div className="space-y-4"><div><label className="text-xs text-slate-500 mb-2 block">日期</label><input type="date" className="w-full bg-slate-50 p-4 rounded-xl border font-black outline-none input-focus-ring" defaultValue={modal.data.date?.split('T')[0]} onChange={e => setModal({...modal,temp:{...modal.temp,date:new Date(e.target.value).toISOString()}})} /></div><div><label className="text-xs text-slate-500 mb-2 block">總資產 ($)</label><input type="number" inputMode="decimal" className="w-full bg-slate-50 p-4 rounded-xl border font-mono text-xl text-brand-700 outline-none input-focus-ring" defaultValue={modal.data.total_equity} onChange={e => setModal({...modal,temp:{...modal.temp,equity:e.target.value}})} onFocus={e=>e.target.select()} /></div><button onClick={editRecord} className="w-full bg-brand-600 text-white py-4 rounded-xl active:scale-95">儲存變更</button></div></Modal>}

                    <header className="fixed top-0 inset-x-0 bg-white z-50 px-5 py-4 flex justify-between items-center shadow-sm border-b border-slate-200">
                        <div className="flex items-center gap-2">
                            <div className="w-8 h-8 bg-slate-900 rounded-lg flex items-center justify-center"><span className="text-brand-500 font-black text-lg">A</span></div>
                            <h1 className="text-lg">Alpha Horizon <span className="text-brand-600 text-xs ml-1">V_Final</span></h1>
                        </div>
                        <button onClick={() => fetchPrices(true)} className={`p-2 rounded-lg bg-slate-100 text-slate-500 active:scale-95 ${loadingPrices?'animate-spin':''}`}><Icon name="RefreshCcw" size={18}/></button>
                    </header>

                    <main className="max-w-md mx-auto p-4 pt-24 space-y-6">
                        {view === 'dashboard' && (
                            <div className="space-y-6 animate-in fade-in">
                                <div className="bg-white rounded-3xl p-5 shadow-sm border relative input-focus-ring group">
                                    <div className="flex justify-between items-center mb-2">
                                        <div className="flex items-center gap-2 text-brand-600"><Icon name="Quote" size={16}/><span className="text-xs uppercase tracking-widest text-slate-500">投資座右銘</span></div>
                                        <button onClick={() => setIsMottoLocked(!isMottoLocked)} className="text-slate-400 active:scale-95"><Icon name={isMottoLocked?"Lock":"Unlock"} size={16}/></button>
                                    </div>
                                    <textarea value={inputs.motto} readOnly={isMottoLocked} onChange={e => handleInput('motto', e.target.value)} onBlur={e => syncToCloud('motto', e.target.value)} className={`w-full bg-transparent text-base text-slate-700 outline-none text-center leading-relaxed transition-all ${isMottoLocked?'':'bg-slate-50 border-dashed border-slate-300 rounded-xl p-3 border'}`} rows="2" placeholder="輸入您的投資座右銘..." />
                                </div>

                                <div className="bg-white rounded-3xl p-6 shadow-sm border border-slate-200">
                                    <div className="text-xs text-slate-500 font-bold mb-1">動態總資產價值 (USD)</div>
                                    <div className="text-5xl font-mono tracking-tight font-black">${metrics.totalCapital.toLocaleString(undefined,{maximumFractionDigits:0})}</div>
                                    
                                    <div className="mt-6 pt-5 border-t border-slate-100">
                                        {/* 戰術指揮所：核心轉換中心 */}
                                        <div className="bg-slate-800 p-4 rounded-xl text-white shadow-heavy mb-4 border border-slate-700">
                                            <div className="flex justify-between items-center mb-3 pb-2 border-b border-slate-700">
                                                <span className="text-xs font-black text-brand-400 flex items-center gap-1"><Icon name="Activity" size={14}/> 核心轉換中心</span>
                                                <span className="text-[10px] bg-slate-700 px-2 py-0.5 rounded text-brand-100">{metrics.core.phase}</span>
                                            </div>
                                            
                                            <div className="grid grid-cols-1 gap-3">
                                                {metrics.core.cDiff === 0 ? (
                                                    <div className="text-center text-slate-400 text-sm py-2">{metrics.core.cAct}</div>
                                                ) : metrics.core.cDiff > 0 ? (
                                                    <div className="space-y-2">
                                                        <div className="text-sm">
                                                            需 <span className="text-fin-up font-black">買入</span> TQQQ: <span className="font-mono text-lg">${Math.round(metrics.core.cDiff).toLocaleString()}</span>
                                                        </div>
                                                        <div className="text-[10px] text-slate-400 flex gap-2">
                                                            <span className="bg-slate-700 px-2 py-1 rounded">
                                                                來源 賣 QQQ: <span className="text-white">${Math.abs(Math.round(metrics.core.qDiff)).toLocaleString()}</span>
                                                            </span>
                                                            <span className="bg-slate-700 px-2 py-1 rounded">
                                                                來源 賣 BOXX: <span className="text-white">${Math.abs(Math.round(metrics.core.bDiff)).toLocaleString()}</span>
                                                            </span>
                                                        </div>
                                                    </div>
                                                ) : (
                                                    <div className="space-y-2">
                                                        <div className="text-sm">
                                                            需 <span className="text-fin-down font-black">賣出</span> TQQQ: <span className="font-mono text-lg">${Math.abs(Math.round(metrics.core.cDiff)).toLocaleString()}</span>
                                                        </div>
                                                        <div className="text-[10px] text-slate-400 flex gap-2">
                                                            <span className="bg-slate-700 px-2 py-1 rounded">
                                                                轉回 QQQ: <span className="text-white">${Math.round(metrics.core.qDiff).toLocaleString()}</span>
                                                            </span>
                                                            <span className="bg-slate-700 px-2 py-1 rounded">
                                                                轉回 BOXX: <span className="text-white">${Math.round(metrics.core.bDiff).toLocaleString()}</span>
                                                            </span>
                                                        </div>
                                                    </div>
                                                )}
                                            </div>
                                        </div>

                                        {/* 衛星戰術指示 */}
                                        <div className="text-xs font-black text-brand-600 mb-3 mt-4 flex items-center gap-1"><Icon name="Zap" size={16}/> 衛星作戰指令</div>
                                        {metrics.satStats.map(s => s.underlying && (
                                            <div key={s.id} className={`p-3 rounded-xl border mb-2 flex justify-between items-center ${s.alert ? 'bg-red-50 border-red-200' : s.sDiff > 50 ? 'bg-fin-up/10 border-fin-up/30' : s.sDiff < -50 ? 'bg-fin-down/10 border-fin-down/30' : 'bg-slate-50 border-slate-100'}`}>
                                                <div>
                                                    <div className="text-[10px] text-slate-500 mb-1">衛星 {s.underlying}</div>
                                                    <div className="text-[10px] font-mono text-slate-400">{s.st}</div>
                                                </div>
                                                <div className="text-right">
                                                    <div className={`text-sm font-black ${s.alert ? 'text-red-500' : s.sDiff > 50 ? 'text-fin-up' : s.sDiff < -50 ? 'text-fin-down' : 'text-slate-400'}`}>
                                                        {s.alert ? s.alert : s.sDiff > 50 ? `需買 $${Math.round(s.sDiff).toLocaleString()}` : s.sDiff < -50 ? `需賣 $${Math.abs(Math.round(s.sDiff)).toLocaleString()}` : '持倉續抱'}
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                    
                                    <div className="mt-5 pt-4 border-t border-slate-100 grid grid-cols-3 gap-1 text-center divide-x">
                                        <div className="px-1"><div className="text-[10px] text-slate-400 mb-0.5">大盤佔比</div><div className="text-sm font-mono text-slate-800">{metrics.cls.c.p.toFixed(1)}%</div></div>
                                        <div className="px-1"><div className="text-[10px] text-slate-400 mb-0.5">衛星佔比</div><div className="text-sm font-mono text-slate-800">{metrics.cls.s.p.toFixed(1)}%</div></div>
                                        <div className="px-1"><div className="text-[10px] text-slate-400 mb-0.5">戰備佔比</div><div className={`text-sm font-mono ${metrics.cls.r.p<10?'text-red-600 font-black animate-pulse':metrics.cls.r.p<metrics.tgt.r.p?'text-fin-warn':'text-fin-up'}`}>{metrics.cls.r.p.toFixed(1)}% <span className="text-[9px] text-slate-400">/{metrics.tgt.r.p}%</span></div></div>
                                    </div>
                                </div>

                                <CollapsibleCard title="壓力測試與底線模擬" icon="Shield" isOpen={sections.stress} onToggle={() => toggleSection('stress')}>
                                    <div className="space-y-4">
                                        <div className="flex gap-3">
                                            <div className="flex-1 bg-slate-50 p-3 rounded-xl border focus-within:border-fin-down transition-colors">
                                                <label className="text-[10px] text-slate-500 mb-1 block">大盤假想跌幅 (%)</label>
                                                <div className="flex items-center"><span className="text-fin-down mr-1 font-bold">-</span><input type="number" inputMode="decimal" value={simDropQ} onChange={e=>setSimDropQ(e.target.value)} onFocus={e=>e.target.select()} className="w-full bg-transparent font-mono text-xl text-fin-down outline-none"/></div>
                                            </div>
                                            <div className="flex-1 bg-slate-50 p-3 rounded-xl border focus-within:border-fin-down transition-colors">
                                                <label className="text-[10px] text-slate-500 mb-1 block">衛星假想跌幅 (%)</label>
                                                <div className="flex items-center"><span className="text-fin-down mr-1 font-bold">-</span><input type="number" inputMode="decimal" value={simDropS} onChange={e=>setSimDropS(e.target.value)} onFocus={e=>e.target.select()} className="w-full bg-transparent font-mono text-xl text-fin-down outline-none"/></div>
                                            </div>
                                        </div>
                                        <div className="bg-slate-800 p-5 rounded-2xl text-white shadow-heavy relative overflow-hidden">
                                            <div className="absolute -right-4 -top-4 opacity-10"><Icon name="Activity" size={100}/></div>
                                            <div className="relative z-10">
                                                <div className="text-[10px] text-brand-300 mb-1 font-bold uppercase tracking-widest">模擬後總資產估值</div>
                                                <div className="text-4xl font-mono mb-3 font-black">${simTotal.toLocaleString(undefined,{maximumFractionDigits:0})}</div>
                                                <div className="flex justify-between items-end border-t border-slate-700 pt-3">
                                                    <div className="text-xs text-slate-400">預估帳面蒸發</div>
                                                    <div className="text-right">
                                                        <div className="text-fin-down font-mono font-bold text-lg">-${simLoss.toLocaleString(undefined,{maximumFractionDigits:0})}</div>
                                                        <div className="text-[10px] text-slate-500">總回撤 {simLossPct.toFixed(1)}%</div>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                        <div className="text-[9px] text-slate-500 leading-relaxed bg-slate-50 p-3 rounded-lg border border-dashed">* 壓力測試邏輯：根據您目前的「實際工具配比」與「槓桿倍數」精密計算。軍火庫 (BOXX/現金) 視為避風港不計跌幅。此面板旨在協助鍛鍊極端行情下的心理韌性。</div>
                                    </div>
                                </CollapsibleCard>

                                <CollapsibleCard title="資產配置與火力統計" icon="PieChart" isOpen={sections.allocation} onToggle={() => toggleSection('allocation')} rightElement={<div className="flex gap-1.5"><div className={`px-1.5 py-0.5 rounded border flex gap-1 shadow-sm ${metrics.growthLeverageRatio>1.8?'bg-orange-50 border-orange-200 text-orange-700':'bg-brand-50 border-brand-200 text-brand-700'}`}><Icon name="Zap" size={12} className={metrics.growthLeverageRatio>1.5?"animate-pulse":""}/><span className="text-[9px]">成長 {metrics.growthLeverageRatio.toFixed(2)}x</span></div></div>}>
                                    {(metrics.pieData || []).length > 0 ? (
                                        <>
                                            <div className="h-56 relative mb-6">
                                                {hasCharts ? (
                                                    <ResponsiveContainer><PieChart><Pie data={metrics.pieData} innerRadius={60} outerRadius={90} paddingAngle={2} dataKey="value" stroke="none">{(metrics.pieData || []).map((e,i) => <Cell key={i} fill={e.fill}/>)}</Pie><Tooltip content={<CustomPieTooltip/>}/></PieChart></ResponsiveContainer>
                                                ) : <div className="h-full flex items-center justify-center text-slate-400 text-xs border border-dashed rounded-xl bg-slate-50">圖表載入中，請確認網路連線...</div>}
                                                <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-center pointer-events-none"><div className="text-xs text-slate-400">不含戰備</div><div className="text-sm text-slate-700">成長部位</div></div>
                                            </div>
                                        </>
                                    ) : <div className="text-center text-sm text-slate-400 py-10 bg-slate-50 rounded-xl border border-dashed">無資產資料</div>}
                                </CollapsibleCard>

                                <CollapsibleCard title="核心轉換參數 (QQQ/TQQQ)" icon="BarChart2" isOpen={sections.core} onToggle={() => toggleSection('core')}>
                                    <div className="flex justify-between items-end mb-4">
                                        <div><div className="text-[10px] text-slate-500">歷史高點 ATH</div><div className="font-mono text-lg">${metrics.core.qAth}</div></div>
                                        <div className="text-right"><div className="text-[10px] text-slate-500">{metrics.core.cRise>=0?'突破幅度':'回撤幅度'}</div><div className={`font-mono text-2xl ${metrics.core.cRise>=0?'text-fin-up':'text-fin-down'}`}>{metrics.core.cRise>=0 ? `+${metrics.core.cRise.toFixed(1)}%` : `-${metrics.core.cDD.toFixed(1)}%`}</div></div>
                                    </div>
                                    <div className="bg-slate-50 rounded-xl p-4 mb-4 border border-slate-100">
                                        <div className="flex justify-between text-xs mb-2"><span>槓桿目標: {metrics.core.tTqqqPct.toFixed(1)}%</span><span className="text-brand-600">實際: {(metrics.cls.c.l/metrics.safeTotal*100).toFixed(1)}%</span></div>
                                        <div className="w-full bg-slate-200 h-2 rounded-full relative"><div className="absolute top-0 bottom-0 w-1 bg-slate-400" style={{left:`${Math.min(100, metrics.core.tTqqqPct)}%`}}></div><div className="h-full bg-brand-500 transition-all" style={{width:`${Math.min(100, (metrics.cls.c.l/metrics.safeTotal*100))}%`}}></div></div>
                                        <div className="text-center text-[10px] mt-2">{metrics.core.phase}</div>
                                    </div>
                                    <div className="mt-4 grid grid-cols-2 gap-2">
                                        <div>
                                            <div className="text-[9px] text-fin-down flex gap-1 mb-1"><Icon name="TrendingDown" size={10}/>加碼階梯</div>
                                            {(metrics.core.dnL || []).map((t,i) => <div key={i} className={`flex justify-between p-1.5 rounded border text-[9px] mb-1 ${t.t?'bg-slate-100 opacity-60':'bg-white'} ${i===metrics.core.dnL.length-1?'border-b-2 border-b-slate-400':''}`}><span className={t.t?'':'text-red-500'}>-{t.p}%</span><span className="font-mono">${t.tr.toFixed(1)}</span></div>)}
                                        </div>
                                        <div>
                                            <div className="text-[9px] text-fin-up flex gap-1 mb-1"><Icon name="TrendingUp" size={10}/>收割階梯</div>
                                            {(metrics.core.upL || []).map((t,i) => <div key={i} className={`flex justify-between p-1.5 rounded border text-[9px] mb-1 ${t.t?'bg-brand-50 border-brand-200 text-brand-600':'bg-white text-slate-400 opacity-60'}`}><span>+{t.p}%</span><span className="font-mono">${t.tr.toFixed(1)}</span></div>)}
                                        </div>
                                    </div>
                                </CollapsibleCard>

                                <CollapsibleCard title="資產數量更新" icon="Package" isOpen={sections.holdings} onToggle={() => toggleSection('holdings')}>
                                    <div className="space-y-4">
                                        <div className="bg-slate-50 p-3 rounded-xl border focus-within:border-brand-400">
                                            <div className="flex justify-between items-center mb-2">
                                                <span className="text-xs font-black text-slate-700">大盤核心 (QQQ)</span>
                                                <button onClick={() => handleInput('core_1_type', inputs.core_1_type === 'option' ? 'stock' : 'option')} className="text-[10px] bg-white border px-2 py-0.5 rounded shadow-sm text-slate-500 active:scale-95">切換 {inputs.core_1_type === 'option' ? '現貨' : '選擇權'}</button>
                                            </div>
                                            {inputs.core_1_type === 'option' ? (
                                                <div className="grid grid-cols-2 gap-2">
                                                    <div>
                                                        <label className="text-[8px] text-slate-500 block mb-1">選擇權總市值 $</label>
                                                        <input type="number" inputMode="decimal" value={inputs.opt_p_c1} onChange={e=>handleInput('opt_p_c1',e.target.value)} onFocus={e=>e.target.select()} className="w-full font-mono text-sm outline-none bg-white p-2 rounded border shadow-sm"/>
                                                    </div>
                                                    <div>
                                                        <label className="text-[8px] text-slate-500 block mb-1">預估槓桿倍數 (如 2.5)</label>
                                                        <input type="number" inputMode="decimal" value={inputs.opt_d_c1} onChange={e=>handleInput('opt_d_c1',e.target.value)} onFocus={e=>e.target.select()} className="w-full font-mono text-sm outline-none bg-white p-2 rounded border shadow-sm"/>
                                                    </div>
                                                </div>
                                            ) : (
                                                <div>
                                                    <label className="text-[10px] text-slate-500 block mb-1">QQQ 股數</label>
                                                    <input type="number" inputMode="decimal" value={inputs.qty_core_1} onChange={e=>handleInput('qty_core_1',e.target.value)} onFocus={e=>e.target.select()} className="w-full font-mono text-lg outline-none bg-transparent border-b border-slate-200 pb-1"/>
                                                </div>
                                            )}
                                        </div>

                                        <div className="bg-slate-50 p-3 rounded-xl border focus-within:border-brand-400">
                                            <div className="flex justify-between items-center mb-2">
                                                <span className="text-xs font-black text-slate-700">核心槓桿 (TQQQ)</span>
                                                <button onClick={() => handleInput('core_2_type', inputs.core_2_type === 'option' ? 'stock' : 'option')} className="text-[10px] bg-white border px-2 py-0.5 rounded shadow-sm text-slate-500 active:scale-95">切換 {inputs.core_2_type === 'option' ? '現貨' : '選擇權'}</button>
                                            </div>
                                            {inputs.core_2_type === 'option' ? (
                                                <div className="grid grid-cols-2 gap-2">
                                                    <div>
                                                        <label className="text-[8px] text-slate-500 block mb-1">選擇權總市值 $</label>
                                                        <input type="number" inputMode="decimal" value={inputs.opt_p_c2} onChange={e=>handleInput('opt_p_c2',e.target.value)} onFocus={e=>e.target.select()} className="w-full font-mono text-sm outline-none bg-white p-2 rounded border shadow-sm"/>
                                                    </div>
                                                    <div>
                                                        <label className="text-[8px] text-slate-500 block mb-1">預估槓桿倍數 (如 3)</label>
                                                        <input type="number" inputMode="decimal" value={inputs.opt_d_c2} onChange={e=>handleInput('opt_d_c2',e.target.value)} onFocus={e=>e.target.select()} className="w-full font-mono text-sm outline-none bg-white p-2 rounded border shadow-sm"/>
                                                    </div>
                                                </div>
                                            ) : (
                                                <div>
                                                    <label className="text-[10px] text-slate-500 block mb-1">TQQQ 股數</label>
                                                    <input type="number" inputMode="decimal" value={inputs.qty_core_2} onChange={e=>handleInput('qty_core_2',e.target.value)} onFocus={e=>e.target.select()} className="w-full font-mono text-lg outline-none bg-transparent border-b border-slate-200 pb-1"/>
                                                </div>
                                            )}
                                        </div>
                                        
                                        {getArr(inputs.satellites).map(s => (
                                            <div key={s.id} className="bg-slate-50 p-3 rounded-xl border focus-within:border-brand-400 transition-colors">
                                                <div className="text-[10px] font-black text-slate-700 mb-2">{s.underlying || '衛星部位'}</div>
                                                <div className="grid grid-cols-2 gap-3 mb-2">
                                                    <div className="focus-within:border-brand-400 border border-transparent rounded">
                                                        <div className="text-[10px] text-slate-500 mb-1">現股股數</div>
                                                        <input type="number" inputMode="decimal" value={s.qty_u} onChange={e=>updateArr('satellites', s.id, 'qty_u', e.target.value)} onFocus={e=>e.target.select()} className="w-full font-mono text-lg bg-transparent outline-none border-b border-slate-200 pb-1"/>
                                                    </div>
                                                    <div className="focus-within:border-brand-400 border border-transparent rounded">
                                                        <div className="text-[10px] text-brand-600 mb-1">2x槓桿 股數</div>
                                                        <input type="number" inputMode="decimal" value={s.qty_l !== undefined ? s.qty_l : 0} onChange={e=>updateArr('satellites', s.id, 'qty_l', e.target.value)} onFocus={e=>e.target.select()} className="w-full font-mono text-lg text-brand-700 bg-transparent outline-none border-b border-brand-200 pb-1"/>
                                                    </div>
                                                </div>
                                                <div className="pt-2 border-t border-slate-200">
                                                    <div className="grid grid-cols-2 gap-2">
                                                        <div>
                                                            <label className="text-[8px] text-slate-500 block mb-1">Call 總市值 $</label>
                                                            <input type="number" inputMode="decimal" value={s.opt_p_c || 0} onChange={e=>updateArr('satellites', s.id, 'opt_p_c', e.target.value)} onFocus={e=>e.target.select()} className="w-full font-mono text-sm outline-none bg-white p-2 rounded border shadow-sm"/>
                                                        </div>
                                                        <div>
                                                            <label className="text-[8px] text-slate-500 block mb-1">Call 預估槓桿 (如 2)</label>
                                                            <input type="number" inputMode="decimal" value={s.opt_d_c !== undefined ? s.opt_d_c : 2} onChange={e=>updateArr('satellites', s.id, 'opt_d_c', e.target.value)} onFocus={e=>e.target.select()} className="w-full font-mono text-sm outline-none bg-white p-2 rounded border shadow-sm"/>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                        
                                        <div className="grid grid-cols-2 gap-3 bg-slate-800 p-3 rounded-xl border border-slate-700 text-white">
                                            <div className="focus-within:border-brand-400 border border-transparent rounded">
                                                <div className="text-[10px] text-slate-400 mb-1">BOXX 股數</div>
                                                <input type="number" inputMode="decimal" value={inputs.qty_boxx} onChange={e=>handleInput('qty_boxx',e.target.value)} onFocus={e=>e.target.select()} className="w-full font-mono text-lg bg-transparent text-brand-100 outline-none border-b border-slate-600 pb-1"/>
                                            </div>
                                            <div className="focus-within:border-brand-400 border border-transparent rounded">
                                                <div className="text-[10px] text-slate-400 mb-1">現金餘額 ($)</div>
                                                <div className="flex items-center border-b border-slate-600 pb-1">
                                                    <button onClick={() => handleInput('cash_balance', (getNum(inputs.cash_balance) * -1).toString())} className="mr-2 text-[10px] bg-slate-700 hover:bg-slate-600 text-slate-300 px-1.5 py-0.5 rounded active:scale-95">+/-</button>
                                                    <input type="number" inputMode="decimal" value={inputs.cash_balance} onChange={e=>handleInput('cash_balance',e.target.value)} onFocus={e=>e.target.select()} className="w-full font-mono text-lg bg-transparent text-brand-100 outline-none"/>
                                                </div>
                                            </div>
                                        </div>
                                        
                                        <div className="flex items-center gap-2 bg-slate-50 p-2 rounded-lg border">
                                            <span className="text-xs text-slate-500 w-16 text-center">存檔日</span>
                                            <input type="date" value={recordDate} onChange={e=>setRecordDate(e.target.value)} className="w-full bg-transparent font-mono outline-none"/>
                                            {recordDate!==getTodayStr() && <button onClick={()=>setRecordDate(getTodayStr())} className="text-[9px] bg-brand-100 text-brand-700 px-2 py-1 rounded active:scale-95 transition-all">今</button>}
                                        </div>
                                        <button onClick={saveRecord} disabled={isSaving} className="w-full py-4 rounded-xl bg-brand-600 text-white text-base active:scale-95 flex justify-center gap-2 shadow-sm"><Icon name="Save" size={18}/> 儲存當前紀錄</button>
                                    </div>
                                </CollapsibleCard>

                                <CollapsibleCard title="投資計畫書" icon="FileText" isOpen={sections.plan} onToggle={() => toggleSection('plan')} className="bg-slate-50">
                                    <textarea value={inputs.planText} onChange={e=>handleInput('planText',e.target.value)} onBlur={e=>syncToCloud('planText',e.target.value)} className="w-full bg-white p-4 rounded-xl border border-slate-200 text-xs text-slate-700 outline-none resize-none h-[400px] focus:border-brand-400 focus:ring-2 focus:ring-brand-500/20 transition-all leading-relaxed" placeholder="寫下您的專屬投資計畫與紀律..." />
                                </CollapsibleCard>
                            </div>
                        )}

                        {view === 'settings' && (
                            <div className="space-y-6 animate-in fade-in">
                                <div className="bg-slate-800 rounded-3xl p-6 text-white">
                                    <div className="flex items-center gap-2 mb-4 border-b border-slate-700 pb-3"><Icon name="Google" size={20}/><h2 className="font-black">Google 同步</h2></div>
                                    {user && !user.isAnonymous ? (
                                        <div className="flex justify-between items-center text-xs"><span className="text-brand-300 font-mono">{user.email}</span><button onClick={handleLogout} className="bg-slate-700 px-3 py-1.5 rounded active:scale-95">登出</button></div>
                                    ) : <button onClick={handleGoogleLogin} className="w-full bg-white text-slate-800 py-3 rounded-xl font-black active:scale-95">使用 Google 登入並同步</button>}
                                </div>

                                <div className="bg-white rounded-3xl p-6 border border-slate-200">
                                    <div className="flex justify-between mb-4 border-b pb-2"><h2 className="font-black flex items-center gap-2"><Icon name="Settings" size={18} className="text-slate-500"/>大盤與戰備參數</h2></div>
                                    <div className="space-y-3">
                                        <div className="grid grid-cols-2 gap-2">
                                            <div className="bg-brand-50 p-2 rounded-lg border border-brand-200">
                                                <label className="text-[9px] font-bold text-brand-700 block">平時 BOXX %</label>
                                                <input type="number" inputMode="decimal" value={inputs.reserve_pct_normal} onChange={e=>handleInput('reserve_pct_normal', e.target.value)} onFocus={e=>e.target.select()} className="w-full bg-transparent font-mono text-brand-700 outline-none"/>
                                            </div>
                                            <div className="bg-brand-50 p-2 rounded-lg border border-brand-200">
                                                <label className="text-[9px] font-bold text-brand-700 block">創高 BOXX %</label>
                                                <input type="number" inputMode="decimal" value={inputs.reserve_pct_ath} onChange={e=>handleInput('reserve_pct_ath', e.target.value)} onFocus={e=>e.target.select()} className="w-full bg-transparent font-mono text-brand-700 outline-none"/>
                                            </div>
                                        </div>
                                        <div className="grid grid-cols-2 gap-2">
                                            <div className="bg-slate-50 p-2 rounded-lg border">
                                                <label className="text-[9px] font-bold text-slate-500 block">QQQ 高點 ATH</label>
                                                <input type="number" inputMode="decimal" value={inputs.qqq_ath} onChange={e=>handleInput('qqq_ath', e.target.value)} onFocus={e=>e.target.select()} className="w-full bg-transparent font-mono outline-none"/>
                                            </div>
                                            <div className="bg-slate-50 p-2 rounded-lg border">
                                                <label className="text-[9px] font-bold text-slate-500 block">QQQ 20MA (防死貓)</label>
                                                <input type="number" inputMode="decimal" value={inputs.qqq_20ma} onChange={e=>handleInput('qqq_20ma', e.target.value)} onFocus={e=>e.target.select()} className="w-full bg-transparent font-mono outline-none"/>
                                            </div>
                                        </div>
                                        <div className="grid grid-cols-2 gap-2">
                                            <div className="bg-slate-50 p-2 rounded-lg border border-slate-200">
                                                <label className="text-[9px] font-bold text-slate-500 block">TQQQ 波段低點</label>
                                                <input type="number" inputMode="decimal" value={inputs.tqqq_low} onChange={e=>handleInput('tqqq_low', e.target.value)} onFocus={e=>e.target.select()} className="w-full bg-transparent font-mono text-slate-700 outline-none"/>
                                            </div>
                                            <div className="bg-amber-50 p-2 rounded-lg border border-amber-200">
                                                <label className="text-[9px] font-bold text-amber-700 block">TQQQ 買入成本</label>
                                                <input type="number" inputMode="decimal" value={inputs.tqqq_avg_cost} onChange={e=>handleInput('tqqq_avg_cost', e.target.value)} onFocus={e=>e.target.select()} className="w-full bg-transparent font-mono text-amber-700 outline-none"/>
                                            </div>
                                        </div>
                                        
                                        <div className="pt-4 border-t">
                                            <label className="text-[10px] text-brand-600 font-bold mb-2 block">下跌轉換階梯 & BOXX動用</label>
                                            {getArr(inputs.core_ladder).map((l,i) => (
                                                <div key={l.id} className="flex gap-1 items-center mb-1">
                                                    <div className="flex-1 bg-slate-50 border rounded flex items-center px-1">
                                                        <span className="text-[8px] text-slate-400">跌</span>
                                                        <input type="number" inputMode="decimal" value={l.drop_pct} onChange={e=>updateArr('core_ladder', l.id, 'drop_pct', e.target.value)} onFocus={e=>e.target.select()} className="w-full p-1 bg-transparent font-mono text-sm outline-none"/>%
                                                    </div>
                                                    <div className="flex-1 bg-brand-50 border border-brand-100 rounded flex items-center px-1">
                                                        <span className="text-[8px] text-brand-400 whitespace-nowrap">轉TQQQ</span>
                                                        <input type="number" inputMode="decimal" value={l.move_pct} onChange={e=>updateArr('core_ladder', l.id, 'move_pct', e.target.value)} onFocus={e=>e.target.select()} className="w-full p-1 bg-transparent text-brand-700 font-mono text-sm outline-none"/>%
                                                    </div>
                                                    <div className="flex-1 bg-fin-warn/10 border border-fin-warn/20 rounded flex items-center px-1">
                                                        <span className="text-[8px] text-fin-warn whitespace-nowrap">用BOXX</span>
                                                        <input type="number" inputMode="decimal" value={l.use_boxx !== undefined ? l.use_boxx : 0} onChange={e=>updateArr('core_ladder', l.id, 'use_boxx', e.target.value)} onFocus={e=>e.target.select()} className="w-full p-1 bg-transparent text-fin-warn font-mono text-sm outline-none"/>%
                                                    </div>
                                                    <button onClick={()=>removeArr('core_ladder',l.id)} className="p-1 text-slate-400 hover:text-red-500"><Icon name="X" size={14}/></button>
                                                </div>
                                            ))}
                                            <button onClick={()=>addArr('core_ladder', {drop_pct:0, move_pct:0, use_boxx:0})} className="w-full py-2 mt-2 border-dashed border-2 rounded-lg text-xs text-slate-500 active:scale-95">+ 新增階梯</button>
                                        </div>
                                        
                                        <div className="pt-4 border-t">
                                            <label className="text-[10px] text-brand-600 font-bold mb-2 block">突破收割階梯 (TQQQ 目標保留%)</label>
                                            {getArr(inputs.core_up_ladder).map((l,i) => (
                                                <div key={l.id} className="flex gap-2 items-center mb-1">
                                                    <div className="flex-1 bg-slate-50 border rounded flex items-center px-2">
                                                        <span className="text-xs text-brand-500">+</span>
                                                        <input type="number" inputMode="decimal" value={l.rise_pct} onChange={e=>updateArr('core_up_ladder', l.id, 'rise_pct', e.target.value)} onFocus={e=>e.target.select()} className="w-full p-1 bg-transparent font-mono text-sm outline-none"/>%
                                                    </div>
                                                    <Icon name="ChevronDown" size={14} className="-rotate-90 text-slate-300"/>
                                                    <div className="flex-1 bg-fin-up/10 border border-fin-up/20 rounded flex items-center px-2">
                                                        <span className="text-[8px] text-fin-up whitespace-nowrap pr-1">目標</span>
                                                        <input type="number" inputMode="decimal" value={l.target_pct} onChange={e=>updateArr('core_up_ladder', l.id, 'target_pct', e.target.value)} onFocus={e=>e.target.select()} className="w-full p-1 bg-transparent text-fin-up font-mono text-sm outline-none"/>%
                                                    </div>
                                                    <button onClick={()=>removeArr('core_up_ladder',l.id)} className="p-1 text-slate-400 hover:text-red-500"><Icon name="X" size={14}/></button>
                                                </div>
                                            ))}
                                            <button onClick={()=>addArr('core_up_ladder', {rise_pct:0, target_pct:0})} className="w-full py-2 mt-2 border-dashed border-2 rounded-lg text-xs text-slate-500 active:scale-95">+ 新增階梯</button>
                                        </div>
                                    </div>
                                </div>

                                <div className="bg-white rounded-3xl p-6 border border-slate-200">
                                    <div className="flex justify-between mb-4 border-b pb-2"><h2 className="font-black flex items-center gap-2"><Icon name="Activity" size={18} className="text-fin-info"/>衛星標的設定</h2></div>
                                    <div className="space-y-4">
                                        {getArr(inputs.satellites).map(s => (
                                            <div key={s.id} className="bg-slate-50 p-3 rounded-xl border relative">
                                                <button onClick={()=>removeArr('satellites', s.id)} className="absolute top-2 right-2 text-slate-400 hover:text-fin-down active:scale-95"><Icon name="Trash2" size={14}/></button>
                                                
                                                <div className="flex gap-2 mb-2 pr-6">
                                                    <input value={s.underlying} onChange={e=>updateArr('satellites',s.id,'underlying',e.target.value.toUpperCase())} className="w-24 bg-white text-xs p-1.5 rounded border font-black uppercase outline-none" placeholder="正股"/>
                                                    <input value={s.leveraged !== undefined ? s.leveraged : ''} onChange={e=>updateArr('satellites',s.id,'leveraged',e.target.value.toUpperCase())} className="w-24 bg-brand-50 text-brand-700 text-xs p-1.5 rounded border border-brand-200 font-black uppercase outline-none" placeholder="2x槓桿"/>
                                                </div>

                                                <div className="grid grid-cols-3 gap-1 mb-2 bg-white p-1 rounded border">
                                                    <div className="text-center">
                                                        <label className="text-[8px] text-slate-400">前高</label>
                                                        <input type="number" inputMode="decimal" value={s.peak_p} onChange={e=>updateArr('satellites',s.id,'peak_p',e.target.value)} onFocus={e=>e.target.select()} className="w-full font-mono text-[10px] bg-transparent outline-none"/>
                                                    </div>
                                                    <div className="text-center border-l">
                                                        <label className="text-[8px] text-slate-400">建倉均價</label>
                                                        <input type="number" inputMode="decimal" value={s.avg_cost} onChange={e=>updateArr('satellites',s.id,'avg_cost',e.target.value)} onFocus={e=>e.target.select()} className="w-full font-mono text-[10px] bg-transparent outline-none"/>
                                                    </div>
                                                    <div className="text-center border-l">
                                                        <label className="text-[8px] text-slate-400">補倉次</label>
                                                        <input type="number" inputMode="decimal" value={s.rescues} onChange={e=>updateArr('satellites',s.id,'rescues',e.target.value)} onFocus={e=>e.target.select()} className="w-full font-mono text-[10px] bg-transparent outline-none"/>
                                                    </div>
                                                </div>
                                                <div className="grid grid-cols-4 gap-1 bg-white p-1 rounded border">
                                                    <div className="text-center">
                                                        <label className="text-[8px] text-slate-400">200MA</label>
                                                        <input type="number" inputMode="decimal" value={s.ma200} onChange={e=>updateArr('satellites',s.id,'ma200',e.target.value)} onFocus={e=>e.target.select()} className="w-full font-mono text-[10px] bg-transparent outline-none"/>
                                                    </div>
                                                    <div className="text-center border-l">
                                                        <label className="text-[8px] text-fin-info">10MA</label>
                                                        <input type="number" inputMode="decimal" value={s.ma10} onChange={e=>updateArr('satellites',s.id,'ma10',e.target.value)} onFocus={e=>e.target.select()} className="w-full font-mono text-[10px] bg-transparent outline-none"/>
                                                    </div>
                                                    <div className="text-center border-l">
                                                        <label className="text-[8px] text-fin-up">停利%</label>
                                                        <input type="number" inputMode="decimal" value={s.profit_pct} onChange={e=>updateArr('satellites',s.id,'profit_pct',e.target.value)} onFocus={e=>e.target.select()} className="w-full font-mono text-[10px] bg-transparent outline-none"/>
                                                    </div>
                                                    <div className="text-center border-l">
                                                        <label className="text-[8px] text-fin-down">補倉-%</label>
                                                        <input type="number" inputMode="decimal" value={s.loss_pct} onChange={e=>updateArr('satellites',s.id,'loss_pct',e.target.value)} onFocus={e=>e.target.select()} className="w-full font-mono text-[10px] bg-transparent outline-none"/>
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                        <button onClick={()=>addArr('satellites', { underlying:'', leveraged:'', qty_u:0, qty_l:0, opt_p_c:0, opt_d_c:2, ma200:0, ma10:0, peak_p:0, avg_cost:0, target_pct:10, profit_pct:25, loss_pct:7, rescues:0 })} className="w-full py-3 border-dashed border-2 rounded-xl text-slate-500 text-sm active:scale-95">+ 新增衛星</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {view === 'history' && (
                            <div className="space-y-6 animate-in fade-in">
                                <div className="bg-white rounded-3xl p-5 shadow-sm border h-[300px]">
                                    <div className="text-xs font-black text-slate-700 mb-2 flex items-center gap-1"><Icon name="TrendingUp" size={14} className="text-brand-600"/> 資產歷史走勢</div>
                                    {hasCharts && metrics.graphData && metrics.graphData.length > 0 ? (
                                        <ResponsiveContainer width="100%" height="85%">
                                            <ComposedChart data={metrics.graphData} margin={{top:5,right:0,left:-20,bottom:0}}>
                                                <defs>
                                                    <linearGradient id="cEq" x1="0" y1="0" x2="0" y2="1"><stop offset="5%" stopColor="#3b82f6" stopOpacity={0.4}/><stop offset="95%" stopColor="#3b82f6" stopOpacity={0}/></linearGradient>
                                                    <linearGradient id="cDD" x1="0" y1="0" x2="0" y2="1"><stop offset="5%" stopColor="#ef4444" stopOpacity={0.15}/><stop offset="95%" stopColor="#ef4444" stopOpacity={0}/></linearGradient>
                                                </defs>
                                                <XAxis dataKey="date" tickFormatter={v=>new Date(v).toLocaleDateString(undefined,{month:'numeric',day:'numeric'})} tick={{fontSize:10, fill:'#94a3b8'}} axisLine={false} tickLine={false}/>
                                                <YAxis yAxisId="left" tickFormatter={v=>`${(v/1000).toFixed(0)}k`} tick={{fontSize:10, fill:'#64748b'}} axisLine={false} tickLine={false}/>
                                                <YAxis yAxisId="right" orientation="right" tickFormatter={v=>`${v.toFixed(0)}%`} tick={{fontSize:10, fill:'#ef4444'}} domain={['auto', 0]} axisLine={false} tickLine={false}/>
                                                <Tooltip content={<CustomTooltip/>} cursor={{ stroke:'#cbd5e1', strokeDasharray:'3 3' }}/>
                                                <Area yAxisId="left" type="stepAfter" dataKey="equity" stroke="#3b82f6" strokeWidth={2} fill="url(#cEq)" name="總資產"/>
                                                <Area yAxisId="right" type="monotone" dataKey="dd" stroke="none" fill="url(#cDD)" name="大盤跌幅"/>
                                            </ComposedChart>
                                        </ResponsiveContainer>
                                    ) : <div className="h-full flex items-center justify-center text-slate-400 text-xs border border-dashed rounded-xl">尚無歷史戰報</div>}
                                </div>
                                <div className="bg-white rounded-3xl shadow-sm border p-4">
                                    <h3 className="text-sm font-black mb-3 border-b pb-2 flex items-center gap-1"><Icon name="FileText" size={14}/> 歷史紀錄</h3>
                                    {!getArr(records).length ? (
                                        <div className="text-center text-xs text-slate-400 py-6">尚無紀錄</div>
                                    ) : (
                                        <div className="space-y-3 max-h-[500px] overflow-y-auto">
                                            {[...getArr(records)].sort((a,b)=>new Date(b.date)-new Date(a.date)).map(r => (
                                                <div key={r.id} className="bg-slate-50 p-3 rounded-xl border border-slate-100">
                                                    <div className="flex justify-between items-center border-b pb-2 mb-2">
                                                        <span className="text-[10px] font-mono bg-white px-2 py-0.5 rounded border">{new Date(r.date).toLocaleDateString()}</span>
                                                        <div className="flex items-center gap-3">
                                                            <span className="text-brand-600 font-mono font-black">${(r.total_equity||0).toLocaleString()}</span>
                                                            <div className="flex gap-1">
                                                                <button onClick={()=>setModal({type:'EDIT_RECORD', data:r, temp:{}})} className="text-slate-400 hover:text-brand-600 p-1"><Icon name="Edit2" size={14}/></button>
                                                                <button onClick={()=>setModal({type:'DELETE_RECORD', data:r})} className="text-slate-400 hover:text-fin-down p-1"><Icon name="Trash2" size={14}/></button>
                                                            </div>
                                                        </div>
                                                    </div>
                                                    <div className="grid grid-cols-4 gap-1 text-center font-mono text-[9px]">
                                                        <div className="bg-white p-1 rounded border"><div className="text-[8px] text-slate-400">QQQ</div>{r.inputs?.qty_core_1||0}</div>
                                                        <div className="bg-white p-1 rounded border"><div className="text-[8px] text-slate-400">TQQQ</div>{r.inputs?.qty_core_2||0}</div>
                                                        <div className="bg-slate-800 text-brand-100 p-1 rounded border border-slate-700"><div className="text-[8px] text-slate-400">BOXX</div>{r.inputs?.qty_boxx||0}</div>
                                                        <div className="bg-white p-1 rounded border"><div className="text-[8px] text-slate-400">現金</div>{Math.round(r.inputs?.cash_balance||0)}</div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}
                    </main>

                    <nav className="fixed bottom-0 inset-x-0 bg-white border-t z-50 py-2 pb-6 flex justify-around shadow-lg">
                        {[{id:'dashboard',icon:'LayoutDashboard',l:'主控台'},{id:'settings',icon:'Settings',l:'參數設定'},{id:'history',icon:'TrendingUp',l:'戰報'}].map(t => (
                            <button key={t.id} onClick={()=>setView(t.id)} className={`flex flex-col items-center gap-1 flex-1 pt-1 transition-all ${view===t.id?'text-brand-600 -translate-y-1':'text-slate-400'}`}>
                                <Icon name={t.icon} size={22}/>
                                <span className="text-[10px] font-black">{t.l}</span>
                                {view===t.id && <div className="w-1 h-1 bg-brand-600 rounded-full mt-0.5"></div>}
                            </button>
                        ))}
                    </nav>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
