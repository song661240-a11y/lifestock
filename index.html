    const EPS = 1e-6;

    const PLAN_TEXT = `Alpha Horizon Core v5.8（2026 相對強弱簡化版）
— 系統化十年期資產累積策略 —

一、策略核心
以 QQQ 為唯一價格訊號源，不預測市場、不猜高低點。日常只看今日指令、狀態、目標配置與高點追蹤摘要。

二、預設配置
核心-only 模式：核心 85%（QQQ / TQQQ / SPMO）＋ 現金儲備 15%。
完整版模式：核心 75% ＋ 衛星 10% ＋ 現金儲備 15%。
現金儲備可用 BOXX 或現金表示，用於深度回撤與風險緩衝。
衛星部位預設關閉；若開啟，TSLA / IBIT 各 5%，但不干擾核心引擎。

三、高點定義
最新 52W 高點：QQQ 最近約 370 天日收盤價最高值，只用來建立 Locked ATH。
Locked ATH：狂熱突破基準，代表「上一個 52 週收盤高」。突破後鎖住，不跟著最新高點上移。
本輪最新高點：QQQ 本輪即時報價走過的最高價，用來計算回撤與狂熱追蹤停損。
本輪反彈低點：QQQ 從本輪最新高點回撤達第一階 -7% 後，才開始記錄，用於反彈卸除 TQQQ。
冷卻解除價：SPMO 狂熱停損後留下的本輪狂熱高點；QQQ 未重新突破前，不再重啟 SPMO。

四、狂熱模式
當 QQQ 相對 Locked ATH 上漲達 +15%，核心部位轉為 SPMO。若已持有 SPMO，除非觸發狂熱追蹤停損，否則核心目標維持 SPMO，不再被 QQQ / TQQQ 階梯覆蓋。

五、狂熱追蹤停損
若持有 SPMO，且 QQQ 從本輪最新高點回撤達設定門檻（預設 7%），強制 SPMO 退回 QQQ，並進入冷卻狀態。QQQ 重新突破冷卻解除價前，不會再次買回 SPMO。

六、回撤加碼
未處於 SPMO 狂熱持有時，依 QQQ 從本輪最新高點回撤階梯執行 TQQQ：-7%、-14%、-21%、-28%、-35%、-42%。BOXX 使用僅在深度階梯啟動。

七、反彈卸除
自本輪反彈低點起，QQQ 反彈 +10%、+20%、+30% 時分批卸除 TQQQ，最後回到 QQQ。

八、QQQ 情境模擬
情境模擬只用來估算「目前持倉」在 QQQ 上漲或下跌時的粗略資產變化，不產生交易訊號。預設 QQQ 1x、TQQQ 3x、SPMO 1x、衛星依各標的係數估算，BOXX 與現金視為不變。TQQQ 為每日 3 倍 ETF，長期多日結果會受複利與波動耗損影響，因此模擬僅作風險感覺，不等於回測。

九、每日執行紀錄
「我已執行今日指令」只做紀錄，不會自動改股數；實際成交後仍需手動更新持倉，避免系統替你假設成交價格。

十、執行鐵律
所有操作只依照網頁顯示的目標配置與今日指令執行。禁止因新聞、情緒、預測或臨時想法改變策略。`;

    const DEFAULT_DROP_LADDER = [
      { id:"d1", drop_pct:7, move_core_pct:15, use_reserve_pct:0 },

    const migrate = (raw) => {
      const src = raw || {};
      const next = { ...DEFAULT_INPUTS, ...src };
      if (src.reserve_pct_normal !== undefined && src.reserve_target_pct === undefined) next.reserve_target_pct = src.reserve_pct_normal;
      if (src.core_ladder && !src.drop_ladder) {
        next.drop_ladder = getArr(src.core_ladder).map((x, i) => ({
          id: x.id || `d${i + 1}`,
          drop_pct: getNum(x.drop_pct),
          move_core_pct: getNum(x.move_pct),
          use_reserve_pct: getNum(x.use_boxx)
        }));
      }
      if (src.core_bounce_ladder && !src.bounce_ladder) {
        next.bounce_ladder = getArr(src.core_bounce_ladder).map((x, i) => ({
          id: x.id || `b${i + 1}`,
          bounce_pct: getNum(x.bounce_pct),
          sell_pct: getNum(x.sell_pct)
        }));
      }
      next.drop_ladder = getArr(next.drop_ladder).length ? getArr(next.drop_ladder) : DEFAULT_DROP_LADDER;
      next.bounce_ladder = getArr(next.bounce_ladder).length ? getArr(next.bounce_ladder) : DEFAULT_BOUNCE_LADDER;
      next.satellites = getArr(next.satellites).length ? getArr(next.satellites).map(s => {
        const clean = { ...s };
        delete clean.lev_val;
        delete clean.lev_ratio;
        delete clean.qty_l;
        delete clean.leveraged;
        return { ...clean, target_pct: clean.target_pct ?? 5, limit_pct: clean.limit_pct ?? 10, loss_pct: clean.loss_pct ?? 14, ma5: clean.ma5 ?? 0, ma10: clean.ma10 ?? 0, scenario_beta: clean.scenario_beta ?? (String(clean.underlying || "").toUpperCase() === "TSLA" ? 2 : String(clean.underlying || "").toUpperCase() === "IBIT" ? 1.5 : 1.5) };
      }) : DEFAULT_SATELLITES;
      if (next.satellites_enabled === undefined) next.satellites_enabled = false;
      if (next.scenario_qqq_move_pct === undefined) next.scenario_qqq_move_pct = -10;

    class ErrorBoundary extends React.Component {
      constructor(props) { super(props); this.state = { hasError:false, message:"" }; }

    const Pill = ({ children, tone="slate" }) => {

      return <span className={`inline-flex items-center px-2.5 py-1 rounded-full border text-[11px] font-black ${cls}`}>{children}</span>;
    };

        </div>
      );

    const ScenarioRow = ({ name, beta, value, pnl, tone="slate" }) => {

      <div className="px-1 pt-1">
        <div className="text-[11px] font-black tracking-widest text-brand-600 uppercase">{title}</div>
        {desc && <div className="text-xs text-slate-500 mt-1 leading-relaxed">{desc}</div>}
      </div>
    );


    const SectionTitle = ({ title, desc, right }) => (
      <div className="flex items-end justify-between gap-3 mb-3">
        <div>
          <h2 className="font-black text-slate-900">{title}</h2>
          {desc && <p className="text-xs text-slate-500 mt-1 leading-relaxed">{desc}</p>}
        </div>
        {right}
      </div>
    );

    const App = () => {
      const [inputs, setInputs] = useState(() => {
        try {
          const local = localStorage.getItem("ah_core_v5_backup") || localStorage.getItem("ah_local_backup_2026");
          return local ? migrate(JSON.parse(local)) : DEFAULT_INPUTS;
        } catch (e) { return DEFAULT_INPUTS; }
      });
      const [prices, setPrices] = useState({});
      const [lastPriceUpdatedAt, setLastPriceUpdatedAt] = useState(null);
      const [user, setUser] = useState(null);
      const [authError, setAuthError] = useState("");
      const [page, setPage] = useState("home");
      const [message, setMessage] = useState("");
      const [loadingPrices, setLoadingPrices] = useState(false);
      const [syncingHistory, setSyncingHistory] = useState(false);
      const [saving, setSaving] = useState(false);
      const [cloudReady, setCloudReady] = useState(false);
      const [cloudLoaded, setCloudLoaded] = useState(false);
      const saveTimerRef = useRef(null);
      const ignoreSnapshotRef = useRef(false);
      const [collapsed, setCollapsed] = useState(() => {
        try { return JSON.parse(localStorage.getItem("ah_core_v5_collapsed")) || {}; }
        catch (e) { return {}; }
      });
      const toggleCollapse = useCallback((id) => {
        setCollapsed(prev => {
          const next = { ...prev, [id]: !prev[id] };
          try { localStorage.setItem("ah_core_v5_collapsed", JSON.stringify(next)); } catch (e) {}
          return next;
        });
      }, []);

      const showToast = useCallback((txt) => {
        setMessage(txt);
        setTimeout(() => setMessage(""), 2600);
      }, []);

      const refs = useCallback(() => {
        if (!user) return null;
        return { confRef: db.collection("artifacts").doc(appId).collection("users").doc(user.uid).collection("config").doc("current") };
      }, [user]);

      useEffect(() => {
        const init = async () => {
          try {
            if (!auth.currentUser) await auth.signInAnonymously();
          } catch (e) { setAuthError("跨裝置同步初始化異常，請檢查瀏覽器是否封鎖第三方或彈窗。"); }
        };
        const unsub = auth.onAuthStateChanged(usr => {
          if (usr) { setUser(usr); setAuthError(""); }
          else init();
        });
        return () => unsub();
      }, []);

      useEffect(() => {
        const r = refs();
        if (!r) return;
        setCloudLoaded(false);
        const unsub = r.confRef.onSnapshot(snap => {
          if (ignoreSnapshotRef.current) return;
          if (snap.exists) {
            const data = snap.data() || {};
            setInputs(prev => migrate({ ...prev, ...data }));
          }
          setCloudReady(true);
          setCloudLoaded(true);
        }, err => {
          console.error(err);
          setAuthError("跨裝置同步讀取失敗，可能是權限或網路問題。");
          setCloudReady(false);
          setCloudLoaded(true);
        });
        return () => unsub();
      }, [refs]);

      useEffect(() => {
        try { localStorage.setItem("ah_core_v5_backup", JSON.stringify(inputs)); } catch (e) {}
        if (!user || !cloudLoaded) return;
        clearTimeout(saveTimerRef.current);
        saveTimerRef.current = setTimeout(async () => {
          const r = refs();
          if (!r) return;
          try {
            ignoreSnapshotRef.current = true;
            await r.confRef.set(sanitize(inputs), { merge:true });
            setTimeout(() => { ignoreSnapshotRef.current = false; }, 500);
          } catch (e) {
            ignoreSnapshotRef.current = false;
            console.error(e);
            setAuthError("跨裝置自動同步失敗，請稍後再試。");
          }
        }, 1200);
        return () => clearTimeout(saveTimerRef.current);
      }, [inputs, user, cloudLoaded, refs]);

      const handleGoogleLogin = async () => {
        try {
          const provider = new firebase.auth.GoogleAuthProvider();
          if (auth.currentUser && auth.currentUser.isAnonymous) {
            try { await auth.currentUser.linkWithPopup(provider); showToast("跨裝置同步已啟用"); }
            catch (e) {
              if (e.code === "auth/credential-already-in-use" && e.credential) {
                await auth.signInWithCredential(e.credential);
                showToast("跨裝置同步已啟用");
              } else if (e.code === "auth/credential-already-in-use") {
                await auth.signInWithPopup(provider);
                showToast("跨裝置同步已啟用");
              } else throw e;
            }
          } else {
            await auth.signInWithPopup(provider);
            showToast("跨裝置同步已啟用");
          }
          setAuthError("");
        } catch (e) {
          console.error(e);
          setAuthError(e.message || "跨裝置同步啟用失敗");
        }
      };

      const handleLogout = async () => {
        try {
          await auth.signOut();
          await auth.signInAnonymously();
          showToast("已關閉跨裝置同步，改為本機模式");
        } catch (e) { setAuthError("登出失敗"); }
      };

      const setField = (key, value) => setInputs(prev => ({ ...prev, [key]: value }));
      const updateArr = (arrKey, id, field, value) => {
        setInputs(prev => ({ ...prev, [arrKey]: getArr(prev[arrKey]).map(x => x.id === id ? { ...x, [field]: value } : x) }));
      };

      const symbols = useMemo(() => {
        const base = ["QQQ", "TQQQ", "SPMO", "BOXX"];
        if (inputs.satellites_enabled) {
          getArr(inputs.satellites).forEach(s => { if (s.underlying) base.push(String(s.underlying).trim().toUpperCase()); });
        }
        return [...new Set(base.filter(Boolean))];
      }, [inputs.satellites_enabled, inputs.satellites]);

      const fetchPrices = useCallback(async () => {
        if (loadingPrices) return;
        setLoadingPrices(true);
        try {
          const jobs = symbols.map(sym => fetch(`https://finnhub.io/api/v1/quote?symbol=${encodeURIComponent(sym)}&token=${FINNHUB_KEY}`).then(r => r.json()).then(d => ({ sym, price:getNum(d.c) })));
          const res = await Promise.allSettled(jobs);
          const patch = {};
          res.forEach(item => {
            if (item.status === "fulfilled" && item.value.price > 0) patch[item.value.sym] = item.value.price;
          });
          if (Object.keys(patch).length) {
            setPrices(prev => ({ ...prev, ...patch }));
            setLastPriceUpdatedAt(new Date());
          }
          else showToast("報價暫時沒有更新");
        } catch (e) {
          console.error(e);
          showToast("報價更新失敗");
        } finally { setLoadingPrices(false); }
      }, [loadingPrices, symbols, showToast]);

      const symbolsKey = useMemo(() => symbols.join(","), [symbols]);
      useEffect(() => { fetchPrices(); }, [symbolsKey]);

      const fetchQQQHistory = useCallback(async (manual = false) => {
        if (syncingHistory || inputs.auto_high_tracking === false) return;
        setSyncingHistory(true);
        try {
          const to = Math.floor(Date.now() / 1000);
          const from = to - 370 * 24 * 60 * 60;
          const res = await fetch(`https://finnhub.io/api/v1/stock/candle?symbol=QQQ&resolution=D&from=${from}&to=${to}&token=${FINNHUB_KEY}`);
          const data = await res.json();
          if (data?.s === "ok" && Array.isArray(data.c) && data.c.length) {
            const closes = data.c.map(Number).filter(v => v > 0);
            const high52w = closes.length ? Math.max(...closes) : 0;
            if (high52w > 0) {
              setInputs(prev => {
                if (prev.auto_high_tracking === false) return prev;
                const q = getNum(prices.QQQ);
                const hasSpmo = getNum(prev.qty_spmo) > 0;
                const cooldown = getNum(prev.mania_cooldown_until_high) > 0;
                const next = { ...prev, qqq_history_high_52w: round2(high52w), qqq_history_sync_date: todayStr() };
                if (!hasSpmo && !cooldown) {
                  next.qqq_locked_ath = round2(high52w);
                  next.qqq_breakout_active = q > high52w;
                  next.qqq_breakout_lock_price = q > high52w ? round2(high52w) : 0;
                } else if (getNum(prev.qqq_locked_ath) <= 0) {
                  next.qqq_locked_ath = round2(high52w);
                }
                if (getNum(prev.qqq_latest_high) <= 0) next.qqq_latest_high = round2(Math.max(high52w, q || 0));
                if (getNum(prev.qqq_wave_low) <= 0 && q > 0) next.qqq_wave_low = round2(q);
                return next;
              });
              if (manual) showToast("已同步 QQQ 52W 收盤高");
            }
          } else if (manual) showToast("52W 同步失敗，保留目前資料");
        } catch (e) {
          console.error(e);
          if (manual) showToast("52W 同步失敗");
        } finally { setSyncingHistory(false); }
      }, [syncingHistory, inputs.auto_high_tracking, prices.QQQ, showToast]);

      useEffect(() => { if (prices.QQQ > 0) fetchQQQHistory(false); }, [prices.QQQ]);

      const firstDropPct = useCallback((ladder) => {
        const xs = getArr(ladder).map(x => getNum(x.drop_pct)).filter(v => v > 0).sort((a,b) => a - b);
        return xs[0] || 7;
      }, []);

      const autoUpdateTracking = useCallback(() => {
        if (inputs.auto_high_tracking === false) return;
        const qBase = getNum(prices.QQQ);
        const qSim = getNum(inputs.sim_qqq_price);
        const q = qSim > 0 ? qSim : qBase;
        const spmo = getNum(prices.SPMO);
        if (q <= 0 && spmo <= 0) return;

        setInputs(prev => {
          if (prev.auto_high_tracking === false) return prev;
          const next = { ...prev };
          let changed = false;
          const write = (key, value) => {
            const normalized = typeof value === "number" ? round2(value) : value;
            if (next[key] !== normalized) { next[key] = normalized; changed = true; }
          };
          const hasSpmo = getNum(prev.qty_spmo) > 0;

          if (q > 0) {
            const oldHigh = getNum(prev.qqq_latest_high);
            const madeNewHigh = oldHigh <= 0 || q >= oldHigh;
            const latestHigh = madeNewHigh ? q : oldHigh;
            write("qqq_latest_high", latestHigh);

            const drop1 = firstDropPct(prev.drop_ladder);
            const currentDD = latestHigh > 0 && q < latestHigh ? ((latestHigh - q) / latestHigh) * 100 : 0;
            const oldLow = getNum(prev.qqq_wave_low);
            let waveLow = oldLow > 0 ? oldLow : q;
            if (madeNewHigh) waveLow = q;
            else if (currentDD + EPS >= drop1) waveLow = oldLow > 0 && oldLow < latestHigh ? Math.min(oldLow, q) : q;
            write("qqq_wave_low", waveLow);

            let locked = getNum(prev.qqq_locked_ath);
            let breakoutActive = prev.qqq_breakout_active === true;
            let breakoutLock = getNum(prev.qqq_breakout_lock_price);
            const high52 = getNum(prev.qqq_history_high_52w);
            if (locked <= 0) locked = high52 || q;
            if (!breakoutActive && locked > 0 && q > locked) {
              breakoutActive = true;
              breakoutLock = locked;
            }
            if (breakoutActive && breakoutLock > 0) locked = breakoutLock;
            const breakoutFailed = breakoutActive && breakoutLock > 0 && !hasSpmo && q < breakoutLock * 0.98;
            if (breakoutFailed) {
              breakoutActive = false;
              breakoutLock = 0;
              locked = high52 || locked;
            }
            write("qqq_locked_ath", locked);
            write("qqq_breakout_active", breakoutActive);
            write("qqq_breakout_lock_price", breakoutLock);

            const stopPct = Math.max(1, getNum(prev.mania_trailing_stop_pct) || 7);
            const maniaStopNow = hasSpmo && latestHigh > 0 && q <= latestHigh * (1 - stopPct / 100) + 0.01;
            if (maniaStopNow) write("mania_cooldown_until_high", latestHigh);
            const cooldownHigh = getNum(next.mania_cooldown_until_high);
            if (cooldownHigh > 0 && q >= cooldownHigh) write("mania_cooldown_until_high", 0);

            const cooldownNow = getNum(next.mania_cooldown_until_high) > 0 && q < getNum(next.mania_cooldown_until_high);
            const riseFromLocked = locked > 0 ? ((q - locked) / locked) * 100 : 0;
            const maniaNow = !cooldownNow && (hasSpmo || riseFromLocked >= 15);
            write("auto_tracking_state", maniaStopNow ? "MANIA_EXIT" : (cooldownNow ? "COOLDOWN" : (maniaNow ? "MANIA" : (currentDD >= drop1 ? "DRAWDOWN" : "BASE"))));
            write("auto_tracking_last_sync", todayStr());
          }

          if (spmo > 0) {
            const oldSpmoHigh = getNum(prev.spmo_latest_high);
            if (hasSpmo) write("spmo_latest_high", oldSpmoHigh > 0 ? Math.max(oldSpmoHigh, spmo) : spmo);
            else if (oldSpmoHigh > 0) write("spmo_latest_high", 0);
          }
          return changed ? next : prev;
        });
      }, [inputs.auto_high_tracking, inputs.sim_qqq_price, prices.QQQ, prices.SPMO, firstDropPct]);

      useEffect(() => { autoUpdateTracking(); }, [autoUpdateTracking]);

      const metrics = useMemo(() => {
        const pQQQReal = getNum(prices.QQQ);
        const sim = getNum(inputs.sim_qqq_price);
        const pQQQ = sim > 0 ? sim : pQQQReal;
        const pTQQQ = getNum(prices.TQQQ);
        const pSPMO = getNum(prices.SPMO);
        const pBOXX = getNum(prices.BOXX) || 100;
        const vQQQ = getNum(inputs.qty_core_1) * pQQQ;
        const vTQQQ = getNum(inputs.qty_core_2) * pTQQQ;
        const vSPMO = getNum(inputs.qty_spmo) * pSPMO;
        const vBOXX = getNum(inputs.qty_boxx) * pBOXX;
        const cash = getNum(inputs.cash_balance);
        const satellitesEnabled = inputs.satellites_enabled === true;
        const satStats = satellitesEnabled ? getArr(inputs.satellites).map(s => {
          const sym = String(s.underlying || "").trim().toUpperCase();
          const price = getNum(prices[sym]);
          const value = price * getNum(s.qty_u);
          const targetPct = getNum(s.target_pct);
          const limitPct = getNum(s.limit_pct) || 10;
          const ma5 = getNum(s.ma5), ma10 = getNum(s.ma10);
          const scenarioBeta = Math.max(0, getNum(s.scenario_beta) || (sym === "TSLA" ? 2 : sym === "IBIT" ? 1.5 : 1.5));
          return { ...s, sym, price, value, targetPct, limitPct, ma5, ma10, scenarioBeta };
        }) : [];
        const vSat = satStats.reduce((sum, s) => sum + s.value, 0);
        const total = vQQQ + vTQQQ + vSPMO + vBOXX + cash + vSat;
        const safeTotal = total > 0 ? total : 1;
        const growthMarketValue = vQQQ + vTQQQ + vSPMO + vSat;
        const stockEquivalentExposure = vQQQ + (vTQQQ * 3) + vSPMO + vSat;
        const totalLeverageRatio = total > 0 ? stockEquivalentExposure / safeTotal : 0;
        const growthLeverageRatio = growthMarketValue > 0 ? stockEquivalentExposure / growthMarketValue : 0;

        const reservePct = Math.min(100, Math.max(0, getNum(inputs.reserve_target_pct)));
        const maxSatTargetPct = Math.max(0, 100 - reservePct);
        const satTargetRawPct = satellitesEnabled ? getArr(inputs.satellites).reduce((sum, s) => sum + Math.max(0, getNum(s.target_pct)), 0) : 0;
        const satTargetWarning = satellitesEnabled && satTargetRawPct > maxSatTargetPct;
        const effectiveSatTargetPct = Math.min(satTargetRawPct, maxSatTargetPct);
        const coreBasePct = Math.max(0, 100 - reservePct - effectiveSatTargetPct);
        const locked = getNum(inputs.qqq_locked_ath);
        const latestHigh = getNum(inputs.qqq_latest_high);
        const waveLow = getNum(inputs.qqq_wave_low);
        const cooldownHigh = getNum(inputs.mania_cooldown_until_high);
        const cDD = latestHigh > 0 && pQQQ > 0 && pQQQ < latestHigh ? ((latestHigh - pQQQ) / latestHigh) * 100 : 0;
        const cRise = locked > 0 && pQQQ > 0 ? ((pQQQ - locked) / locked) * 100 : null;
        const cBounce = waveLow > 0 && pQQQ > waveLow ? ((pQQQ - waveLow) / waveLow) * 100 : 0;
        const maniaStopPct = Math.max(1, getNum(inputs.mania_trailing_stop_pct) || 7);
        const hasSpmo = getNum(inputs.qty_spmo) > 0 || vSPMO > 50;
        const maniaTrailingExit = hasSpmo && latestHigh > 0 && pQQQ > 0 && pQQQ <= latestHigh * (1 - maniaStopPct / 100) + 0.01;
        const cooldownActive = cooldownHigh > 0 && pQQQ > 0 && pQQQ < cooldownHigh;
        const maniaEntrySignal = !hasSpmo && !cooldownActive && cRise !== null && cRise >= 15;
        const maniaHoldActive = hasSpmo && !maniaTrailingExit;
        const firstDrop = firstDropPct(inputs.drop_ladder);

        let state = "BASE";
        let title = "一般核心模式";
        let tone = "blue";
        let instruction = "維持既定配置，不需要動作。";
        if (maniaTrailingExit) { state = "MANIA_EXIT"; title = "狂熱停損觸發"; tone = "red"; instruction = "賣出 SPMO，核心部位退回 QQQ，並進入冷卻。"; }
        else if (cooldownActive) { state = "COOLDOWN"; title = "狂熱冷卻中"; tone = "amber"; instruction = "維持 QQQ；QQQ 重新突破冷卻解除價前，不重啟 SPMO。"; }
        else if (maniaHoldActive || maniaEntrySignal) { state = "MANIA"; title = maniaEntrySignal ? "狂熱模式啟動" : "SPMO 狂熱持有中"; tone = "purple"; instruction = "核心部位目標維持 SPMO；未觸發追蹤停損前，不切回 QQQ / TQQQ。"; }
        else if (inputs.is_bear_meltdown) { state = "MELTDOWN"; title = "熊市熔斷"; tone = "red"; instruction = "停止新增 TQQQ，保留 BOXX，等待熔斷解除。"; }
        else if (cDD + EPS >= firstDrop) { state = "DRAWDOWN"; title = "回撤加碼區"; tone = "red"; instruction = `QQQ 自本輪高點回撤 ${pct(cDD)}，依階梯配置 TQQQ。`; }
        else if (cRise !== null && cRise >= 0) { state = "BREAKOUT"; title = "突破確認中"; tone = "green"; instruction = `QQQ 高於 Locked ATH ${signedPct(cRise)}，尚未達 +15% 則維持 QQQ。`; }

        let targetReservePct = reservePct;
        let tQQQPct = coreBasePct;
        let tTQQQPct = 0;
        let tSPMOPct = 0;

        if (state === "MANIA") {
          tSPMOPct = coreBasePct; tQQQPct = 0; tTQQQPct = 0;
        } else if (state === "MANIA_EXIT" || state === "COOLDOWN") {
          tSPMOPct = 0; tQQQPct = coreBasePct; tTQQQPct = 0;
        } else {
          let tqqqFromCore = 0;
          let tqqqFromReserve = 0;
          if (cDD + EPS >= firstDrop && !inputs.is_bear_meltdown) {
            getArr(inputs.drop_ladder).forEach(l => {
              if (cDD + EPS >= getNum(l.drop_pct)) {
                tqqqFromCore += getNum(l.move_core_pct);
                tqqqFromReserve += reservePct * (getNum(l.use_reserve_pct) / 100);
              }
            });
          }
          let bounceSell = 0;
          let highestBounce = 0;
          if (cBounce > 0) {
            getArr(inputs.bounce_ladder).forEach(l => {
              if (cBounce + EPS >= getNum(l.bounce_pct)) { bounceSell += getNum(l.sell_pct); highestBounce = Math.max(highestBounce, getNum(l.bounce_pct)); }
            });
          }
          bounceSell = Math.min(100, bounceSell);
          const retain = (100 - bounceSell) / 100;
          tqqqFromCore *= retain;
          tqqqFromReserve *= retain;
          targetReservePct = Math.max(0, reservePct - tqqqFromReserve);
          const coreDynamicPct = Math.max(0, 100 - targetReservePct - effectiveSatTargetPct);
          tTQQQPct = Math.min(coreDynamicPct, tqqqFromCore + tqqqFromReserve);
          if (inputs.is_bear_meltdown) tTQQQPct = Math.min(tTQQQPct, (vTQQQ / safeTotal) * 100);
          tSPMOPct = 0;
          tQQQPct = Math.max(0, coreDynamicPct - tTQQQPct);
          if (bounceSell > 0 && state !== "DRAWDOWN") {
            instruction = bounceSell >= 100 ? "反彈卸除完成：清空 TQQQ，全部回 QQQ。" : `QQQ 自低點反彈到 ${highestBounce}%，賣出帳上 ${bounceSell}% TQQQ 回 QQQ。`;
          }
        }

        const tQQQVal = safeTotal * tQQQPct / 100;
        const tTQQQVal = safeTotal * tTQQQPct / 100;
        const tSPMOVal = safeTotal * tSPMOPct / 100;
        const tReserveVal = safeTotal * targetReservePct / 100;
        const diffQQQ = tQQQVal - vQQQ;
        const diffTQQQ = tTQQQVal - vTQQQ;
        const diffSPMO = tSPMOVal - vSPMO;
        const diffBOXX = tReserveVal - (vBOXX + cash);

        const actions = [];
        if (total <= 0) actions.push("請先輸入目前持倉數量，系統才會產生買賣指令。");
        else {
          [{ name:"QQQ", diff:diffQQQ }, { name:"TQQQ", diff:diffTQQQ }, { name:"SPMO", diff:diffSPMO }, { name:"BOXX", diff:diffBOXX }].forEach(x => {
            if (Math.abs(x.diff) >= 50) actions.push(`${x.diff > 0 ? "買入" : "賣出"} ${x.name} 約 $${money(Math.abs(x.diff))}`);
          });
          if (satTargetWarning) actions.unshift(`衛星目標占比合計 ${pct(satTargetRawPct)} 已超過可用上限 ${pct(maxSatTargetPct)}，系統已先用上限計算。`);
          if (!actions.length) actions.push("目前與目標配置差距很小，維持不動。");
        }

        const rows = [
          { name:"QQQ", currentPct:vQQQ / safeTotal * 100, targetPct:tQQQPct, diff:diffQQQ, value:vQQQ, tone:"blue" },
          { name:"TQQQ", currentPct:vTQQQ / safeTotal * 100, targetPct:tTQQQPct, diff:diffTQQQ, value:vTQQQ, tone:"red" },
          { name:"SPMO", currentPct:vSPMO / safeTotal * 100, targetPct:tSPMOPct, diff:diffSPMO, value:vSPMO, tone:"purple" },
          { name:"BOXX / 現金", currentPct:(vBOXX + cash) / safeTotal * 100, targetPct:targetReservePct, diff:diffBOXX, value:vBOXX + cash, tone:"green" }
        ];
        if (satellitesEnabled) rows.push({ name:"衛星", currentPct:vSat / safeTotal * 100, targetPct:effectiveSatTargetPct, diff:(safeTotal * effectiveSatTargetPct / 100) - vSat, value:vSat, tone:"slate" });


        const buildScenario = (movePctRaw) => {
          const movePct = Math.max(-95, Math.min(200, getNum(movePctRaw)));
          const scenarioMove = movePct / 100;
          const cappedMove = (beta) => Math.max(-1, scenarioMove * Math.max(0, getNum(beta)));
          const rows = [
            { name:"QQQ", beta:1, value:vQQQ, pnl:vQQQ * cappedMove(1), tone:"blue" },
            { name:"TQQQ", beta:getNum(inputs.scenario_tqqq_beta) || 3, value:vTQQQ, pnl:vTQQQ * cappedMove(getNum(inputs.scenario_tqqq_beta) || 3), tone:"red" },
            { name:"SPMO", beta:getNum(inputs.scenario_spmo_beta) || 1, value:vSPMO, pnl:vSPMO * cappedMove(getNum(inputs.scenario_spmo_beta) || 1), tone:"purple" },
            ...satStats.map(s => ({ name:s.sym || "衛星", beta:s.scenarioBeta, value:s.value, pnl:s.value * cappedMove(s.scenarioBeta), tone:"slate" })),
            { name:"BOXX / 現金", beta:0, value:vBOXX + cash, pnl:0, tone:"green" }
          ].filter(x => Math.abs(x.value) > 0.01 || x.name === "BOXX / 現金");
          const pnl = rows.reduce((sum, r) => sum + r.pnl, 0);
          const nextTotal = total + pnl;
          const pctMove = total > 0 ? (pnl / total) * 100 : 0;
          const biggest = rows.filter(r => Math.abs(r.pnl) > 0.01).sort((a,b) => Math.abs(b.pnl) - Math.abs(a.pnl))[0] || null;
          return { movePct, pnl, total:nextTotal, pct:pctMove, rows, biggest };
        };
        const activeScenario = buildScenario(inputs.scenario_qqq_move_pct);
        const stressMoves = [-7, -14, -21, -28, -35, -42];
        const stressRows = stressMoves.map(m => {
          const s = buildScenario(m);
          return { movePct:m, pnl:s.pnl, total:s.total, pct:s.pct };
        });
        const riskMinus10 = buildScenario(-10);
        const lossLimit = Math.max(0, getNum(inputs.max_loss_amount));
        const scenarioLossStatus = lossLimit > 0 && activeScenario.pnl < 0
          ? (Math.abs(activeScenario.pnl) <= lossLimit ? "within" : "over")
          : "unset";
        const riskMinus10Status = lossLimit > 0 && riskMinus10.pnl < 0
          ? (Math.abs(riskMinus10.pnl) <= lossLimit ? "within" : "over")
          : "unset";
        const primaryAction = actions.length ? actions[0] : "維持不動";
        const tradeNeeded = actions.some(a => /買入|賣出|清空|退回/.test(a)) && !actions.some(a => a.includes("請先輸入"));
        const drawdownNote = latestHigh > 0
          ? `QQQ 距離本輪高點回撤 -${pct(cDD)}，${cDD + EPS >= firstDrop ? `已達第一階 -${pct(firstDrop, 0)}，會進入 TQQQ 階梯判斷。` : `尚未達第一階 -${pct(firstDrop, 0)}，不啟動 TQQQ 加碼。`}`
          : "尚未建立本輪最新高點，請先更新 QQQ 報價或同步 52W。";
        const maniaNote = locked > 0 && cRise !== null
          ? `狂熱基準 Locked ATH 為 $${money(locked, 2)}，目前距離基準 ${signedPct(cRise)}，${cRise >= 15 ? "已達 +15% 狂熱門檻。" : "尚未達 +15%，不轉 SPMO。"}`
          : "尚未建立 Locked ATH，無法判斷 +15% 狂熱門檻。";
        const cooldownNote = cooldownActive
          ? `目前冷卻中；QQQ 需重新突破 $${money(cooldownHigh, 2)}，才允許下一次 SPMO 狂熱模式。`
          : (hasSpmo ? `持有 SPMO 時，QQQ 跌破 $${money(latestHigh > 0 ? latestHigh * (1 - maniaStopPct / 100) : 0, 2)} 會觸發狂熱追蹤停損。` : "目前沒有狂熱冷卻限制。" );

        let latestJudgement = "目前資料不足，請先更新報價並輸入持倉。";
        if (total > 0) {
          if (state === "MANIA_EXIT") latestJudgement = `QQQ 已自狂熱高點回撤達 -${pct(cDD)}，觸發 SPMO 退場；今日偏減碼 / 降風險，照交易清單退回 QQQ。`;
          else if (state === "COOLDOWN") latestJudgement = `目前在狂熱冷卻中；QQQ 未重新突破 $${money(cooldownHigh, 2)} 前，不重新買回 SPMO，今日以維持 QQQ 為主。`;
          else if (state === "MANIA") latestJudgement = hasSpmo ? `目前為 SPMO 狂熱持有中；QQQ 尚未跌破追蹤停損線 $${money(latestHigh > 0 ? latestHigh * (1 - maniaStopPct / 100) : 0, 2)}，暫不切回 QQQ / TQQQ。` : `QQQ 距 Locked ATH 已達 ${signedPct(cRise || 0)}，觸發狂熱模式；今日重點是把核心部位轉向 SPMO。`;
          else if (state === "MELTDOWN") latestJudgement = "熊市熔斷已啟動；停止新增 TQQQ，優先保留 BOXX / 現金，今日只做必要降風險。";
          else if (state === "DRAWDOWN") latestJudgement = `QQQ 距本輪高點回撤 -${pct(cDD)}，已進入回撤階梯；若交易清單出現 TQQQ / BOXX 動作，就照清單加碼。`;
          else if (state === "BREAKOUT") latestJudgement = `QQQ 高於 Locked ATH ${signedPct(cRise || 0)}，但尚未達 +15% 狂熱門檻；目前不追 SPMO，維持核心配置。`;
          else latestJudgement = `QQQ 距本輪高點回撤 -${pct(cDD)}，尚未達第一階 -${pct(firstDrop, 0)}；目前不用加碼或減碼，照配置維持。`;
        }

        return {
          prices: { pQQQ, pQQQReal, pTQQQ, pSPMO, pBOXX },
          values: { vQQQ, vTQQQ, vSPMO, vBOXX, cash, vSat, total, growthMarketValue, stockEquivalentExposure, totalLeverageRatio, growthLeverageRatio },
          state, title, tone, instruction, actions,
          rows,
          t: { q:tQQQPct, tq:tTQQQPct, sm:tSPMOPct, r:targetReservePct, sat:effectiveSatTargetPct },
          diff: { q:diffQQQ, tq:diffTQQQ, sm:diffSPMO, r:diffBOXX },
          high: { locked, latestHigh, waveLow, cDD, cRise, cBounce, cooldownHigh, maniaStopPct, maniaStopLine: latestHigh > 0 ? latestHigh * (1 - maniaStopPct / 100) : 0, high52:getNum(inputs.qqq_history_high_52w), notes:[drawdownNote, maniaNote, cooldownNote] },
          satStats,
          scenario: { ...activeScenario, stressRows, riskMinus10, lossLimit, scenarioLossStatus, riskMinus10Status },
          ux: { primaryAction, tradeNeeded, latestJudgement },
          warnings: { satTargetWarning, satTargetRawPct, maxSatTargetPct }
        };
      }, [prices, inputs, firstDropPct]);

      const priceFreshness = useMemo(() => {
        if (!lastPriceUpdatedAt) return { label:"尚未更新報價", stale:true, minutes:null };
        const minutes = Math.max(0, Math.floor((Date.now() - lastPriceUpdatedAt.getTime()) / 60000));
        if (minutes < 1) return { label:"剛剛更新", stale:false, minutes };
        if (minutes < 30) return { label:`${minutes} 分鐘前更新`, stale:false, minutes };
        return { label:`${minutes} 分鐘前更新｜可能過期`, stale:true, minutes };
      }, [lastPriceUpdatedAt, loadingPrices]);

      const paramLocked = inputs.params_unlocked !== true;

      const saveNow = async () => {
        const r = refs();
        if (!r) return;
        setSaving(true);
        try {
          await r.confRef.set(sanitize(inputs), { merge:true });
          showToast("已同步跨裝置資料");
        } catch (e) { setAuthError("跨裝置同步失敗"); }
        setSaving(false);
      };

      const loadCloudNow = async () => {
        const r = refs();
        if (!r) return;
        try {
          const snap = await r.confRef.get();
          if (snap.exists) {
            setInputs(prev => migrate({ ...prev, ...(snap.data() || {}) }));
            showToast("已重新讀取跨裝置資料");
          } else {
            showToast("尚無跨裝置資料");
          }
        } catch (e) {
          console.error(e);
          setAuthError("讀取跨裝置資料失敗，請確認同步狀態與網路。");
        }
      };

      const resetCycle = () => {
        const q = metrics.prices.pQQQ;
        if (q <= 0) { showToast("尚未取得 QQQ 報價"); return; }
        setInputs(prev => ({
          ...prev,
          qqq_latest_high: round2(q),
          qqq_wave_low: round2(q),
          spmo_latest_high: getNum(prev.qty_spmo) > 0 ? round2(metrics.prices.pSPMO) : 0,
          mania_cooldown_until_high: 0,
          qqq_breakout_active: false,
          qqq_breakout_lock_price: 0,
          auto_tracking_state: "BASE",
          auto_tracking_last_sync: todayStr()
        }));
        showToast("已重設本輪高低點循環");
      };

      const copyCommand = async () => {
        const text = `【Alpha Horizon Core v5.8】\n日期：${todayStr()}\n狀態：${metrics.title}\n總資產市值：$${money(metrics.values.total)}\n股票等效曝險：$${money(metrics.values.stockEquivalentExposure)}\n總曝險槓桿：${metrics.values.totalLeverageRatio.toFixed(2)}x\n成長部位槓桿：${metrics.values.growthLeverageRatio.toFixed(2)}x\n\n今日指令：\n${metrics.actions.map(x => `- ${x}`).join("\n")}\n\n目標配置：QQQ ${pct(metrics.t.q)} / TQQQ ${pct(metrics.t.tq)} / SPMO ${pct(metrics.t.sm)} / BOXX ${pct(metrics.t.r)}${inputs.satellites_enabled ? ` / 衛星 ${pct(metrics.t.sat)}` : ""}`;
        try {
          await navigator.clipboard.writeText(text);
          showToast("已複製今日指令");
        } catch (e) { showToast("複製失敗，請手動選取"); }
      };

      const exportData = () => {
        const blob = new Blob([JSON.stringify(inputs, null, 2)], { type:"application/json" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = `alpha-horizon-core-v5-8-${todayStr()}.json`;
        a.click();
        URL.revokeObjectURL(a.href);
      };

      const importData = (file) => {
        if (!file) return;
        const reader = new FileReader();
        reader.onload = () => {
          try {
            const parsed = JSON.parse(reader.result);
            setInputs(migrate(parsed));
            showToast("已匯入資料");
          } catch (e) { showToast("匯入失敗，檔案格式不正確"); }
        };
        reader.readAsText(file);
      };

      const syncToCloud = async (data, successMessage = "已同步跨裝置資料") => {
        const r = refs();
        if (!r) return false;
        setSaving(true);
        try {
          await r.confRef.set(sanitize(data), { merge:true });
          showToast(successMessage);
          return true;
        } catch (e) {
          console.error(e);
          setAuthError("跨裝置同步失敗");
          return false;
        } finally {
          setSaving(false);
        }
      };

      const buildHoldingsSnapshot = () => {
        const sats = inputs.satellites_enabled ? getArr(inputs.satellites).map(s => {
          const symbol = String(s.underlying || "").trim().toUpperCase();
          const qty = getNum(s.qty_u);
          const price = Number(prices[symbol] || 0);
          return { symbol, qty, price, value: qty * price };
        }) : [];
        return {
          qqq: { qty: getNum(inputs.qty_core_1), price: metrics.prices.pQQQ, value: metrics.values.vQQQ },
          tqqq: { qty: getNum(inputs.qty_core_2), price: metrics.prices.pTQQQ, value: metrics.values.vTQQQ },
          spmo: { qty: getNum(inputs.qty_spmo), price: metrics.prices.pSPMO, value: metrics.values.vSPMO },
          boxx: { qty: getNum(inputs.qty_boxx), price: metrics.prices.pBOXX, value: metrics.values.vBOXX },
          cash: { value: getNum(inputs.cash_balance) },
          satellites: sats
        };
      };

      const updateExecutionLog = (id, patch) => {
        setInputs(prev => ({
          ...prev,
          execution_logs: getArr(prev.execution_logs).map(log => String(log.id) === String(id) ? { ...log, ...patch, updated_at: new Date().toISOString() } : log)
        }));
      };

      const markExecuted = async () => {
        const record = {
          id: String(Date.now()),
          date: new Date().toISOString(),
          state: metrics.state,
          title: metrics.title,
          qqq_price: metrics.prices.pQQQ,
          total: metrics.values.total,
          leverage: metrics.values.totalLeverageRatio,
          actions: metrics.actions,
          instruction: metrics.instruction,
          latest_judgement: metrics.ux.latestJudgement,
          target: metrics.t,
          holdings: buildHoldingsSnapshot(),
          note: String(inputs.pending_execution_note || "").trim()
        };
        const nextInputs = {
          ...inputs,
          pending_execution_note: "",
          execution_logs: [record, ...getArr(inputs.execution_logs)].slice(0, 200)
        };
        setInputs(nextInputs);
        const ok = await syncToCloud(nextInputs, "已紀錄並完成跨裝置同步");
        if (!ok) showToast("已先存本機，跨裝置同步失敗");
      };

      const CollapsibleCard = ({ id, title, desc, right, children, defaultOpen = true, className = "p-5" }) => {
        const open = collapsed[id] === undefined ? defaultOpen : !collapsed[id];
        return (
          <Card className={className}>
            <SectionTitle
              title={title}
              desc={desc}
              right={<div className="flex items-center gap-2">{right}<button onClick={() => toggleCollapse(id)} className="shrink-0 text-xs font-black bg-slate-100 text-slate-600 px-3 py-2 rounded-xl active:scale-95">{open ? "收合" : "展開"}</button></div>}
            />
            {open && <div>{children}</div>}
          </Card>
        );
      };

      const Home = () => {
        const quickMoves = [-42, -35, -28, -21, -14, -7, 7, 10, 20, 30];
        const scenarioTone = metrics.scenario.pnl > 0 ? "text-emerald-600" : metrics.scenario.pnl < 0 ? "text-red-600" : "text-slate-600";
        const scenarioBg = metrics.scenario.pnl > 0 ? "bg-emerald-50 border-emerald-100" : metrics.scenario.pnl < 0 ? "bg-red-50 border-red-100" : "bg-slate-50 border-slate-200";
        return (
        <main className="max-w-2xl mx-auto px-4 pt-20 content-bottom-space space-y-4">
          <Card className="p-5 bg-white text-slate-900 border-slate-200 overflow-hidden relative">
            <div className="absolute -right-8 -top-8 w-32 h-32 rounded-full bg-brand-600/20 blur-2xl" />
            <div className="relative">
              <div className="flex justify-between items-start gap-3 mb-3">
                <div className="min-w-0">
                  <div className="text-[11px] font-black text-brand-700 mb-1">今日只看這個</div>
                  <h1 className="text-2xl font-black leading-tight truncate">{metrics.title}</h1>
                </div>
                <div className="flex flex-col gap-1 items-end shrink-0">
                  <Pill tone={metrics.tone}>{metrics.state}</Pill>
                  <Pill tone={metrics.ux.tradeNeeded ? "red" : "green"}>{metrics.ux.tradeNeeded ? "需交易" : "不動"}</Pill>
                </div>
              </div>
              <p className="text-sm text-slate-700 leading-relaxed mb-2">{metrics.instruction}</p>
              <div className="bg-brand-50 border border-brand-100 rounded-2xl p-3 mb-3">
                <div className="text-[10px] font-black text-brand-600 mb-1">最新判讀</div>
                <div className="text-sm font-black text-slate-900 leading-relaxed">{metrics.ux.latestJudgement}</div>
              </div>
              <div className={`inline-flex items-center gap-2 rounded-full px-3 py-1 text-[11px] font-black mb-4 ${priceFreshness.stale ? "bg-amber-50 text-amber-700 border border-amber-100" : "bg-emerald-50 text-emerald-700 border border-emerald-100"}`}>
                <span>{priceFreshness.stale ? "⚠" : "●"}</span><span>報價：{loadingPrices ? "更新中..." : priceFreshness.label}</span>
              </div>
              <div className="grid grid-cols-2 gap-2 mb-4">
                <div className="col-span-2 bg-slate-50 border border-slate-200 rounded-3xl p-4">
                  <div className="text-[10px] font-black text-slate-500">總資產市值</div>
                  <div className="font-mono text-3xl font-black text-slate-900 tracking-tight">${money(metrics.values.total)}</div>
                </div>
                <div className="bg-slate-50 border border-slate-200 rounded-2xl p-3">
                  <div className="text-[10px] font-black text-slate-500">今日動作</div>
                  <div className="text-sm font-black text-slate-900 leading-snug line-clamp-2">{metrics.ux.primaryAction}</div>
                </div>
                <div className="bg-slate-50 border border-slate-200 rounded-2xl p-3">
                  <div className="text-[10px] font-black text-slate-500">QQQ -10% 預估</div>
                  <div className={`font-mono text-xl font-black ${metrics.scenario.riskMinus10.pnl < 0 ? "text-red-600" : "text-emerald-600"}`}>{metrics.scenario.riskMinus10.pnl >= 0 ? "+" : "-"}${money(Math.abs(metrics.scenario.riskMinus10.pnl))}</div>
                  {metrics.scenario.lossLimit > 0 && <div className={`text-[10px] font-black ${metrics.scenario.riskMinus10Status === "over" ? "text-red-600" : "text-emerald-600"}`}>{metrics.scenario.riskMinus10Status === "over" ? "超過承受線" : "承受線內"}</div>}
                </div>
                <div className="bg-slate-50 border border-slate-200 rounded-2xl p-3">
                  <div className="text-[10px] font-black text-slate-500">總曝險槓桿</div>
                  <div className="font-mono text-xl font-black text-slate-900">{metrics.values.totalLeverageRatio.toFixed(2)}x</div>
                </div>
                <div className="bg-slate-50 border border-slate-200 rounded-2xl p-3">
                  <div className="text-[10px] font-black text-slate-500">成長部位槓桿</div>
                  <div className="font-mono text-xl font-black text-slate-900">{metrics.values.growthLeverageRatio.toFixed(2)}x</div>
                </div>
                <div className="col-span-2 bg-slate-50 border border-slate-200 rounded-2xl p-3">
                  <div className="text-[10px] font-black text-slate-500">目前最大風險來源</div>
                  <div className="text-sm font-black text-slate-900 leading-snug">{metrics.scenario.riskMinus10.biggest ? `${metrics.scenario.riskMinus10.biggest.name}｜QQQ -10% 約 ${metrics.scenario.riskMinus10.biggest.pnl >= 0 ? "+" : "-"}$${money(Math.abs(metrics.scenario.riskMinus10.biggest.pnl))}` : "尚無成長部位"}</div>
                </div>
              </div>
              <ActionList actions={metrics.actions} />
              {inputs.motto_visible !== false && (
                <div className="mt-4 bg-slate-50 border border-slate-200 rounded-2xl p-3">
                  <div className="text-[10px] font-black text-slate-500 mb-1">座右銘</div>
                  <div className="text-xs font-black text-slate-700 leading-relaxed">「{inputs.motto || DEFAULT_INPUTS.motto}」</div>
                </div>
              )}
              <div className="mt-4 bg-slate-50 border border-slate-200 rounded-2xl p-3">
                <div className="text-[10px] font-black text-slate-500 mb-2">本次紀錄備註</div>
                <textarea
                  value={inputs.pending_execution_note || ""}
                  onChange={e => setField("pending_execution_note", e.target.value)}
                  placeholder="可自行輸入備註，例如：實際成交價、手動調整原因、系統訊號飄掉時自己的操作想法。"
                  className="w-full min-h-[74px] bg-white border border-slate-200 rounded-2xl p-3 text-sm font-bold text-slate-800 leading-relaxed focus:outline-none focus:border-brand-400 focus:ring-2 focus:ring-brand-100"
                />
              </div>
              <div className="grid grid-cols-2 gap-2 mt-4">
                <button onClick={copyCommand} className="min-h-[48px] rounded-2xl bg-brand-600 text-white text-sm font-black active:scale-95">複製指令</button>
                <button onClick={markExecuted} disabled={saving} className="min-h-[48px] rounded-2xl bg-emerald-500 text-white text-sm font-black active:scale-95 disabled:opacity-60">{saving ? "同步中" : "紀錄並同步"}</button>
              </div>
              <div className="text-[10px] text-slate-400 mt-2 leading-relaxed">按下後會記錄：當下指令、持股股數、目標配置與備註，並立即同步到你的其他裝置；成交後仍要手動更新持倉。</div>
            </div>
          </Card>

          <CollapsibleCard id="scenario" title="QQQ 情境模擬" desc="只估目前持倉若 QQQ 漲跌時，總資產大概會變多少；不是交易訊號，也不是精準回測。">
            <div className="grid grid-cols-1 gap-3">
              <div className="bg-slate-50 border border-slate-200 rounded-3xl p-3">
                <div className="flex items-center justify-between gap-3 mb-3">
                  <div>
                    <div className="text-[10px] text-slate-500 font-black">假設 QQQ 漲跌</div>
                    <div className="font-mono text-2xl font-black text-slate-900">{signedPct(metrics.scenario.movePct)}</div>
                  </div>
                  <div className="w-32">
                    <NumberInput label="手動輸入" value={inputs.scenario_qqq_move_pct} onChange={v => setField("scenario_qqq_move_pct", v)} suffix="%" />
                  </div>
                </div>
                <div className="grid grid-cols-5 gap-2">
                  {quickMoves.map(v => (
                    <button key={v} onClick={() => setField("scenario_qqq_move_pct", v)} className={`min-h-[44px] rounded-2xl text-xs font-black active:scale-95 ${Number(metrics.scenario.movePct) === v ? "bg-slate-950 text-white" : v < 0 ? "bg-red-50 text-red-700 border border-red-100" : "bg-emerald-50 text-emerald-700 border border-emerald-100"}`}>{v > 0 ? "+" : ""}{v}%</button>
                  ))}
                </div>
              </div>

              <div className={`${scenarioBg} border rounded-3xl p-4`}>
                <div className="grid grid-cols-2 gap-3 items-end">
                  <div>
                    <div className="text-[10px] font-black text-slate-500">模擬後總資產</div>
                    <div className="font-mono text-2xl font-black text-slate-900">${money(metrics.scenario.total)}</div>
                  </div>
                  <div className="text-right">
                    <div className="text-[10px] font-black text-slate-500">預估損益</div>
                    <div className={`font-mono text-2xl font-black ${scenarioTone}`}>{metrics.scenario.pnl >= 0 ? "+" : "-"}${money(Math.abs(metrics.scenario.pnl))}</div>
                    <div className={`font-mono text-xs font-black ${scenarioTone}`}>{signedPct(metrics.scenario.pct)}</div>
                  </div>
                </div>
                {metrics.scenario.biggest && <div className="mt-2 text-[11px] text-slate-500 font-bold">最大影響來源：{metrics.scenario.biggest.name}（{metrics.scenario.biggest.pnl >= 0 ? "+" : "-"}${money(Math.abs(metrics.scenario.biggest.pnl))}）</div>}
                {metrics.scenario.lossLimit > 0 && metrics.scenario.pnl < 0 && (
                  <div className={`mt-3 rounded-2xl p-3 text-xs font-black ${metrics.scenario.scenarioLossStatus === "over" ? "bg-red-100 text-red-700" : "bg-emerald-100 text-emerald-700"}`}>
                    承受線 ${money(metrics.scenario.lossLimit)}：{metrics.scenario.scenarioLossStatus === "over" ? "此情境已超過" : "此情境仍在範圍內"}
                  </div>
                )}
              </div>

              <div className="bg-slate-50 border border-slate-200 rounded-3xl p-3">
                <div className="flex justify-between items-center mb-2">
                  <div className="font-black text-sm text-slate-800">下跌壓力表</div>
                  <div className="text-[10px] text-slate-500 font-bold">手機卡片式，避免表格太擠</div>
                </div>
                <div className="grid grid-cols-1 sm:grid-cols-2 gap-2">
                  {metrics.scenario.stressRows.map(r => <StressScenarioCard key={r.movePct} row={r} lossLimit={metrics.scenario.lossLimit} />)}
                </div>
              </div>

              <div className="bg-white border border-slate-200 rounded-3xl p-3">
                {metrics.scenario.rows.map(r => <ScenarioRow key={r.name} {...r} />)}
                <div className="mt-3 text-[11px] text-slate-500 leading-relaxed bg-slate-50 rounded-2xl p-3">
                  TQQQ 以每日約 {Number(inputs.scenario_tqqq_beta || 3).toFixed(1)}x 粗估；若單一情境跌幅超過 -100%，系統會把該部位損失上限限制在 -100%。BOXX / 現金視為不變。
                </div>
              </div>
            </div>
          </CollapsibleCard>

          <CollapsibleCard id="holdings" title="持倉輸入" desc="手機操作以大按鈕與大輸入框為主。只要輸入股數；價格由報價 API 抓取。" right={ <button onClick={fetchPrices} className="text-xs font-black bg-slate-100 px-3 py-2 rounded-xl active:scale-95">{loadingPrices ? "更新中" : "更新報價"}</button> }>
            <div className="grid grid-cols-2 gap-3">
              <NumberInput label={`QQQ｜$${money(metrics.prices.pQQQ, 2)}`} value={inputs.qty_core_1} onChange={v => setField("qty_core_1", v)} />
              <NumberInput label={`TQQQ｜$${money(metrics.prices.pTQQQ, 2)}`} value={inputs.qty_core_2} onChange={v => setField("qty_core_2", v)} />
              <NumberInput label={`SPMO｜$${money(metrics.prices.pSPMO, 2)}`} value={inputs.qty_spmo} onChange={v => setField("qty_spmo", v)} />
              <NumberInput label={`BOXX｜$${money(metrics.prices.pBOXX, 2)}`} value={inputs.qty_boxx} onChange={v => setField("qty_boxx", v)} />
              <div className="col-span-2"><NumberInput label="現金餘額" value={inputs.cash_balance} onChange={v => setField("cash_balance", v)} suffix="$" /></div>
            </div>
          </CollapsibleCard>

          <CollapsibleCard id="allocation" title="目標配置" desc="只看目標，不看情緒。若與實際持倉差距超過約 $50，今日指令會列出買賣方向。" right={ <Pill tone={inputs.satellites_enabled ? "green" : "blue"}>{inputs.satellites_enabled ? "完整版" : "核心-only"}</Pill> }>
            <div>{metrics.rows.map(r => <AllocationRow key={r.name} {...r} />)}</div>
          </CollapsibleCard>

          <CollapsibleCard id="high-summary" title="高點追蹤摘要" desc="用一句話告訴你現在有沒有觸發，不用自己解讀高點名詞。" right={ <button onClick={() => fetchQQQHistory(true)} className="text-xs font-black bg-brand-50 text-brand-700 px-3 py-2 rounded-xl active:scale-95">{syncingHistory ? "同步中" : "同步52W"}</button> }>
            <div className="space-y-2 mb-3">
              {metrics.high.notes.map((note, i) => <div key={i} className="bg-slate-50 border border-slate-200 rounded-2xl p-3 text-xs font-bold text-slate-700 leading-relaxed">{note}</div>)}
            </div>
            <div className="grid grid-cols-2 gap-3 text-sm">
              <div className="bg-brand-50 rounded-2xl p-3 border border-brand-100">
                <div className="text-[10px] font-black text-brand-600">狂熱突破基準</div>
                <div className="font-mono font-black text-lg">${money(metrics.high.locked, 2)}</div>
                <div className="text-[10px] text-brand-700 mt-1">Locked ATH：上個 52W 收盤高</div>
              </div>
              <div className="bg-slate-50 rounded-2xl p-3 border border-slate-200">
                <div className="text-[10px] font-black text-slate-500">本輪最新高點</div>
                <div className="font-mono font-black text-lg">${money(metrics.high.latestHigh, 2)}</div>
                <div className="text-[10px] text-slate-500 mt-1">回撤 / 追蹤停損用</div>
              </div>
              <div className="bg-red-50 rounded-2xl p-3 border border-red-100">
                <div className="text-[10px] font-black text-red-600">距離本輪高點</div>
                <div className="font-mono font-black text-lg text-red-700">-{pct(metrics.high.cDD)}</div>
                <div className="text-[10px] text-red-600 mt-1">TQQQ 階梯與停損用</div>
              </div>
              <div className="bg-emerald-50 rounded-2xl p-3 border border-emerald-100">
                <div className="text-[10px] font-black text-emerald-600">本輪反彈低點</div>
                <div className="font-mono font-black text-lg">${money(metrics.high.waveLow, 2)}</div>
                <div className="text-[10px] text-emerald-600 mt-1">反彈卸 TQQQ 用</div>
              </div>
            </div>
            <div className="mt-3 bg-purple-100 border border-purple-300 rounded-2xl p-3 text-xs text-purple-950 font-bold leading-relaxed">
              <b>SPMO 停損線：</b>${money(metrics.high.maniaStopLine, 2)}。若持有 SPMO 且 QQQ 跌破此線，核心退回 QQQ，冷卻解除價為 ${money(metrics.high.cooldownHigh, 2)}。
            </div>
          </CollapsibleCard>
        </main>
        );
      };

      const Logs = () => {
        const logs = getArr(inputs.execution_logs);
        return (
          <main className="max-w-3xl mx-auto px-4 pt-20 content-bottom-space space-y-5">
            <AdvancedGroupTitle title="執行紀錄" desc="單獨分頁整理；每筆紀錄可展開/收合，避免記錄多了以後首頁與進階頁太亂。" />
            <Card className="p-5">
              <SectionTitle
                title={`全部紀錄（${logs.length}）`}
                desc="按首頁『紀錄並同步』後會留下當時指令、持股股數與備註；它不會自動改股數。"
                right={<button onClick={() => setField("execution_logs", [])} className="text-xs font-black bg-slate-100 px-3 py-2 rounded-xl active:scale-95">清空</button>}
              />
              {logs.length === 0 ? (
                <div className="bg-slate-50 border border-slate-200 rounded-2xl p-4 text-sm text-slate-500 font-bold">尚無紀錄。</div>
              ) : (
                <div className="space-y-3">
                  {logs.map((r, i) => (
                    <details key={r.id || i} className="group bg-slate-50 border border-slate-200 rounded-3xl p-3 open:bg-white open:border-brand-100">
                      <summary className="list-none cursor-pointer flex items-start justify-between gap-3">
                        <div className="min-w-0">
                          <div className="text-[11px] font-black text-slate-400 mb-1">{new Date(r.date).toLocaleString()}</div>
                          <div className="font-black text-sm text-slate-900 truncate">{r.title || r.state || "執行紀錄"}</div>
                          <div className="text-[11px] text-slate-500 mt-1">總資產 ${money(r.total)}｜槓桿 {Number(r.leverage || 0).toFixed(2)}x</div>
                        </div>
                        <span className="shrink-0 text-[11px] font-black bg-white border border-slate-200 text-slate-500 px-3 py-2 rounded-xl group-open:bg-slate-950 group-open:text-white">展開</span>
                      </summary>
                      <div className="mt-3 border-t border-slate-200 pt-3 space-y-3">
                        <ActionList actions={getArr(r.actions).length ? getArr(r.actions) : ["無動作紀錄"]} />
                        {r.latest_judgement && (
                          <div className="bg-brand-50 border border-brand-100 rounded-2xl p-3 text-xs font-bold text-slate-700 leading-relaxed">
                            <div className="text-[10px] font-black text-brand-600 mb-1">當時最新判讀</div>
                            {r.latest_judgement}
                          </div>
                        )}
                        <div className="bg-white border border-slate-200 rounded-2xl p-3">
                          <div className="text-[10px] font-black text-slate-500 mb-2">持股股數快照</div>
                          <div className="grid grid-cols-2 gap-2 text-xs">
                            <div className="bg-slate-50 rounded-2xl p-3 border border-slate-100"><div className="text-[10px] font-black text-slate-500">QQQ 股數</div><div className="font-mono font-black">{Number(r.holdings?.qqq?.qty || 0).toLocaleString(undefined,{maximumFractionDigits:4})}</div></div>
                            <div className="bg-slate-50 rounded-2xl p-3 border border-slate-100"><div className="text-[10px] font-black text-slate-500">TQQQ 股數</div><div className="font-mono font-black">{Number(r.holdings?.tqqq?.qty || 0).toLocaleString(undefined,{maximumFractionDigits:4})}</div></div>
                            <div className="bg-slate-50 rounded-2xl p-3 border border-slate-100"><div className="text-[10px] font-black text-slate-500">SPMO 股數</div><div className="font-mono font-black">{Number(r.holdings?.spmo?.qty || 0).toLocaleString(undefined,{maximumFractionDigits:4})}</div></div>
                            <div className="bg-slate-50 rounded-2xl p-3 border border-slate-100"><div className="text-[10px] font-black text-slate-500">BOXX 股數</div><div className="font-mono font-black">{Number(r.holdings?.boxx?.qty || 0).toLocaleString(undefined,{maximumFractionDigits:4})}</div></div>
                            <div className="col-span-2 bg-slate-50 rounded-2xl p-3 border border-slate-100"><div className="text-[10px] font-black text-slate-500">現金</div><div className="font-mono font-black">${money(r.holdings?.cash?.value || 0)}</div></div>
                          </div>
                          {getArr(r.holdings?.satellites).length > 0 && (
                            <div className="mt-2 space-y-1">
                              {getArr(r.holdings?.satellites).map((s, idx) => <div key={idx} className="text-[11px] font-bold text-slate-500 bg-slate-50 rounded-xl px-3 py-2">{s.symbol || "衛星"}：{Number(s.qty || 0).toLocaleString(undefined,{maximumFractionDigits:4})} 股｜市值 ${money(s.value || 0)}</div>)}
                            </div>
                          )}
                        </div>
                        <div className="bg-white border border-slate-200 rounded-2xl p-3">
                          <div className="text-[10px] font-black text-slate-500 mb-2">備註</div>
                          <textarea
                            value={r.note || ""}
                            onChange={e => updateExecutionLog(r.id, { note: e.target.value })}
                            placeholder="可補充實際成交價、手動調整原因、或當時自己的想法。"
                            className="w-full min-h-[72px] bg-slate-50 border border-slate-200 rounded-2xl p-3 text-sm font-bold text-slate-800 leading-relaxed focus:outline-none focus:border-brand-400 focus:ring-2 focus:ring-brand-100"
                          />
                        </div>
                        <div className="grid grid-cols-2 gap-2 text-xs">
                          <div className="bg-slate-50 rounded-2xl p-3 border border-slate-100"><div className="text-[10px] font-black text-slate-500">QQQ 價格</div><div className="font-mono font-black">${money(r.qqq_price, 2)}</div></div>
                          <div className="bg-slate-50 rounded-2xl p-3 border border-slate-100"><div className="text-[10px] font-black text-slate-500">總資產</div><div className="font-mono font-black">${money(r.total)}</div></div>
                          <div className="bg-slate-50 rounded-2xl p-3 border border-slate-100"><div className="text-[10px] font-black text-slate-500">QQQ 目標</div><div className="font-mono font-black">{pct(r.target?.q)}</div></div>
                          <div className="bg-slate-50 rounded-2xl p-3 border border-slate-100"><div className="text-[10px] font-black text-slate-500">TQQQ 目標</div><div className="font-mono font-black">{pct(r.target?.tq)}</div></div>
                          <div className="bg-slate-50 rounded-2xl p-3 border border-slate-100"><div className="text-[10px] font-black text-slate-500">SPMO 目標</div><div className="font-mono font-black">{pct(r.target?.sm)}</div></div>
                          <div className="bg-slate-50 rounded-2xl p-3 border border-slate-100"><div className="text-[10px] font-black text-slate-500">儲備目標</div><div className="font-mono font-black">{pct(r.target?.r)}</div></div>
                        </div>
                      </div>
                    </details>
                  ))}
                </div>
              )}
            </Card>
          </main>
        );
      };

      const Advanced = () => (
        <main className="max-w-3xl mx-auto px-4 pt-20 content-bottom-space space-y-5">
          <AdvancedGroupTitle title="系統 / 跨裝置同步" desc="跨裝置同步、重新讀取與模式切換。" />
          <Card className="p-5">
            <SectionTitle title="跨裝置同步" desc="第一次使用 Google 啟用同步後，手機與電腦會共用同一份資料；未啟用時僅保存在本機。" />
            <div className="flex items-center justify-between gap-3 bg-slate-50 border border-slate-200 rounded-2xl p-3 mb-3">
              <div>
                <div className="text-sm font-black">{user && !user.isAnonymous ? "已啟用跨裝置同步" : "僅本機儲存"}</div>
                <div className="text-[11px] text-slate-500 mt-1">{cloudReady ? "跨裝置同步已連線" : "等待同步連線"}</div>
              </div>
              {user && !user.isAnonymous ? <button onClick={handleLogout} className="px-3 py-2 rounded-xl bg-slate-200 text-slate-700 text-xs font-black active:scale-95">關閉同步</button> : <button onClick={handleGoogleLogin} className="px-3 py-2 rounded-xl bg-brand-600 text-white text-xs font-black active:scale-95">使用 Google 啟用同步</button>}
            </div>
            <div className="grid grid-cols-1 gap-2 mb-3">
              <button onClick={loadCloudNow} className="min-h-[44px] rounded-2xl bg-slate-100 text-slate-700 text-xs font-black active:scale-95">重新讀取跨裝置資料</button>
            </div>
            <div className="text-[11px] text-slate-500 leading-relaxed bg-slate-50 border border-slate-200 rounded-2xl p-3 mb-3">
              啟用後會自動讀取跨裝置資料；平常修改持倉與參數會自動同步。按首頁「紀錄並同步」時，也會把當下指令、持股股數與備註立刻同步到其他裝置。
            </div>
            {authError && <div className="bg-red-50 text-red-700 border border-red-100 rounded-2xl p-3 text-xs font-bold leading-relaxed">{authError}</div>}
          </Card>

          <CollapsibleCard id="motto" title="座右銘" desc="顯示在首頁最上方卡片下方，只做紀律提醒，不參與任何交易計算。" defaultOpen={false}>
            <div className="bg-slate-50 border border-slate-200 rounded-2xl p-3 mb-3 flex items-center justify-between gap-3">
              <div>
                <div className="text-xs font-black text-slate-700">首頁顯示座右銘</div>
                <div className="text-[11px] text-slate-500 font-bold mt-1">關閉後只隱藏首頁提示，文字內容會保留。</div>
              </div>
              <button onClick={() => setField("motto_visible", inputs.motto_visible === false)} className={`px-4 py-2 rounded-2xl text-xs font-black active:scale-95 ${inputs.motto_visible === false ? "bg-slate-200 text-slate-700" : "bg-brand-600 text-white"}`}>
                {inputs.motto_visible === false ? "已關閉" : "顯示中"}
              </button>
            </div>
            <textarea value={inputs.motto || DEFAULT_INPUTS.motto} onChange={e => setField("motto", e.target.value)} className="w-full h-24 bg-slate-50 border border-slate-200 rounded-2xl p-3 text-sm font-bold text-slate-700 leading-relaxed" />
            <div className="grid grid-cols-2 gap-2 mt-3">
              <button onClick={() => setField("motto", DEFAULT_INPUTS.motto)} className="min-h-[44px] rounded-2xl bg-slate-100 text-slate-700 text-xs font-black active:scale-95">恢復預設</button>
              <button onClick={() => setField("motto_visible", inputs.motto_visible === false)} className="min-h-[44px] rounded-2xl bg-slate-900 text-white text-xs font-black active:scale-95">{inputs.motto_visible === false ? "打開顯示" : "關閉顯示"}</button>
            </div>
          </CollapsibleCard>

          <CollapsibleCard id="mode" title="模式選擇" desc="預設核心-only：衛星資料保留，但完全不參與計算與畫面。需要時再開啟完整版。" defaultOpen={false}>
            <div className={`${inputs.satellites_enabled ? "bg-emerald-50 border-emerald-200" : "bg-slate-950 border-slate-800 text-white"} border rounded-3xl p-4 flex items-center justify-between gap-4`}>
              <div>
                <div className="font-black">{inputs.satellites_enabled ? "完整版：核心 + 衛星" : "核心-only：QQQ / TQQQ / SPMO / BOXX"}</div>
                <div className={`text-xs mt-1 leading-relaxed ${inputs.satellites_enabled ? "text-emerald-700" : "text-slate-300"}`}>{inputs.satellites_enabled ? "TSLA / IBIT 會重新顯示並納入目標占比。" : "降低干擾，個股不計入策略指令。"}</div>
              </div>
              <button onClick={() => setField("satellites_enabled", !inputs.satellites_enabled)} className={`px-4 py-3 rounded-2xl font-black text-xs active:scale-95 ${inputs.satellites_enabled ? "bg-white text-emerald-700 border border-emerald-200" : "bg-brand-600 text-white"}`}>{inputs.satellites_enabled ? "關閉衛星" : "開啟衛星"}</button>
            </div>
          </CollapsibleCard>

          <CollapsibleCard id="core-params" title="核心參數" desc="一般不需要常改。改動後會影響今日指令與目標配置。" defaultOpen={false}>
            <div className="grid grid-cols-2 gap-3">
              <div className="bg-brand-50 border border-brand-100 rounded-2xl p-3">
                <div className="text-[10px] font-black text-brand-600 mb-1">核心目標（自動）</div>
                <div className="font-mono font-black text-xl text-brand-900">{pct(Math.max(0, 100 - Math.min(100, Math.max(0, getNum(inputs.reserve_target_pct))) - (inputs.satellites_enabled ? Math.min(getArr(inputs.satellites).reduce((sum, s) => sum + Math.max(0, getNum(s.target_pct)), 0), Math.max(0, 100 - Math.min(100, Math.max(0, getNum(inputs.reserve_target_pct))))) : 0)))}</div>
                <div className="text-[10px] text-brand-700 mt-1 leading-relaxed">公式：100% - BOXX - 衛星。核心-only 時預設為 85%。</div>
              </div>
              <NumberInput label="BOXX / 現金目標" value={inputs.reserve_target_pct} onChange={v => setField("reserve_target_pct", v)} suffix="%" />
              <NumberInput label="狂熱追蹤停損" value={inputs.mania_trailing_stop_pct} onChange={v => setField("mania_trailing_stop_pct", v)} suffix="%" hint="預設 7%，越小越容易退出 SPMO" />
              <NumberInput label="模擬 QQQ 價格" value={inputs.sim_qqq_price} onChange={v => setField("sim_qqq_price", v)} hint="空白＝使用即時報價；填入後只用來測試策略情境" />
              <label className="block bg-slate-50 border border-slate-200 rounded-2xl p-3 col-span-2">
                <div className="text-[10px] font-black text-slate-500 mb-1">熊市熔斷</div>
                <button onClick={() => setField("is_bear_meltdown", !inputs.is_bear_meltdown)} className={`w-full py-3 rounded-xl text-sm font-black active:scale-95 ${inputs.is_bear_meltdown ? "bg-red-600 text-white" : "bg-white border border-slate-200 text-slate-600"}`}>{inputs.is_bear_meltdown ? "已啟動：停止新增 TQQQ" : "未啟動"}</button>
              </label>
            </div>
          </CollapsibleCard>

          <AdvancedGroupTitle title="模擬參數" desc="只影響風險估算，不影響交易訊號。" />
          <CollapsibleCard id="param-lock" title="參數鎖定" desc="避免手機誤觸。解鎖後才能調整策略階梯、追蹤停損與模擬係數。" right={ <Pill tone={paramLocked ? "amber" : "green"}>{paramLocked ? "已鎖定" : "可編輯"}</Pill> } defaultOpen={true}>
            <button onClick={() => setField("params_unlocked", !inputs.params_unlocked)} className={`w-full min-h-[48px] rounded-2xl text-sm font-black active:scale-95 ${paramLocked ? "bg-slate-950 text-white" : "bg-emerald-600 text-white"}`}>{paramLocked ? "解鎖參數" : "鎖定參數"}</button>
            <div className="mt-3 text-[11px] text-slate-500 leading-relaxed bg-slate-50 border border-slate-200 rounded-2xl p-3">
              持倉股數、現金與最大可承受損失仍可直接修改；策略相關參數鎖定後會防止誤改。
            </div>
          </CollapsibleCard>

          <CollapsibleCard id="scenario-params" title="情境模擬係數" desc="只影響首頁 QQQ 情境模擬，不影響今日指令。係數越高，代表該部位對 QQQ 漲跌越敏感。" defaultOpen={false}>
            <div className="grid grid-cols-2 gap-3">
              <div className="col-span-2"><NumberInput label="最大可承受損失" value={inputs.max_loss_amount} onChange={v => setField("max_loss_amount", v)} suffix="$" hint="填 0 或空白＝不顯示承受線。首頁會用它判斷壓力情境是否超線。" /></div>
              <NumberInput label="TQQQ 係數" value={inputs.scenario_tqqq_beta} onChange={v => setField("scenario_tqqq_beta", v)} suffix="x" hint="預設 3x，僅為單次情境粗估" disabled={paramLocked} />
              <NumberInput label="SPMO 係數" value={inputs.scenario_spmo_beta} onChange={v => setField("scenario_spmo_beta", v)} suffix="x" hint="預設 1x，假設與 QQQ 接近" disabled={paramLocked} />
            </div>
            <div className="mt-3 text-[11px] text-slate-500 leading-relaxed bg-slate-50 border border-slate-200 rounded-2xl p-3">
              QQQ 固定用 1x；BOXX / 現金固定用 0x。衛星若開啟，會使用每個衛星標的自己的情境係數。
            </div>
          </CollapsibleCard>


          <AdvancedGroupTitle title="策略參數" desc="平常保持鎖定，需要調整規則時才解鎖。" />
          <CollapsibleCard id="tracking-detail" title="自動追蹤細節" desc="這裡是審計區。首頁只看摘要；你要確認系統到底參考哪個高點時，再來這裡。" right={ <button onClick={resetCycle} disabled={paramLocked} className={`text-xs font-black px-3 py-2 rounded-xl active:scale-95 ${paramLocked ? "bg-slate-100 text-slate-400" : "bg-slate-100 text-slate-700"}`}>重設循環</button> } defaultOpen={false}>
            <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
              <NumberInput label="最新 52W 高點｜只建立 Locked ATH" value={inputs.qqq_history_high_52w} onChange={v => setField("qqq_history_high_52w", v)} disabled={inputs.auto_high_tracking} />
              <NumberInput label="Locked ATH｜狂熱突破基準" value={inputs.qqq_locked_ath} onChange={v => setField("qqq_locked_ath", v)} disabled={inputs.auto_high_tracking} />
              <NumberInput label="本輪最新高點｜回撤/停損用" value={inputs.qqq_latest_high} onChange={v => setField("qqq_latest_high", v)} disabled={inputs.auto_high_tracking} />
              <NumberInput label="本輪反彈低點｜卸 TQQQ 用" value={inputs.qqq_wave_low} onChange={v => setField("qqq_wave_low", v)} disabled={inputs.auto_high_tracking} />
              <NumberInput label="冷卻解除價｜重新啟動 SPMO 門檻" value={inputs.mania_cooldown_until_high} onChange={v => setField("mania_cooldown_until_high", v)} disabled={inputs.auto_high_tracking} />
              <NumberInput label="SPMO 持有期間高點" value={inputs.spmo_latest_high} onChange={v => setField("spmo_latest_high", v)} disabled={inputs.auto_high_tracking} />
            </div>
            <div className="mt-3 flex gap-2">
              <button onClick={() => setField("auto_high_tracking", !inputs.auto_high_tracking)} disabled={paramLocked} className={`flex-1 py-3 rounded-2xl text-xs font-black active:scale-95 ${paramLocked ? "bg-slate-100 text-slate-400" : inputs.auto_high_tracking ? "bg-brand-600 text-white" : "bg-slate-200 text-slate-700"}`}>{inputs.auto_high_tracking ? "自動追蹤 ON" : "手動模式 OFF"}</button>
              <button onClick={() => fetchQQQHistory(true)} className="flex-1 py-3 rounded-2xl bg-slate-100 text-slate-700 text-xs font-black active:scale-95">同步 52W</button>
            </div>
            <div className="mt-3 text-[11px] text-slate-500 leading-relaxed bg-slate-50 border border-slate-200 rounded-2xl p-3">
              <b>判讀：</b>Locked ATH 是「上個 52W 收盤高」，只算 +15% 狂熱突破；本輪最新高點才是算 QQQ 回撤、TQQQ 階梯與 SPMO 追蹤停損；本輪反彈低點只有回撤達第一階後才開始記錄。
            </div>
          </CollapsibleCard>

          <CollapsibleCard id="ladders" title="回撤 / 反彈階梯" desc="精簡版保留固定階梯，不在首頁顯示，避免每天被參數干擾。" defaultOpen={false}>
            <div className="space-y-3">
              {getArr(inputs.drop_ladder).map((l, i) => (
                <div key={l.id || i} className="grid grid-cols-3 gap-2 bg-slate-50 border border-slate-200 rounded-2xl p-2">
                  <NumberInput label="回撤" value={l.drop_pct} onChange={v => updateArr("drop_ladder", l.id, "drop_pct", v)} suffix="%" disabled={paramLocked} />
                  <NumberInput label="核心轉 TQQQ" value={l.move_core_pct} onChange={v => updateArr("drop_ladder", l.id, "move_core_pct", v)} suffix="%" disabled={paramLocked} />
                  <NumberInput label="動用 BOXX" value={l.use_reserve_pct} onChange={v => updateArr("drop_ladder", l.id, "use_reserve_pct", v)} suffix="%" disabled={paramLocked} />
                </div>
              ))}
            </div>
            <div className="mt-4 space-y-3">
              {getArr(inputs.bounce_ladder).map((l, i) => (
                <div key={l.id || i} className="grid grid-cols-2 gap-2 bg-emerald-50 border border-emerald-100 rounded-2xl p-2">
                  <NumberInput label="自低點反彈" value={l.bounce_pct} onChange={v => updateArr("bounce_ladder", l.id, "bounce_pct", v)} suffix="%" disabled={paramLocked} />
                  <NumberInput label="賣出 TQQQ" value={l.sell_pct} onChange={v => updateArr("bounce_ladder", l.id, "sell_pct", v)} suffix="%" disabled={paramLocked} />
                </div>
              ))}
            </div>
          </CollapsibleCard>

          {inputs.satellites_enabled && (
            <CollapsibleCard id="satellite-module" title="衛星模組" desc="已開啟完整版才會顯示。仍建議只作輔助，不讓個股干擾核心策略。" defaultOpen={false}>
              <div className="space-y-3">
                {getArr(inputs.satellites).map((s, i) => (
                  <div key={s.id || i} className="bg-slate-50 border border-slate-200 rounded-2xl p-3">
                    <div className="flex gap-2 mb-3">
                      <input value={s.underlying} onChange={e => updateArr("satellites", s.id, "underlying", e.target.value.toUpperCase())} className="w-24 bg-white border border-slate-200 rounded-xl p-2 text-center font-black" />
                      <div className="flex-1 text-right text-xs text-slate-500 leading-relaxed">報價 ${money(getNum(prices[String(s.underlying || "").toUpperCase()]), 2)}<br/>市值 ${money(getNum(prices[String(s.underlying || "").toUpperCase()]) * getNum(s.qty_u))}</div>
                    </div>
                    <div className="grid grid-cols-2 gap-2">
                      <NumberInput label="股數" value={s.qty_u} onChange={v => updateArr("satellites", s.id, "qty_u", v)} />
                      <NumberInput label="均價" value={s.avg_cost} onChange={v => updateArr("satellites", s.id, "avg_cost", v)} />
                      <NumberInput label="目標" value={s.target_pct} onChange={v => updateArr("satellites", s.id, "target_pct", v)} suffix="%" />
                      <NumberInput label="收割上限" value={s.limit_pct} onChange={v => updateArr("satellites", s.id, "limit_pct", v)} suffix="%" />
                      <NumberInput label="5MA" value={s.ma5} onChange={v => updateArr("satellites", s.id, "ma5", v)} />
                      <NumberInput label="10MA" value={s.ma10} onChange={v => updateArr("satellites", s.id, "ma10", v)} />
                      <div className="col-span-2"><NumberInput label="情境係數" value={s.scenario_beta} onChange={v => updateArr("satellites", s.id, "scenario_beta", v)} suffix="x" hint="只影響 QQQ 情境模擬。TSLA 預設 2x、IBIT 預設 1.5x。" /></div>
                    </div>
                  </div>
                ))}
              </div>
            </CollapsibleCard>
          )}

          <AdvancedGroupTitle title="備份 / 策略全文" desc="資料保險與規則備忘。" />
          <CollapsibleCard id="backup" title="備份 / 匯入" desc="跨裝置同步保留；另外提供 JSON 備份，避免 GitHub 或同步服務暫時出問題。" defaultOpen={false}>
            <div className="grid grid-cols-2 gap-3">
              <button onClick={exportData} className="py-3 rounded-2xl bg-slate-900 text-white text-sm font-black active:scale-95">匯出 JSON</button>
              <label className="py-3 rounded-2xl bg-slate-100 text-slate-700 text-sm font-black text-center active:scale-95 cursor-pointer">匯入 JSON<input type="file" accept="application/json" className="hidden" onChange={e => importData(e.target.files?.[0])} /></label>
            </div>
          </CollapsibleCard>

          <CollapsibleCard id="plan-text" title="策略全文" desc="平常不用打開，僅作為規則備忘。" defaultOpen={false}>
            <textarea value={inputs.planText} onChange={e => setField("planText", e.target.value)} className="w-full h-80 bg-slate-50 border border-slate-200 rounded-2xl p-4 text-xs leading-relaxed font-bold text-slate-700" />
          </CollapsibleCard>
        </main>
      );

      return (
        <div className="min-h-screen">
          {message && <div className="fixed top-20 left-1/2 -translate-x-1/2 z-[80] bg-slate-950 text-white px-4 py-3 rounded-full shadow-2xl text-sm font-black whitespace-nowrap">{message}</div>}
          <header className="fixed top-0 inset-x-0 z-50 bg-white/90 backdrop-blur border-b border-slate-200">
            <div className="max-w-3xl mx-auto px-4 h-16 flex items-center justify-between gap-3">
              <div className="flex items-center gap-3 min-w-0">
                <div className="w-10 h-10 rounded-2xl bg-slate-950 flex items-center justify-center text-brand-400 font-black text-xl">A</div>
                <div className="min-w-0">
                  <div className="font-black leading-tight truncate">Alpha Horizon Core</div>
                  <div className="text-[10px] font-black text-brand-600 tracking-widest">v5.9 SYNC</div>
                </div>
              </div>
              <div className="flex items-center gap-2">
                <button onClick={fetchPrices} className={`w-10 h-10 rounded-2xl bg-slate-100 flex items-center justify-center font-black active:scale-95 ${loadingPrices ? "animate-spin" : ""}`}>↻</button>
                <Pill tone={user && !user.isAnonymous ? "green" : "amber"}>{user && !user.isAnonymous ? "已同步" : "本機"}</Pill>
              </div>
            </div>
          </header>

          {page === "home" ? <Home /> : page === "logs" ? <Logs /> : <Advanced />}

          <nav className="fixed bottom-0 inset-x-0 z-50 bg-white/95 backdrop-blur border-t border-slate-200 safe-bottom">
            <div className="max-w-3xl mx-auto grid grid-cols-4 gap-1.5 p-2">
              <button onClick={() => setPage("home")} className={`py-2.5 rounded-2xl text-[11px] font-black active:scale-95 ${page === "home" ? "bg-slate-950 text-white" : "bg-slate-100 text-slate-600"}`}>首頁</button>
              <button onClick={() => setPage("advanced")} className={`py-2.5 rounded-2xl text-[11px] font-black active:scale-95 ${page === "advanced" ? "bg-slate-950 text-white" : "bg-slate-100 text-slate-600"}`}>進階</button>
              <button onClick={() => setPage("logs")} className={`py-2.5 rounded-2xl text-[11px] font-black active:scale-95 ${page === "logs" ? "bg-slate-950 text-white" : "bg-slate-100 text-slate-600"}`}>紀錄</button>
              <button onClick={fetchPrices} className="py-2.5 rounded-2xl text-[11px] font-black bg-brand-50 text-brand-700 active:scale-95">更新報價</button>
            </div>
          </nav>
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById("root")).render(<ErrorBoundary><App /></ErrorBoundary>);
  </script>
</body>
</html>
