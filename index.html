        if (typeof tailwind !== 'undefined') {
            tailwind.config = { theme: { extend: { colors: { slate: { 50: '#f8fafc', 100: '#f1f5f9', 200: '#e2e8f0', 300: '#cbd5e1', 400: '#94a3b8', 500: '#64748b', 600: '#475569', 700: '#334155', 800: '#1e293b', 900: '#0f172a' }, brand: { 50: '#eff6ff', 100: '#dbeafe', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8', 900: '#1e3a8a' }, fin: { up: '#10b981', down: '#ef4444', warn: '#f59e0b', info: '#3b82f6', dark: '#0f172a' } }, boxShadow: { 'heavy': '0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05)' } } } }
        }
    </script>
    <script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; background-color: #f1f5f9; color: #1e293b; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        input, select, textarea { font-size: 14px !important; line-height: 1.4 !important; padding: 8px 4px !important; width: 100%; background: transparent; border: none; outline: none; text-align: center; }
        input[type=number] { -moz-appearance: textfield; }
        .loading-overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(4px); z-index: 9999; display: flex; justify-content: center; align-items: center; flex-direction: column; gap: 1rem; color: white; }
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        .input-focus-ring:focus-within { box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.3); border-color: #3b82f6; }
    </style>
</head>
<body class="text-left font-bold text-slate-800 selection:bg-brand-500 selection:text-white">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback, memo, useRef } = React;
        
        // --- 安全載入圖表套件防呆機制 ---
        const RechartsLib = window.Recharts || {};
        const { ComposedChart, AreaChart, Area, XAxis, YAxis, Tooltip, ResponsiveContainer, PieChart, Pie, Cell } = RechartsLib;
        const hasCharts = !!ComposedChart && !!PieChart; 

        // --- 系統設定與 Firebase ---
        const FINNHUB_KEY = "d4q36b9r01qha6q0jclgd4q36b9r01qha6q0jcm0";
        const appId = 'alpha-horizon-2026-v1'; 
        const firebaseConfig = { apiKey: "AIzaSyDMR8Q20z9vnWtQlafDowRujzBexV0h_lI", authDomain: "lifestock-83480.firebaseapp.com", projectId: "lifestock-83480", storageBucket: "lifestock-83480.firebasestorage.app", messagingSenderId: "615080626396", appId: "1:615080626396:web:407135b548f3ed5b5c4c19" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore(); 
        const auth = firebase.auth();

        // --- 輔助與安全防護函數 ---
        const sanitize = (data) => JSON.parse(JSON.stringify(data, (k, v) => v === undefined ? null : v));
        const getNum = (v) => { const n = parseFloat(v); return isNaN(n) ? 0 : n; };
        const getTodayStr = () => { 
            const d = new Date(); d.setMinutes(d.getMinutes() - d.getTimezoneOffset()); return d.toISOString().split('T')[0]; 
        };
        // 核心防禦：確保破壞的物件能安全轉回陣列，避免 map undefined 錯誤
        const getArr = (arr) => Array.isArray(arr) ? arr : (arr && typeof arr === 'object' ? Object.values(arr) : []);

        // --- 預設值區塊 ---
        const defPlan = `壹、 資金分配架構\n【成長部位】 (佔總額 80% — 比例管理)：\n• 核心配置 (70%)： 持有 QQQ。\n• 衛星配置 (30%)： 持有 TSLA, IBIT, AAPL 等。\n• 管理規則：單一標的上限 20%。若連續兩年報酬率低於 QQQ，轉入 QQQ。\n\n【戰備儲備水位】 (佔總額 20% — 動態再平衡)：\n• 標的： BOXX。\n• 回補機制： 獲利結清時，優先將資金補回至總資產設定水位。\n\n貳、 QQQ 與 TQQQ 轉換機制\n【下跌切換 (增加槓桿)】：依設定階梯將 QQQ 轉換為 TQQQ。\n【反彈切換與收割 (恢復配置)】：突破 ATH，且高於平均成本時執行轉換收割。\n\n參、 衛星 200 日均線狙擊與救援規則\n• 觸碰 200 日線、跌破 10%、止跌回升時分批轉槓桿。\n• 虧損 20%：戰備水位救援 (BOXX 撥款)。\n• 獲利 25%：結清回填 (優先補 BOXX)。\n\n肆、 執行紀律\n• 封閉系統，極限臥倒，不對稱操作。`;
        const defSats = [
            { id: '1', underlying: 'TSLA', leveraged: 'TSLL', qty_u: 0, qty_l: 0, ma200: 200, ma10: 190, target_pct: 15, profit_pct: 25, loss_pct: 20, rescues: 0 }, 
            { id: '2', underlying: 'IBIT', leveraged: 'BITU', qty_u: 0, qty_l: 0, ma200: 35, ma10: 36, target_pct: 10, profit_pct: 25, loss_pct: 20, rescues: 0 }
        ];
        const defLad = [
            { id: 'l1', drop_pct: 10, move_pct: 15 }, { id: 'l2', drop_pct: 20, move_pct: 15 }, 
            { id: 'l3', drop_pct: 30, move_pct: 15 }, { id: 'l4', drop_pct: 40, move_pct: 15 }
        ];
        const defUpLad = [
            { id: 'u1', rise_pct: 0, target_pct: 30 }, { id: 'u2', rise_pct: 5, target_pct: 15 }, { id: 'u3', rise_pct: 10, target_pct: 0 }
        ];
        const defInputs = { 
            motto: '動態佔比再平衡，嚴守紀律不凹單', planText: defPlan, 
            qqq_ath: 0, qty_core_1: 0, qty_core_2: 0, qty_boxx: 0, tqqq_avg_cost: 0, 
            core_profit_pct: 25, core_loss_pct: 20, cash_balance: 0, reserve_pct: 20, 
            core_ladder: defLad, core_up_ladder: defUpLad, satellites: defSats 
        };

        // --- UI 元件 ---
        const Icon = memo(({ name, size = 20, className = "" }) => {
            const i = { 
                TrendingUp: <path d="m22 7-8.5 8.5-5-5L2 17M22 7h-6M22 7v6"/>, TrendingDown: <path d="m22 17-8.5-8.5-5 5L2 5M22 17h-6M22 17v-6"/>, 
                Settings: <path d="M12.22 2h-.44a2 2 0 0 0-2 2a2 2 0 0 1-2 2a2 2 0 0 1 2-2a2 2 0 0 1 2-2a2 2 0 0 0-2-2zM9 12a3 3 0 1 1 6 0a3 3 0 0 1-6 0z"/>, 
                RefreshCcw: <path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8m0 4a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16m-18-8h5V3m13 18h-5v5"/>, 
                LayoutDashboard: <g><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></g>, 
                Save: <g><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></g>, 
                FileText: <g><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" x2="8" y1="13" y2="13"/><line x1="16" x2="8" y1="17" y2="17"/><polyline points="10 9 9 9 8 9"/></g>,
                BarChart2: <g><line x1="18" x2="18" y1="20" y2="10"/><line x1="12" x2="12" y1="20" y2="4"/><line x1="6" x2="6" y1="20" y2="14"/></g>, 
                CheckCircle: <g><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></g>, 
                Edit2: <path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/>, 
                Lock: <g><rect x="3" y="11" width="18" height="11" rx="2" ry="2" /><path d="M7 11V7a5 5 0 0 1 10 0v4" /></g>, 
                Unlock: <g><rect x="3" y="11" width="18" height="11" rx="2" ry="2" /><path d="M7 11V7a5 5 0 0 1 9.9-1" /></g>, 
                ChevronDown: <path d="m6 9 6 6 6-6"/>, ChevronUp: <path d="m18 15-6-6-6 6"/>, 
                Activity: <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>, PieChart: <path d="M21.21 15.89A10 10 0 1 1 8 2.83M22 12A10 10 0 0 0 12 2v10z"/>, 
                Plus: <path d="M12 5v14M5 12h14"/>, 
                Trash2: <g><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></g>, 
                LogOut: <g><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></g>, 
                User: <g><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></g>,
                Google: <path fill="currentColor" d="M21.35 11.1h-9.17v2.73h6.51c-.33 3.81-3.5 5.44-6.5 5.44C8.36 19.27 5 16.25 5 12c0-4.1 3.2-7.27 7.2-7.27 3.09 0 4.9 1.97 4.9 1.97L19 4.72S16.56 2 12.1 2C6.42 2 2.03 6.8 2.03 12c0 5.05 4.13 10 10.22 10 5.35 0 9.25-3.67 9.25-9.09 0-1.15-.15-1.81-.15-1.81z"/>, 
                X: <g><line x1="18" x2="6" y1="6" y2="18"/><line x1="6" x2="18" y1="6" y2="18"/></g>, 
                Quote: <path d="M3 21c3 0 7-1 7-8V5c0-1.25-.756-2.017-2-2H4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2 1 0 1 0 1 1 0 2.5 0 2-2 4-.5.5-.5 1 0 1.5zM16 21c3 0 7-1 7-8V5c0-1.25-.756-2.017-2-2h-2c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2 1 0 1 0 1 1 0 2.5 0 2-2 4-.5.5-.5 1 0 1.5z"/>, 
                AlertCircle: <g><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></g>, 
                Zap: <path d="M13 2 L3 14 L12 14 L11 22 L21 10 L12 10 L13 2 Z" />, 
                Shield: <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>, 
                Package: <g><path d="M16.5 9.4 7.5 4.21"/><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></g>
            };
            return (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {i[name] || <circle cx="12" cy="12" r="10" />}
                </svg>
            );
        });

        const CollapsibleCard = ({ title, icon, isOpen, onToggle, children, rightElement }) => (
            <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                <div className="p-5 flex justify-between items-center cursor-pointer bg-slate-50/80 border-b border-slate-100 hover:bg-slate-100/50 transition-colors" onClick={onToggle}>
                    <div className="flex gap-3 items-center text-sm font-black text-slate-800">
                        <Icon name={icon} className="text-brand-600" /> {title}
                    </div>
                    <div className="flex items-center gap-2">
                        {rightElement}
                        <Icon name={isOpen ? "ChevronUp" : "ChevronDown"} className="text-slate-400" />
                    </div>
                </div>
                {isOpen && <div className="p-5 sm:p-6 animate-in fade-in">{children}</div>}
            </div>
        );

        const Modal = ({ isOpen, onClose, title, icon, children }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 z-[100] bg-slate-900/60 backdrop-blur-sm flex items-center justify-center animate-in fade-in p-4">
                    <div className="w-full max-w-sm bg-white rounded-3xl p-6 shadow-2xl animate-in slide-in-from-bottom-4">
                        <div className="flex justify-between items-center mb-6">
                            <h3 className="text-xl font-black flex items-center gap-2 text-slate-800">
                                <Icon name={icon} className="text-brand-600"/>{title}
                            </h3>
                            <button onClick={onClose} className="p-2 bg-slate-100 rounded-full hover:bg-slate-200 active:scale-95">
                                <Icon name="X" size={16}/>
                            </button>
                        </div>
                        <div className="space-y-4">{children}</div>
                    </div>
                </div>
            );
        };

        const CustomTooltip = ({ active, payload, label }) => {
            if (active && payload && payload.length) {
                return (
                    <div className="bg-slate-800 p-4 rounded-2xl shadow-xl text-sm font-black text-white">
                        <p className="mb-2 text-slate-400">{new Date(label).toLocaleDateString()}</p>
                        {payload.map((p, i) => (
                            <p key={i} style={{color: p.color || p.fill}} className="mb-1">
                                {p.name}: {p.name.includes('跌幅') ? p.value.toFixed(1) + '%' : '$' + p.value.toLocaleString(undefined, {maximumFractionDigits: 0})}
                            </p>
                        ))}
                    </div>
                );
            }
            return null;
        };

        const CustomPieTooltip = ({ active, payload }) => {
            if (active && payload && payload.length && payload[0].payload) {
                const data = payload[0].payload;
                return (
                    <div className="bg-slate-800 border border-slate-700 p-4 rounded-2xl shadow-xl text-sm font-black z-50 text-white">
                        <p className="mb-1 text-slate-400">{data.name}</p>
                        <p className="text-lg">${(data.value || 0).toLocaleString(undefined, {maximumFractionDigits: 0})}</p>
                        <p className="text-brand-400 text-xs mt-1">佔總資產: {((data.percentOfTotal || 0) * 100).toFixed(1)}%</p>
                    </div>
                );
            }
            return null;
        };

        // --- 主程式 ---
        const App = () => {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('dashboard');
            const [prices, setPrices] = useState({});
            const [loadingPrices, setLoadingPrices] = useState(false);
            const [isSaving, setIsSaving] = useState(false);
            const [isSwitching, setIsSwitching] = useState(false);
            const [message, setMessage] = useState(null);
            const [authError, setAuthError] = useState(null);
            
            const [isMottoLocked, setIsMottoLocked] = useState(true);
            const [isPlanLocked, setIsPlanLocked] = useState(true);
            const [isSatDetailsOpen, setIsSatDetailsOpen] = useState(false);
            
            const [sections, setSections] = useState(() => { 
                try { 
                    const s = JSON.parse(localStorage.getItem('ah_std_sections_2026')); 
                    return s || { plan: false, core: true, satellite: true, holdings: true, allocation: true }; 
                } catch(e) { 
                    return { plan: false, core: true, satellite: true, holdings: true, allocation: true }; 
                } 
            });
            const toggleSection = (k) => setSections(p => { 
                const n = {...p, [k]: !p[k]}; 
                localStorage.setItem('ah_std_sections_2026', JSON.stringify(n)); 
                return n; 
            });

            const [records, setRecords] = useState([]);
            const [modal, setModal] = useState({ type: null, data: null, temp: {} });
            const [recordDate, setRecordDate] = useState(getTodayStr);
            const lastAutoDateRef = useRef(getTodayStr());

            useEffect(() => {
                const checkDate = () => { 
                    const t = getTodayStr(); 
                    if (t !== lastAutoDateRef.current) { 
                        lastAutoDateRef.current = t; 
                        setRecordDate(t); 
                    } 
                };
                const handleVis = () => { if (document.visibilityState === 'visible') checkDate(); };
                document.addEventListener('visibilitychange', handleVis); 
                window.addEventListener('focus', checkDate);
                return () => { 
                    document.removeEventListener('visibilitychange', handleVis); 
                    window.removeEventListener('focus', checkDate); 
                };
            }, []);

            const [inputs, setInputs] = useState(() => { 
                try { 
                    const b = localStorage.getItem('ah_local_backup_2026'); 
                    return b ? { ...defInputs, ...JSON.parse(b) } : defInputs; 
                } catch(e) { 
                    return defInputs; 
                } 
            });

            useEffect(() => { 
                localStorage.setItem('ah_local_backup_2026', JSON.stringify(inputs)); 
            }, [inputs]);

            useEffect(() => { 
                const initAuth = async () => { 
                    try { 
                        if (!auth.currentUser) await auth.signInAnonymously(); 
                        setAuthError(null); 
                    } catch(e) { 
                        setAuthError("Firebase 連線異常，請確認控制台已開啟匿名登入。"); 
                    } 
                }; 
                const unsub = auth.onAuthStateChanged(usr => { 
                    if(usr) setUser(usr); 
                    else initAuth(); 
                }); 
                return () => unsub();
            }, []);

            const handleGoogleLogin = async () => {
                try {
                    const provider = new firebase.auth.GoogleAuthProvider();
                    if (auth.currentUser && auth.currentUser.isAnonymous) {
                        try { 
                            await auth.currentUser.linkWithPopup(provider); 
                            showToast("成功綁定 Google 帳號！"); 
                        } catch (e) { 
                            if (e.code === 'auth/credential-already-in-use') { 
                                await auth.signInWithCredential(e.credential); 
                                showToast("已載入現有雲端資料。"); 
                            } else {
                                throw e; 
                            }
                        }
                    } else { 
                        await auth.signInWithPopup(provider); 
                        showToast("Google 登入成功！"); 
                    }
                    setAuthError(null);
                } catch (e) { 
                    setAuthError(e.message); 
                }
            };

            const handleLogout = async () => { 
                await auth.signOut(); 
                showToast("已登出帳號，切換為訪客模式。"); 
                // 登出後讓頁面回到 Dashboard
                setView('dashboard');
            };

            const getFirebaseRefs = () => {
                if (!user) return null;
                return { 
                    confRef: db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('config').doc('current'), 
                    recsRef: db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('trading_records') 
                };
            };
            
            useEffect(() => { 
                const refs = getFirebaseRefs(); 
                if (!refs) return;
                
                setIsSwitching(true);
                
                const unsubRecs = refs.recsRef.onSnapshot(
                    s => {
                        if (s && s.docs) {
                            setRecords(s.docs.map(d => ({id: d.id, ...d.data()})));
                        }
                    }, 
                    e => setAuthError("資料庫權限不足。")
                ); 
                
                const unsubConf = refs.confRef.onSnapshot(s => { 
                    if (s.exists) { 
                        const d = s.data() || {}; 
                        setInputs(p => ({ 
                            ...p, 
                            ...d, 
                            // 防禦機制：強制通過 getArr 解析，確保必定是陣列
                            satellites: getArr(d.satellites).length > 0 ? getArr(d.satellites) : defSats, 
                            core_ladder: getArr(d.core_ladder).length > 0 ? getArr(d.core_ladder) : defLad, 
                            core_up_ladder: getArr(d.core_up_ladder).length > 0 ? getArr(d.core_up_ladder) : defUpLad, 
                            reserve_pct: d.reserve_pct !== undefined ? d.reserve_pct : 20 
                        })); 
                    }
                    setIsSwitching(false); 
                }, () => setIsSwitching(false)); 
                
                fetchPrices(true);
                return () => { unsubRecs(); unsubConf(); };
            }, [user]);

            const symbolsString = useMemo(() => {
                let syms = ['QQQ', 'TQQQ', 'BOXX'];
                getArr(inputs.satellites).forEach(s => { 
                    if(s && s.underlying) syms.push(s.underlying.trim().toUpperCase()); 
                    if(s && s.leveraged) syms.push(s.leveraged.trim().toUpperCase()); 
                });
                return [...new Set(syms.filter(Boolean))].sort().join(',');
            }, [inputs.satellites]);

            useEffect(() => { fetchPrices(); }, [symbolsString]);

            const fetchPrices = useCallback(async (force = false) => { 
                if (loadingPrices && !force) return; 
                if (!symbolsString) return;

                const symsArray = symbolsString.split(','); 
                if (!symsArray[0]) return;
                
                setLoadingPrices(true); 
                try { 
                    const res = await Promise.allSettled(symsArray.map(s => fetch(`https://finnhub.io/api/v1/quote?symbol=${s}&token=${FINNHUB_KEY}`).then(r => r.json()).then(d => ({s, p: d.c})))); 
                    setPrices(p => ({
                        ...p, 
                        ...res.reduce((acc, c) => (c.status === 'fulfilled' && c.value.p > 0 ? {...acc, [c.value.s]: c.value.p} : acc), {})
                    })); 
                } catch(e) {} finally { 
                    setLoadingPrices(false); 
                } 
            }, [symbolsString, loadingPrices]);

            const showToast = (txt) => { setMessage(txt); setTimeout(() => setMessage(null), 3000); };
            const handleInput = (f, v) => setInputs(p => ({ ...p, [f]: v }));
            
            const syncToCloud = async (f, v) => { 
                const refs = getFirebaseRefs(); 
                if (refs) await refs.confRef.set({ [f]: sanitize(v) }, { merge: true }); 
            };

            const updateArr = (arr, id, field, value) => {
                setInputs(p => {
                    const currentArr = getArr(p[arr]);
                    const newArr = currentArr.map(i => i.id === id ? { ...i, [field]: value } : i);
                    return { ...p, [arr]: newArr };
                });
            };
            
            const removeArr = (arr, id) => { 
                const newArr = getArr(inputs[arr]).filter(i => i.id !== id); 
                setInputs(p => ({ ...p, [arr]: newArr })); 
                syncToCloud(arr, newArr); 
                showToast("已刪除"); 
            };
            
            const addArr = (arr, def) => { 
                const newArr = [...getArr(inputs[arr]), { id: Date.now().toString(), ...def }]; 
                setInputs(p => ({ ...p, [arr]: newArr })); 
                syncToCloud(arr, newArr); 
                showToast("已新增"); 
            };

            const saveRecord = async () => { 
                const refs = getFirebaseRefs(); 
                if (!refs) return;
                if (isSaving) return; 
                
                setIsSaving(true); 
                try { 
                    const cln = sanitize(inputs); 
                    await refs.recsRef.add({ 
                        date: new Date(recordDate).toISOString(), 
                        total_equity: metrics.totalCapital || 0, 
                        prices: sanitize(prices), 
                        inputs: cln 
                    }); 
                    await refs.confRef.set(cln, { merge: true }); 
                    showToast("紀錄已儲存"); 
                } catch(e) {} 
                setIsSaving(false); 
            };
            
            const deleteRecord = async () => { 
                const refs = getFirebaseRefs(); 
                if (!refs || !modal.data) return; 
                await refs.recsRef.doc(modal.data.id).delete(); 
                showToast("紀錄已刪除"); 
                setModal({type: null}); 
            };
            
            const editRecord = async () => { 
                const refs = getFirebaseRefs(); 
                if (!refs || !modal.data) return; 
                const u = {}; 
                if (modal.temp.date) u.date = modal.temp.date; 
                if (modal.temp.equity) u.total_equity = parseFloat(modal.temp.equity); 
                if (Object.keys(u).length) { 
                    await refs.recsRef.doc(modal.data.id).update(u); 
                    showToast("紀錄已更新"); 
                } 
                setModal({type: null}); 
            };
            
            const metrics = useMemo(() => {
                const getP = (t) => prices[String(t || "").trim().toUpperCase()] || 0;
                const getV = (k) => getNum(inputs[k]);
                
                const pQQQ = getP('QQQ'); 
                const pTQQQ = getP('TQQQ'); 
                const pBOXX = getP('BOXX') || 100; 
                
                const vC1 = pQQQ * getV('qty_core_1'); 
                const vC2 = pTQQQ * getV('qty_core_2'); 
                const vBOXX = pBOXX * getV('qty_boxx'); 
                const cash = getV('cash_balance');
                
                let vSatU = 0; 
                let vSatL = 0;
                const colors = [
                    {u:'#3b82f6',l:'#93c5fd'},
                    {u:'#10b981',l:'#6ee7b7'},
                    {u:'#f59e0b',l:'#fcd34d'},
                    {u:'#8b5cf6',l:'#c4b5fd'}
                ];
                
                const pieData = [];
                if (vC1 > 0) pieData.push({ name: 'QQQ', value: vC1, fill: '#1e293b' });
                if (vC2 > 0) pieData.push({ name: 'TQQQ', value: vC2, fill: '#64748b' });

                let tempU = 0; 
                let tempL = 0;
                
                // 強制將輸入解析為陣列
                const safeSatellites = getArr(inputs.satellites);
                const safeLadder = getArr(inputs.core_ladder);
                const safeUpLadder = getArr(inputs.core_up_ladder);

                safeSatellites.forEach(s => { 
                    if (s) {
                        tempU += getP(s.underlying) * getNum(s.qty_u); 
                        tempL += getP(s.leveraged) * getNum(s.qty_l); 
                    }
                });
                
                const tRes = cash + vBOXX; 
                const tCore = vC1 + vC2;
                const tCap = tRes + tCore + tempU + tempL;
                const safeT = tCap > 0 ? tCap : 1;

                const satStats = safeSatellites.map((s, i) => {
                    const uP = getP(s.underlying); 
                    const lP = getP(s.leveraged);  
                    const vU = uP * getNum(s.qty_u); 
                    const vL = lP * getNum(s.qty_l);
                    const cV = vU + vL; 
                    
                    vSatU += vU; 
                    vSatL += vL;
                    
                    if (vU > 0) pieData.push({ name: s.underlying || '正股', value: vU, fill: colors[i%colors.length].u });
                    if (vL > 0) pieData.push({ name: s.leveraged || '槓桿', value: vL, fill: colors[i%colors.length].l });
                    
                    const tPct = getNum(s.target_pct); 
                    const cPct = (cV / safeT) * 100; 
                    const tVal = tCap * (tPct / 100); 
                    const dPct = getNum(s.ma200) > 0 ? ((uP - getNum(s.ma200)) / getNum(s.ma200)) * 100 : 0;
                    
                    let st = "未定", col = "text-slate-500", act = "觀察中";
                    const ex = tVal > 0 ? (cV - tVal) / tVal : 0; 
                    const sh = tVal > 0 ? (tVal - cV) / tVal : 0;

                    if (vL > 0 || vU > 0) {
                        if (ex >= getNum(s.profit_pct)/100 && uP > getNum(s.ma200)) { 
                            st = `收割 (+${(ex*100).toFixed(1)}%)`; col = "text-fin-up"; act = `溢出，建議結清。優先補 BOXX，剩餘轉 QQQ。`; 
                        } 
                        else if (sh >= getNum(s.loss_pct)/100) { 
                            if (getNum(s.rescues) < 2) { 
                                st = `補倉 (-${(sh*100).toFixed(1)}%)`; col = "text-fin-down"; act = `衰退，建議賣出 BOXX 提取約 $${Math.round(tVal - cV)} 補足。`; 
                            } else { 
                                st = "補倉達上限"; col = "text-slate-600"; act = "已補 2 次，防禦等待。"; 
                            } 
                        }
                        else if (vL === 0 && vU > 0) {
                            if (getNum(s.ma200) === 0) { 
                                st = "未設參數"; 
                            } 
                            else if (uP > getNum(s.ma10) && uP < getNum(s.ma200) && getNum(s.ma10) > 0) { 
                                st = "站上 10MA"; col = "text-fin-info"; act = `止跌回升，全換槓桿。`; 
                            } 
                            else if (dPct <= -10) { 
                                st = "跌破 10%"; col = "text-fin-warn"; act = `跌破 200MA 10%，1/3 換槓桿。`; 
                            } 
                            else if (dPct <= 0 && dPct > -10) { 
                                st = "觸碰 200MA"; col = "text-fin-info"; act = `進入防禦區，1/3 換槓桿。`; 
                            } 
                            else { 
                                st = "持有現貨"; act = `高於 200MA。`; 
                            }
                        } else { 
                            st = "槓桿防禦中"; col = "text-brand-600"; act = `未達收割/補倉，維持部位。`; 
                        }
                    } else {
                        if (!s.underlying) { 
                            act = "輸入代號"; 
                        } else if (dPct <= 5 && dPct >= -5) { 
                            st = "均線範圍"; col = "text-fin-up"; act = `可買入槓桿。`; 
                        } else if (dPct < -5) { 
                            st = "低於均線"; col = "text-fin-down"; act = "偏弱觀察。"; 
                        } else { 
                            st = "高於均線"; col = "text-fin-info"; act = "乖離偏大暫停。"; 
                        }
                    }
                    return { ...s, cV, vU, vL, uP, lP, tPct, cPct, tVal, dPct, st, col, act };
                });

                const gExp = (vC1*1) + (vC2*3) + (vSatU*1) + (vSatL*2);
                const gLev = gExp / (tCore + vSatU + vSatL > 0 ? tCore + vSatU + vSatL : 1);
                const tLev = gExp / safeT; 
                
                pieData.forEach(d => d.percentOfTotal = d.value / safeT);

                const tgtRPct = inputs.reserve_pct !== undefined ? getNum(inputs.reserve_pct) : 20;
                let satSumPct = 0;
                safeSatellites.forEach(s => {
                    if (s && s.target_pct !== undefined) satSumPct += getNum(s.target_pct);
                });
                const tgtCPct = 100 - tgtRPct - satSumPct;
                
                const qAth = getV('qqq_ath');
                const cDD = qAth > 0 && pQQQ < qAth ? ((qAth - pQQQ) / qAth) * 100 : 0;
                const cRise = qAth > 0 && pQQQ >= qAth ? ((pQQQ - qAth) / qAth) * 100 : (pQQQ >= qAth ? 0 : -1);
                
                let tTqqqPct = 0; 
                let phase = "正常巡航";
                
                const lad = [...safeLadder].sort((a,b) => getNum(a.drop_pct) - getNum(b.drop_pct));
                const upLad = [...safeUpLadder].sort((a,b) => getNum(a.rise_pct) - getNum(b.rise_pct));

                if (cRise >= 0) {
                    let aUp = null; 
                    upLad.forEach(s => { if (cRise >= getNum(s.rise_pct)) aUp = s; });
                    
                    if (aUp) { 
                        tTqqqPct = getNum(aUp.target_pct); 
                        phase = `突破收割：+${cRise.toFixed(1)}% (保留 ${tTqqqPct}%)`; 
                    } else { 
                        let sumLad = 0;
                        lad.forEach(l => { sumLad += getNum(l.move_pct); });
                        tTqqqPct = sumLad;
                        phase = `突破基準，準備收割`; 
                    }
                } else {
                    lad.forEach(s => { 
                        if (cDD >= getNum(s.drop_pct)) tTqqqPct += getNum(s.move_pct); 
                    });
                    phase = `回撤加碼中 (目標 ${tTqqqPct}%)`;
                }

                const tTqqqVal = tCap * (tTqqqPct / 100);
                const cTqqqPctT = safeT > 0 ? (vC2 / safeT) * 100 : 0;
                
                let cAct = "維持現有配置比例"; 
                let cCol = "text-slate-600"; 
                let cDiff = 0;
                
                if (vC2 < tTqqqVal) {
                    if (tTqqqVal > 0 && (tTqqqVal - vC2)/tTqqqVal >= getV('core_loss_pct')/100) { 
                        cAct = `衰退建議加碼 TQQQ`; 
                        cCol = "text-fin-down"; 
                        cDiff = tTqqqVal - vC2; 
                    }
                } else if (vC2 > tTqqqVal) {
                    cDiff = vC2 - tTqqqVal;
                    if (cRise < 0) { 
                        cAct = `未突破 ATH，臥倒不賣。`; 
                        cCol = "text-fin-info"; 
                        cDiff = 0; 
                    } 
                    else if (getV('tqqq_avg_cost') > 0 && pTQQQ <= getV('tqqq_avg_cost')) { 
                        cAct = `低於成本保護中，暫緩收割`; 
                        cCol = "text-fin-warn"; 
                        cDiff = 0; 
                    } 
                    else { 
                        cAct = `突破設定，建議賣出溢出 TQQQ。`; 
                        cCol = "text-fin-up"; 
                    }
                } else if (cDD >= (lad.length > 0 ? getNum(lad[lad.length-1].drop_pct) : 40)) { 
                    cAct = "持滿 TQQQ，不動等待回升"; 
                    cCol = "text-slate-700"; 
                }

                let pEq = 0;
                const safeRecords = Array.isArray(records) ? [...records] : [];
                const gData = safeRecords.sort((a,b) => new Date(a.date) - new Date(b.date)).map(r => { 
                    if(r && r.total_equity > pEq) pEq = r.total_equity; 
                    return { 
                        date: r?.date, 
                        equity: r?.total_equity, 
                        dd: pEq > 0 ? ((r?.total_equity || 0) - pEq) / pEq * 100 : 0 
                    }; 
                });

                return { 
                    totalCapital: tCap, 
                    safeTotal: safeT, 
                    satStats, 
                    graphData: gData, 
                    pieData, 
                    growthLeverageRatio: gLev, 
                    totalLeverageRatio: tLev,
                    cls: { 
                        c: { u: vC1, l: vC2, t: tCore, p: (tCore/safeT)*100 }, 
                        s: { u: vSatU, l: vSatL, t: (vSatU+vSatL), p: ((vSatU+vSatL)/safeT)*100 }, 
                        r: { b: vBOXX, c: cash, t: tRes, p: (tRes/safeT)*100 } 
                    },
                    tgt: { 
                        c: { p: tgtCPct, ds: pQQQ>0 ? Math.round((tCap*(tgtCPct/100)-tCore)/pQQQ) : 0 }, 
                        s: { p: satSumPct, dv: (tCap*(satSumPct/100))-(vSatU+vSatL) }, 
                        r: { p: tgtRPct, ds: pBOXX>0 ? Math.round((tCap*(tgtRPct/100)-tRes)/pBOXX) : 0 } 
                    },
                    core: { 
                        pQQQ, qAth, cDD, cRise, tTqqqPct, cTqqqPctT, phase, cAct, cCol, cDiff, 
                        dnL: lad.map(s => ({ 
                            p: getNum(s.drop_pct), 
                            m: getNum(s.move_pct), 
                            tr: qAth*(1-getNum(s.drop_pct)/100), 
                            t: cDD>=getNum(s.drop_pct) 
                        })), 
                        upL: upLad.map(s => ({ 
                            p: getNum(s.rise_pct), 
                            tp: getNum(s.target_pct), 
                            tr: qAth*(1+getNum(s.rise_pct)/100), 
                            t: cRise>=getNum(s.rise_pct) 
                        })) 
                    }
                };
            }, [prices, inputs, records]);

            return (
                <div className="pb-32 min-h-screen transition-colors font-bold select-none bg-slate-50">
                    {message && (
                        <div className="fixed top-24 left-1/2 -translate-x-1/2 z-[60] bg-white border border-brand-200 px-6 py-3 rounded-full shadow-lg text-sm flex items-center gap-2 animate-in fade-in slide-in-from-top-4">
                            <Icon name="CheckCircle" className="text-fin-up"/>{message}
                        </div>
                    )}
                    
                    {authError && (
                        <div className="fixed top-4 inset-x-4 z-[70] bg-red-50 border-l-4 border-red-500 p-4 rounded-lg shadow-lg flex gap-3 animate-in slide-in-from-top-4">
                            <Icon name="AlertCircle" className="text-red-500"/>
                            <div className="flex-1">
                                <h4 className="text-red-800 text-sm">提示</h4>
                                <p className="text-red-600 text-xs">{authError}</p>
                                {/* 緊急登出還原按鈕 */}
                                <button onClick={handleLogout} className="mt-2 text-xs bg-red-100 hover:bg-red-200 text-red-700 px-3 py-1.5 rounded-lg active:scale-95 transition-all">
                                    緊急清除異常並登出
                                </button>
                            </div>
                            <button onClick={() => setAuthError(null)} className="text-red-400 p-1 self-start">
                                <Icon name="X" size={16}/>
                            </button>
                        </div>
                    )}
                    
                    {isSwitching && !authError && (
                        <div className="loading-overlay">
                            <div className="w-10 h-10 border-4 border-slate-600 border-t-white rounded-full animate-spin"/>
                            <div className="text-sm">同步中...</div>
                        </div>
                    )}

                    {modal.type === 'DELETE_RECORD' && (
                        <Modal title="刪除紀錄" icon="Trash2" isOpen={true} onClose={() => setModal({type:null})}>
                            <p className="text-sm text-slate-600 mb-4">確定刪除此紀錄？</p>
                            <button onClick={deleteRecord} className="w-full bg-fin-down text-white py-4 rounded-xl active:scale-95">刪除</button>
                        </Modal>
                    )}
                    
                    {modal.type === 'EDIT_RECORD' && (
                        <Modal title="編輯紀錄" icon="Edit2" isOpen={true} onClose={() => setModal({type:null})}>
                            <div className="space-y-4">
                                <div>
                                    <label className="text-xs text-slate-500 mb-2 block">日期</label>
                                    <input type="date" className="w-full bg-slate-50 p-4 rounded-xl border font-black outline-none input-focus-ring" defaultValue={modal.data.date?.split('T')[0]} onChange={e => setModal({...modal,temp:{...modal.temp,date:new Date(e.target.value).toISOString()}})} />
                                </div>
                                <div>
                                    <label className="text-xs text-slate-500 mb-2 block">總資產 ($)</label>
                                    <input type="number" inputMode="decimal" className="w-full bg-slate-50 p-4 rounded-xl border font-mono text-xl text-brand-700 outline-none input-focus-ring" defaultValue={modal.data.total_equity} onChange={e => setModal({...modal,temp:{...modal.temp,equity:e.target.value}})} />
                                </div>
                                <button onClick={editRecord} className="w-full bg-brand-600 text-white py-4 rounded-xl active:scale-95">儲存變更</button>
                            </div>
                        </Modal>
                    )}

                    <header className="fixed top-0 inset-x-0 bg-white z-50 px-5 py-4 flex justify-between items-center shadow-sm border-b">
                        <div className="flex items-center gap-2">
                            <svg viewBox="0 0 100 100" className="w-6 h-6">
                                <rect width="100" height="100" rx="20" fill="#0f172a"/>
                                <path d="M25 75 L50 25 L75 75" stroke="#3b82f6" strokeWidth="12" strokeLinecap="round" strokeLinejoin="round" fill="none"/>
                                <circle cx="50" cy="25" r="8" fill="#3b82f6"/>
                            </svg>
                            <h1 className="text-xl">Alpha Horizon</h1>
                        </div>
                        <button onClick={() => fetchPrices(true)} className={`p-2.5 rounded-xl bg-slate-50 text-slate-500 border active:scale-95 relative ${loadingPrices?'animate-spin':''}`}>
                            <Icon name="RefreshCcw" size={20}/>
                            {!loadingPrices && <div className="absolute top-1 right-1 w-2 h-2 bg-fin-up rounded-full border border-white"/>}
                        </button>
                    </header>

                    <main className="max-w-md mx-auto p-4 pt-24 space-y-6">
                        {view === 'dashboard' && (
                            <div className="space-y-6 animate-in fade-in">
                                <div className="bg-white rounded-3xl p-5 shadow-sm border relative input-focus-ring group">
                                    <div className="flex justify-between items-center mb-2">
                                        <div className="flex items-center gap-2 text-brand-600">
                                            <Icon name="Quote" size={16}/>
                                            <span className="text-xs uppercase tracking-widest text-slate-500">投資座右銘</span>
                                        </div>
                                        <button onClick={() => setIsMottoLocked(!isMottoLocked)} className="text-slate-400 active:scale-95">
                                            <Icon name={isMottoLocked?"Lock":"Unlock"} size={16}/>
                                        </button>
                                    </div>
                                    <textarea value={inputs.motto} readOnly={isMottoLocked} onChange={e => handleInput('motto', e.target.value)} onBlur={e => syncToCloud('motto', e.target.value)} className={`w-full bg-transparent text-base text-slate-700 outline-none text-center leading-relaxed transition-all ${isMottoLocked?'':'bg-slate-50 border-dashed border-slate-300 rounded-xl p-3 border'}`} rows="6" placeholder="輸入您的投資座右銘..." />
                                </div>

                                <div className="bg-white rounded-3xl p-5 shadow-sm border">
                                    <div className="text-xs text-slate-500 mb-1">動態總資產價值 (USD)</div>
                                    <div className="text-5xl font-mono tracking-tight text-slate-800">${metrics.totalCapital.toLocaleString(undefined,{maximumFractionDigits:0})}</div>
                                    <div className="mt-5 pt-4 border-t grid grid-cols-3 gap-1 text-center divide-x">
                                        <div className="px-1">
                                            <div className="text-[10px] text-slate-400 mb-0.5">大盤核心</div>
                                            <div className="text-sm font-mono text-slate-800">{metrics.cls.c.p.toFixed(1)}%</div>
                                            <div className="text-[9px] text-slate-400">目標 {metrics.tgt.c.p}%</div>
                                            <div className={`text-[9px] mt-2 px-1 py-1 rounded ${metrics.tgt.c.ds>0?'bg-fin-up/10 text-fin-up':metrics.tgt.c.ds<0?'bg-fin-down/10 text-fin-down':'bg-slate-50 text-slate-500'}`}>
                                                {metrics.tgt.c.ds>0 ? `需買 ${metrics.tgt.c.ds.toLocaleString()} 股` : metrics.tgt.c.ds<0 ? `需賣 ${Math.abs(metrics.tgt.c.ds).toLocaleString()} 股` : '完美達標'}
                                            </div>
                                        </div>
                                        <div className="px-1">
                                            <div className="text-[10px] text-slate-400 mb-0.5">機動衛星</div>
                                            <div className="text-sm font-mono text-slate-800">{metrics.cls.s.p.toFixed(1)}%</div>
                                            <div className="text-[9px] text-slate-400">目標 {metrics.tgt.s.p}%</div>
                                            <div className={`text-[9px] mt-2 px-1 py-1 rounded ${metrics.tgt.s.dv>50?'bg-fin-up/10 text-fin-up':metrics.tgt.s.dv<-50?'bg-fin-down/10 text-fin-down':'bg-slate-50 text-slate-500'}`}>
                                                {metrics.tgt.s.dv>50 ? `總補 $${Math.round(metrics.tgt.s.dv).toLocaleString()}` : metrics.tgt.s.dv<-50 ? `總賣 $${Math.abs(Math.round(metrics.tgt.s.dv)).toLocaleString()}` : '完美達標'}
                                            </div>

                                            <label className="text-[10px] font-bold text-amber-700 w-24">TQQQ 成本 $</label>
                                            <span className="text-amber-400 pl-3 font-mono text-lg">$</span>
                                            <input type="number" value={inputs.tqqq_avg_cost} onChange={e=>handleInput('tqqq_avg_cost', e.target.value)} onBlur={e=>syncToCloud('tqqq_avg_cost',e.target.value)} className="w-full bg-transparent font-mono text-amber-700 outline-none"/>
                                        </div>
                                        <div className="grid grid-cols-2 gap-2 pt-2 border-t">
                                            <div className="bg-white border rounded p-1.5">
                                                <label className="text-[9px] text-fin-up block">收割閥值 +%</label>
                                                <input type="number" value={inputs.core_profit_pct} onChange={e=>handleInput('core_profit_pct',e.target.value)} onBlur={e=>syncToCloud('core_profit_pct',e.target.value)} className="w-full font-mono text-center outline-none"/>
                                            </div>
                                            <div className="bg-white border rounded p-1.5">
                                                <label className="text-[9px] text-fin-down block">加碼閥值 -%</label>
                                                <input type="number" value={inputs.core_loss_pct} onChange={e=>handleInput('core_loss_pct',e.target.value)} onBlur={e=>syncToCloud('core_loss_pct',e.target.value)} className="w-full font-mono text-center outline-none"/>
                                            </div>
                                        </div>
                                        
                                        <div className="pt-4 border-t">
                                            <label className="text-[10px] text-brand-600 font-bold mb-2 block">下跌轉換階梯</label>
                                            {getArr(inputs.core_ladder).map((l,i) => (
                                                <div key={l.id} className="flex gap-2 items-center mb-1">
                                                    <div className="flex-1 bg-slate-50 border rounded flex items-center px-2">
                                                        <span className="text-xs text-slate-400">-</span>
                                                        <input type="number" value={l.drop_pct} onChange={e=>updateArr('core_ladder', l.id, 'drop_pct', e.target.value)} onBlur={()=>syncToCloud('core_ladder', inputs.core_ladder)} className="w-full p-1 bg-transparent font-mono text-sm outline-none"/>%
                                                    </div>
                                                    <Icon name="ChevronDown" size={14} className="-rotate-90 text-slate-300"/>
                                                    <div className="flex-1 bg-brand-50 border border-brand-100 rounded flex items-center px-2">
                                                        <input type="number" value={l.move_pct} onChange={e=>updateArr('core_ladder', l.id, 'move_pct', e.target.value)} onBlur={()=>syncToCloud('core_ladder', inputs.core_ladder)} className="w-full p-1 bg-transparent text-brand-700 font-mono text-sm outline-none"/>%
                                                    </div>
                                                    <button onClick={()=>removeArr('core_ladder',l.id)} className="p-1 text-slate-400 hover:text-red-500"><Icon name="X" size={14}/></button>
                                                </div>
                                            ))}
                                            <button onClick={()=>addArr('core_ladder', {drop_pct:0, move_pct:0})} className="w-full py-2 mt-2 border-dashed border-2 rounded-lg text-xs text-slate-500 active:scale-95">+ 新增</button>
                                        </div>
                                        
                                        <div className="pt-4 border-t">
                                            <label className="text-[10px] text-brand-600 font-bold mb-2 block">突破收割階梯</label>
                                            {getArr(inputs.core_up_ladder).map((l,i) => (
                                                <div key={l.id} className="flex gap-2 items-center mb-1">
                                                    <div className="flex-1 bg-slate-50 border rounded flex items-center px-2">
                                                        <span className="text-xs text-brand-500">+</span>
                                                        <input type="number" value={l.rise_pct} onChange={e=>updateArr('core_up_ladder', l.id, 'rise_pct', e.target.value)} onBlur={()=>syncToCloud('core_up_ladder', inputs.core_up_ladder)} className="w-full p-1 bg-transparent font-mono text-sm outline-none"/>%
                                                    </div>
                                                    <Icon name="ChevronDown" size={14} className="-rotate-90 text-slate-300"/>
                                                    <div className="flex-1 bg-fin-up/10 border border-fin-up/20 rounded flex items-center px-2">
                                                        <input type="number" value={l.target_pct} onChange={e=>updateArr('core_up_ladder', l.id, 'target_pct', e.target.value)} onBlur={()=>syncToCloud('core_up_ladder', inputs.core_up_ladder)} className="w-full p-1 bg-transparent text-fin-up font-mono text-sm outline-none"/>%
                                                    </div>
                                                    <button onClick={()=>removeArr('core_up_ladder',l.id)} className="p-1 text-slate-400 hover:text-red-500"><Icon name="X" size={14}/></button>
                                                </div>
                                            ))}
                                            <button onClick={()=>addArr('core_up_ladder', {rise_pct:0, target_pct:0})} className="w-full py-2 mt-2 border-dashed border-2 rounded-lg text-xs text-slate-500 active:scale-95">+ 新增</button>
                                        </div>
                                    </div>
                                </div>

                                <div className="bg-white rounded-3xl p-6 border border-slate-200">
                                    <div className="flex justify-between mb-4 border-b pb-2">
                                        <h2 className="font-black flex items-center gap-2"><Icon name="Activity" size={18} className="text-fin-info"/>衛星參數</h2>
                                        <div className="text-[10px] bg-brand-50 px-2 py-1 text-brand-600 rounded">總計: {getArr(inputs.satellites).reduce((s,a)=>s+getNum(a.target_pct),0)}%</div>
                                    </div>
                                    <div className="space-y-4">
                                        {getArr(inputs.satellites).map(s => (
                                            <div key={s.id} className="bg-slate-50 p-3 rounded-xl border relative">
                                                <button onClick={()=>removeArr('satellites', s.id)} className="absolute top-2 right-2 text-slate-400 hover:text-fin-down active:scale-95"><Icon name="Trash2" size={14}/></button>
                                                <div className="flex gap-2 mb-2 pr-6">
                                                    <input value={s.underlying} onChange={e=>updateArr('satellites',s.id,'underlying',e.target.value.toUpperCase())} onBlur={()=>syncToCloud('satellites',inputs.satellites)} className="w-full bg-white text-xs p-2 rounded border font-black uppercase" placeholder="正股代號"/>
                                                    <input value={s.leveraged} onChange={e=>updateArr('satellites',s.id,'leveraged',e.target.value.toUpperCase())} onBlur={()=>syncToCloud('satellites',inputs.satellites)} className="w-full bg-brand-50 text-brand-700 text-xs p-2 rounded border border-brand-200 font-black uppercase" placeholder="槓桿代號"/>
                                                </div>
                                                <div className="grid grid-cols-3 gap-1 mb-2 bg-white p-1 rounded border">
                                                    <div className="text-center">
                                                        <label className="text-[8px] text-slate-400">目標%</label>
                                                        <input type="number" value={s.target_pct} onChange={e=>updateArr('satellites',s.id,'target_pct',e.target.value)} onBlur={()=>syncToCloud('satellites',inputs.satellites)} className="w-full font-mono text-[10px] outline-none bg-transparent"/>
                                                    </div>
                                                    <div className="text-center border-l">
                                                        <label className="text-[8px] text-fin-up">收割+%</label>
                                                        <input type="number" value={s.profit_pct} onChange={e=>updateArr('satellites',s.id,'profit_pct',e.target.value)} onBlur={()=>syncToCloud('satellites',inputs.satellites)} className="w-full font-mono text-[10px] outline-none bg-transparent"/>
                                                    </div>
                                                    <div className="text-center border-l">
                                                        <label className="text-[8px] text-fin-down">補倉-%</label>
                                                        <input type="number" value={s.loss_pct} onChange={e=>updateArr('satellites',s.id,'loss_pct',e.target.value)} onBlur={()=>syncToCloud('satellites',inputs.satellites)} className="w-full font-mono text-[10px] outline-none bg-transparent"/>
                                                    </div>
                                                </div>
                                                <div className="grid grid-cols-3 gap-1">
                                                    <div className="bg-white p-1 rounded border">
                                                        <label className="text-[8px] text-slate-400 block px-1">200MA</label>
                                                        <input type="number" value={s.ma200} onChange={e=>updateArr('satellites',s.id,'ma200',e.target.value)} onBlur={()=>syncToCloud('satellites',inputs.satellites)} className="w-full font-mono text-[10px] outline-none bg-transparent"/>
                                                    </div>
                                                    <div className="bg-white p-1 rounded border">
                                                        <label className="text-[8px] text-fin-info block px-1">10MA</label>
                                                        <input type="number" value={s.ma10} onChange={e=>updateArr('satellites',s.id,'ma10',e.target.value)} onBlur={()=>syncToCloud('satellites',inputs.satellites)} className="w-full font-mono text-[10px] outline-none bg-transparent"/>
                                                    </div>
                                                    <div className="bg-white p-1 rounded border">
                                                        <label className="text-[8px] text-slate-400 block px-1">補倉次</label>
                                                        <input type="number" value={s.rescues} onChange={e=>updateArr('satellites',s.id,'rescues',e.target.value)} onBlur={()=>syncToCloud('satellites',inputs.satellites)} className="w-full font-mono text-[10px] outline-none bg-transparent"/>
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                        <button onClick={()=>addArr('satellites', { underlying:'', leveraged:'', qty_u:0, qty_l:0, ma200:0, ma10:0, target_pct:10, profit_pct:25, loss_pct:20, rescues:0 })} className="w-full py-3 border-dashed border-2 rounded-xl text-slate-500 text-sm active:scale-95">+ 新增衛星</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {view === 'history' && (
                            <div className="space-y-6 animate-in fade-in">
                                <div className="bg-white rounded-3xl p-5 shadow-sm border h-[300px]">
                                    <div className="text-xs font-black text-slate-700 mb-2 flex items-center gap-1"><Icon name="TrendingUp" size={14} className="text-brand-600"/> 資產歷史走勢</div>
                                    {hasCharts ? (
                                        <ResponsiveContainer width="100%" height="85%">
                                            <ComposedChart data={metrics.graphData} margin={{top:5,right:0,left:-20,bottom:0}}>
                                                <defs>
                                                    <linearGradient id="cEq" x1="0" y1="0" x2="0" y2="1"><stop offset="5%" stopColor="#3b82f6" stopOpacity={0.4}/><stop offset="95%" stopColor="#3b82f6" stopOpacity={0}/></linearGradient>
                                                    <linearGradient id="cDD" x1="0" y1="0" x2="0" y2="1"><stop offset="5%" stopColor="#ef4444" stopOpacity={0.15}/><stop offset="95%" stopColor="#ef4444" stopOpacity={0}/></linearGradient>
                                                </defs>
                                                <XAxis dataKey="date" tickFormatter={v=>new Date(v).toLocaleDateString(undefined,{month:'numeric',day:'numeric'})} tick={{fontSize:10, fill:'#94a3b8'}} axisLine={false} tickLine={false}/>
                                                <YAxis yAxisId="left" tickFormatter={v=>`${(v/1000).toFixed(0)}k`} tick={{fontSize:10, fill:'#64748b'}} axisLine={false} tickLine={false}/>
                                                <YAxis yAxisId="right" orientation="right" tickFormatter={v=>`${v.toFixed(0)}%`} tick={{fontSize:10, fill:'#ef4444'}} domain={['auto', 0]} axisLine={false} tickLine={false}/>
                                                <Tooltip content={<CustomTooltip/>} cursor={{ stroke:'#cbd5e1', strokeDasharray:'3 3' }}/>
                                                <Area yAxisId="left" type="stepAfter" dataKey="equity" stroke="#3b82f6" strokeWidth={2} fill="url(#cEq)" name="總資產"/>
                                                <Area yAxisId="right" type="monotone" dataKey="dd" stroke="none" fill="url(#cDD)" name="大盤跌幅"/>
                                            </ComposedChart>
                                        </ResponsiveContainer>
                                    ) : (<div className="h-full flex items-center justify-center text-slate-400 text-xs border border-dashed rounded-xl">圖表載入中...</div>)}
                                </div>
                                <div className="bg-white rounded-3xl shadow-sm border p-4">
                                    <h3 className="text-sm font-black mb-3 border-b pb-2 flex items-center gap-1"><Icon name="FileText" size={14}/> 歷史紀錄</h3>
                                    {!getArr(records).length ? (<div className="text-center text-xs text-slate-400 py-6">尚無紀錄</div>) : (
                                        <div className="space-y-3 max-h-[500px] overflow-y-auto">
                                            {getArr(records).sort((a,b)=>new Date(b.date)-new Date(a.date)).map(r => (
                                                <div key={r.id} className="bg-slate-50 p-3 rounded-xl border border-slate-100">
                                                    <div className="flex justify-between items-center border-b pb-2 mb-2">
                                                        <span className="text-[10px] font-mono bg-white px-2 py-0.5 rounded border">{new Date(r.date).toLocaleDateString()}</span>
                                                        <div className="flex items-center gap-3">
                                                            <span className="text-brand-600 font-mono font-black">${(r.total_equity||0).toLocaleString()}</span>
                                                            <div className="flex gap-1">
                                                                <button onClick={()=>setModal({type:'EDIT_RECORD', data:r, temp:{}})} className="text-slate-400 hover:text-brand-600 p-1"><Icon name="Edit2" size={14}/></button>
                                                                <button onClick={()=>setModal({type:'DELETE_RECORD', data:r})} className="text-slate-400 hover:text-fin-down p-1"><Icon name="Trash2" size={14}/></button>
                                                            </div>
                                                        </div>
                                                    </div>
                                                    <div className="grid grid-cols-4 gap-1 text-center font-mono text-[9px]">
                                                        <div className="bg-white p-1 rounded border"><div className="text-[8px] text-slate-400">QQQ</div>{r.inputs?.qty_core_1||0}</div>
                                                        <div className="bg-white p-1 rounded border"><div className="text-[8px] text-slate-400">TQQQ</div>{r.inputs?.qty_core_2||0}</div>
                                                        <div className="bg-slate-800 text-brand-100 p-1 rounded border border-slate-700"><div className="text-[8px] text-slate-400">BOXX</div>{r.inputs?.qty_boxx||0}</div>
                                                        <div className="bg-white p-1 rounded border"><div className="text-[8px] text-slate-400">現金</div>{Math.round(r.inputs?.cash_balance||0)}</div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}
                    </main>

                    <nav className="fixed bottom-0 inset-x-0 bg-white border-t z-50 py-2 pb-6 flex justify-around shadow-lg">
                        {[{id:'dashboard',icon:'LayoutDashboard',l:'主控台'},{id:'settings',icon:'Settings',l:'參數設定'},{id:'history',icon:'TrendingUp',l:'戰報'}].map(t => (
                            <button key={t.id} onClick={()=>setView(t.id)} className={`flex flex-col items-center gap-1 flex-1 pt-1 transition-all ${view===t.id?'text-brand-600 -translate-y-1':'text-slate-400'}`}>
                                <Icon name={t.icon} size={22}/>
                                <span className="text-[10px] font-black">{t.l}</span>
                                {view===t.id && <div className="w-1 h-1 bg-brand-600 rounded-full mt-0.5"></div>}
                            </button>
                        ))}
                    </nav>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
