        const defaultPlan = `壹、 資金分配架構
將總投資資金拆分為以下兩個部分動態運作：

【成長部位】 (佔總額 80% — 比例管理)：
• 核心配置 (70%)： 持有 QQQ。
• 衛星配置 (30%)： 持有 TSLA (15%)、IBIT (10%)、AAPL/NET (5%)。
• 管理規則：單一標的上限 20%。若連續兩年報酬率低於 QQQ，則轉入 QQQ。

【戰備儲備水位】 (佔總額 20% — 動態再平衡)：
• 標的： BOXX。
• 動態基準： 每次執行「獲利結清」或「年度結算」時，以當下總資產的 20% 作為新的戰備水位目標。
• 救援消耗： 接受因「補倉救援」導致水位低於 20%，此為系統允許之必要防禦動作。
• 回補機制： 獲利結清時，優先將資金補回至總資產的 20% 水位。

貳、 QQQ 與 TQQQ 轉換機制 (指數波段)
以 QQQ 歷史高點為基準，根據跌幅分四批次調整槓桿：

【下跌切換 (增加槓桿)】：
• QQQ 自高點下跌 10% / 20% / 30% / 40%：每階段將成長部位中 15% 的 QQQ 轉換為 TQQQ。
【反彈切換 (恢復配置)】：
• 指數自低點反彈 10% 與 20% 時：分批將 TQQQ 換回 QQQ。
• 指數重回歷史高點：全數換回 QQQ。
• 執行前提：轉換回 QQQ 時，賣出價格必須高於當初買入的平均成本。

參、 個股 200 日均線狙擊與救援規則
【槓桿切換點 (分三階段)】：
• 股價觸碰 200 日線、跌破 10%、以及止跌回升時，各將 1/3 現貨轉換為 2 倍槓桿標的。
【戰備水位救援 (BOXX 撥款)】：
• 當個股帳面價值較其基準值下跌達 20% 時：賣出 BOXX 提取現金補回該標的之原始基準額 (單一標的限 2 次)。
• 註：此時戰備水位會下降（例如從 20% 降至 15%），此時不需立即補回。
【獲利結清與回填 (資產擴張點)】：
• 當標的獲利達 25% 且高於成本時，結清槓桿並換回現貨。
• 回填優先權：
  第一步： 優先將資金撥入 BOXX，直到其金額恢復至當前總資產的 20%。
  第二步： 剩餘的所有利潤，全數轉入 QQQ 部位，推動核心成長。

肆、 執行紀律
• 封閉系統： 不依賴場外新資金。
• 不對稱操作： 獲利 25% 才結清，虧損 20% 才救援。
• 成本保護： 所有槓桿工具切換回現貨時，必須確保為獲利狀態。
• 極限臥倒： 若戰備水位耗盡且市場持續下修，嚴禁割肉賣出，原地持有等待反轉。`;

                    }
                }; 
                const unsubscribe = auth.onAuthStateChanged(usr => {
                    if(usr) setUser(usr); else initAuth(); 
                }); 
                return () => unsubscribe();
            }, []);

            const handleGoogleLogin = async () => {
                const provider = new firebase.auth.GoogleAuthProvider();
                try {
                    if (auth.currentUser && auth.currentUser.isAnonymous) {
                        try {
                            await auth.currentUser.linkWithPopup(provider);
                            showToast("成功綁定 Google 帳號！資料已同步。");
                        } catch (linkError) {
                            if (linkError.code === 'auth/credential-already-in-use') {
                                await auth.signInWithCredential(linkError.credential);
                                showToast("已登入現有 Google 帳號，載入雲端資料。");
                            } else { throw linkError; }
                        }
                    } else {
                        await auth.signInWithPopup(provider);
                        showToast("Google 登入成功！");
                    }
                    setAuthError(null);
                } catch (error) {
                    console.error("Google 登入錯誤:", error);
                    if (error.code === 'auth/unauthorized-domain') {
                        setAuthError(`網域未授權：請至 Firebase 控制台 ➔ Authentication 授權此網域。`);
                    } else { setAuthError("Google 登入失敗: " + error.message); }
                }
            };

            const handleLogout = async () => { await auth.signOut(); showToast("已登出 Google 帳號，切換為訪客模式。"); };

            const getFirebaseRefs = () => {
                if (!user) return null;
                return {
                    confRef: db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('config').doc('current'),
                    recsRef: db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('trading_records')
                };
            };
            
            useEffect(() => { 
                const refs = getFirebaseRefs();
                if (!refs) return;

                setIsSwitching(true);
                const unsubscribeRecs = refs.recsRef.onSnapshot(
                    s => setRecords(s.docs.map(d => ({id:d.id,...d.data()}))), 
                    e => { if (e.message.includes("permission")) setAuthError("資料庫權限不足。"); }
                ); 
                
                const unsubscribeConf = refs.confRef.onSnapshot(s => { 
                    if (s.exists) { 
                        const d = s.data(); 
                        if(!d.satellites) d.satellites = defaultSatellites; 
                        else {
                            d.satellites = d.satellites.map(sat => ({
                                ...sat,
                                target_pct: sat.target_pct || 10,
                                profit_pct: sat.profit_pct || 25,
                                loss_pct: sat.loss_pct || 20,
                                ma10: sat.ma10 || 0
                            }));
                        }
                        if(d.qty_boxx === undefined) d.qty_boxx = 0;
                        setInputs(p => ({...p, ...d})); 
                    }
                    setIsSwitching(false); 
                }, e => { setIsSwitching(false); }); 
                    
                fetchPrices(true);
                return () => { unsubscribeRecs(); unsubscribeConf(); };
            }, [user]);

            useEffect(() => { fetchPrices(); }, [inputs.satellites]);

            const fetchPrices = useCallback(async (force = false) => { 
                if (loadingPrices && !force) return; 
                let syms = ['QQQ', 'TQQQ', 'BOXX'];
                (inputs.satellites || []).forEach(s => { if(s.underlying) syms.push(s.underlying); if(s.leveraged) syms.push(s.leveraged); });
                syms = [...new Set(syms.filter(Boolean).map(s=>String(s).trim().toUpperCase()))];
                
                if (syms.length === 0) return;

                setLoadingPrices(true); 
                try { 
                    const res = await Promise.allSettled(syms.map(s => fetch(`https://finnhub.io/api/v1/quote?symbol=${s}&token=${FINNHUB_KEY}`).then(r => r.json()).then(d => ({s, p: d.c})))); 
                    setPrices(p => ({...p, ...res.reduce((acc, curr) => (curr.status === 'fulfilled' && curr.value.p > 0 ? {...acc, [curr.value.s]: curr.value.p} : acc), {})})); 
                } catch(e) { console.error(e); } finally { setLoadingPrices(false); } 
            }, [inputs.satellites, loadingPrices]);

            const showToast = (txt) => { setMessage(txt); setTimeout(() => setMessage(null), 3000); };
            const handleInputChange = (f, v) => setInputs(p => ({ ...p, [f]: v }));
            
            const syncToCloud = async (f, v) => { 
                const refs = getFirebaseRefs();
                if (refs) { try { await refs.confRef.set({ [f]: sanitizeForFirestore(v) }, { merge: true }); } catch (e) {} } 
            };
            
            const updateSatellite = (id, field, value) => { 
                setInputs(p => {
                    const newSats = p.satellites.map(s => s.id === id ? { ...s, [field]: value } : s);
                    return { ...p, satellites: newSats };
                });
            };
            const saveSatellites = () => syncToCloud('satellites', inputsRef.current.satellites);
            
            const addSatellite = () => {
                const newSat = { id: Date.now().toString(), underlying: '', leveraged: '', qty_u: 0, qty_l: 0, ma200: 0, ma10: 0, target_pct: 10, profit_pct: 25, loss_pct: 20, rescues: 0 };
                const newSats = [...(inputs.satellites || []), newSat];
                setInputs(p => ({ ...p, satellites: newSats }));
                syncToCloud('satellites', newSats);
                showToast("已新增衛星部位");
            };

            const removeSatellite = (id) => {
                const newSats = (inputs.satellites || []).filter(s => s.id !== id);
                setInputs(p => ({ ...p, satellites: newSats }));
                syncToCloud('satellites', newSats);
                showToast("已刪除衛星部位");
            };

            const save = async () => { 
                const refs = getFirebaseRefs();
                if (!refs) { showToast("無法儲存：尚未連接至雲端。"); return; }
                if (isSaving) return; 
                setIsSaving(true); 
                try { 
                    const cleanInputs = sanitizeForFirestore(inputs); 
                    const payload = { date: new Date(recordDate).toISOString(), total_equity: metrics.totalCapital || 0, prices: sanitizeForFirestore(prices), inputs: cleanInputs }; 
                    await refs.recsRef.add(payload); 
                    await refs.confRef.set(cleanInputs, { merge: true }); 
                    showToast("資產紀錄已安全儲存"); 
                } catch(e) { showToast(`儲存失敗: ${e.message}`); } 
                setIsSaving(false); 
            };

            const deleteRecord = async () => {
                const refs = getFirebaseRefs();
                if (!refs || !modal.data) return;
                try { await refs.recsRef.doc(modal.data.id).delete(); showToast("紀錄已成功刪除"); } catch (e) {}
                setModal({type: null, data: null, temp: {}});
            };

            const editRecord = async () => {
                const refs = getFirebaseRefs();
                if (!refs || !modal.data) return;
                try {
                    const updates = {};
                    if (modal.temp.date) updates.date = modal.temp.date;
                    if (modal.temp.equity !== undefined && modal.temp.equity !== "") updates.total_equity = parseFloat(modal.temp.equity);
                    if (Object.keys(updates).length > 0) { await refs.recsRef.doc(modal.data.id).update(updates); showToast("紀錄已更新"); }
                } catch (e) {}
                setModal({type: null, data: null, temp: {}});
            };
            
            const metrics = useMemo(() => {
                const getP = (t) => prices[String(t || "").trim().toUpperCase()] || 0;
                const getV = (k) => getNum(inputs[k]);
                
                const qqqPrice = getP('QQQ');
                const tqqqPrice = getP('TQQQ');
                const boxxPrice = getP('BOXX') || 100; // BOXX fallback
                
                const valCore1 = qqqPrice * getV('qty_core_1'); 
                const valCore2 = tqqqPrice * getV('qty_core_2'); 
                const valBoxx = boxxPrice * getV('qty_boxx');
                const cash = getV('cash_balance');
                
                let satValueU = 0;
                let satValueL = 0;
                
                const satColors = [
                    { u: '#3b82f6', l: '#93c5fd' }, 
                    { u: '#10b981', l: '#6ee7b7' }, 
                    { u: '#f59e0b', l: '#fcd34d' }, 
                    { u: '#8b5cf6', l: '#c4b5fd' }, 
                    { u: '#ec4899', l: '#f9a8d4' }  
                ];

                const pieData = [];
                if (valCore1 > 0) pieData.push({ name: 'QQQ', value: valCore1, fill: '#1e293b' });
                if (valCore2 > 0) pieData.push({ name: 'TQQQ', value: valCore2, fill: '#64748b' });

                const satStats = (inputs.satellites || []).map((s, idx) => {
                    const uPrice = getP(s.underlying); 
                    const lPrice = getP(s.leveraged);  
                    const qtyU = getNum(s.qty_u);
                    const qtyL = getNum(s.qty_l);
                    
                    const valU = uPrice * qtyU;
                    const valL = lPrice * qtyL;
                    const currentVal = valU + valL; 
                    satValueU += valU;
                    satValueL += valL;

                    const colors = satColors[idx % satColors.length];
                    if (valU > 0) pieData.push({ name: s.underlying || '正股', value: valU, fill: colors.u });
                    if (valL > 0) pieData.push({ name: s.leveraged || '槓桿', value: valL, fill: colors.l });
                    
                    const targetPct = getNum(s.target_pct);
                    const profitPctLimit = getNum(s.profit_pct) / 100;
                    const lossPctLimit = getNum(s.loss_pct) / 100;

                    const currentPct = 0; // 計算總資產後再更新
                    
                    const ma200 = getNum(s.ma200);
                    const ma10 = getNum(s.ma10);
                    const rescues = getNum(s.rescues);
                    const distancePct = ma200 > 0 ? ((uPrice - ma200) / ma200) * 100 : 0;

                    return { ...s, currentVal, valU, valL, uPrice, lPrice, qtyU, qtyL, targetPct, profitPctLimit, lossPctLimit, ma200, ma10, rescues, distancePct, pieColors: colors, status: "", color: "", action: "" };
                });

                // 總資產計算
                const totalReserve = cash + valBoxx;
                const totalCore = valCore1 + valCore2;
                const totalSat = satValueU + satValueL;
                const totalCapital = totalReserve + totalCore + totalSat;
                const safeTotal = totalCapital > 0 ? totalCapital : 1;

                // 總暴露風險(槓桿比例)
                const totalExposure = (cash * 1) + (valBoxx * 1) + (valCore1 * 1) + (valCore2 * 3) + (satValueU * 1) + (satValueL * 2);
                const totalLeverageRatio = totalExposure / safeTotal;

                // 圓餅圖加入總資產百分比 (供 tooltip 使用)
                pieData.forEach(d => d.percentOfTotal = d.value / safeTotal);

                // 更新衛星狀態與建議
                const mappedSatStats = satStats.map(s => {
                    const targetVal = totalCapital * (s.targetPct / 100);
                    const currentPct = (s.currentVal / safeTotal) * 100;
                    let status = "狀態未定"; let color = "text-slate-500"; let action = "觀察中";
                    
                    const excessPct = targetVal > 0 ? (s.currentVal - targetVal) / targetVal : 0;
                    const shortfallPct = targetVal > 0 ? (targetVal - s.currentVal) / targetVal : 0;

                    if (s.qtyL > 0 || s.qtyU > 0) {
                        if (excessPct >= s.profitPctLimit && s.uPrice > s.ma200) {
                            status = `達標收割 (+${(excessPct*100).toFixed(1)}%)`; color = "text-fin-up"; 
                            action = `部位溢出 +${(excessPct*100).toFixed(1)}%，建議結清 ${s.leveraged || s.underlying}。獲利優先回補 BOXX，剩餘轉入 QQQ。`;
                        } 
                        else if (shortfallPct >= s.lossPctLimit) {
                            if (s.rescues < 2) {
                                status = `觸發補倉 (-${(shortfallPct*100).toFixed(1)}%)`; color = "text-fin-down"; 
                                action = `部位衰退 -${(shortfallPct*100).toFixed(1)}%，建議賣出 BOXX 提取約 $${Math.round(targetVal - s.currentVal).toLocaleString()} 進行補足。`;
                            } else {
                                status = "補倉達上限"; color = "text-slate-600"; action = "已達 2 次補倉上限，嚴格防禦等待回升。";
                            }
                        }
                        else if (s.qtyL === 0 && s.qtyU > 0) {
                            if (s.ma200 === 0) {
                                status = "參數未定"; color = "text-slate-400"; action = "請設定 200MA 與 10MA";
                            } else if (s.uPrice > s.ma10 && s.uPrice < s.ma200 && s.ma10 > 0) {
                                status = "站上 10MA：第三階轉換"; color = "text-fin-info"; action = `止跌回升，建議將剩餘 ${s.underlying || '正股'} 全數換成槓桿。`;
                            } else if (s.distancePct <= -10) {
                                status = "跌破 10%：第二階轉換"; color = "text-fin-warn"; action = `跌破 200MA 達 10%，建議將 1/3 資金換成槓桿。`;
                            } else if (s.distancePct <= 0 && s.distancePct > -10) {
                                status = "觸碰 200MA：第一階轉換"; color = "text-fin-info"; action = `進入 200MA 防禦區，建議將 1/3 資金換成槓桿。`;
                            } else {
                                status = "正常持有正股"; color = "text-slate-500"; action = `現價高於 200MA，未達轉換標準。`;
                            }
                        } 
                        else {
                            status = "持有槓桿防禦中"; color = "text-brand-600"; action = `目前佔比未達收割 (+${s.profit_pct}%) 或補倉 (-${s.loss_pct}%) 條件，維持原部位。`;
                        }
                    } else {
                        if (!s.underlying) {
                            status = "未設定代號"; color = "text-slate-300"; action = "請於參數設定中輸入代號。";
                        } else if (s.ma200 === 0) {
                            status = "參數未定"; color = "text-slate-400"; action = "請於參數設定頁面輸入 200MA。";
                        } else if (s.distancePct <= 5 && s.distancePct >= -5) {
                            status = "均線觸發範圍內"; color = "text-fin-up"; action = `建議依目標佔比 (${s.targetPct}%) 投入資金買入槓桿 ${s.leveraged || '標的'}。`;
                        } else if (s.distancePct < -5) {
                            status = "低於均線"; color = "text-fin-down"; action = "價格偏弱，持續觀察。";
                        } else {
                            status = "高於均線"; color = "text-fin-info"; action = "乖離偏大，暫不買入。";
                        }
                    }

                    return { ...s, targetVal, currentPct, status, color, action };
                });

                const qqqAth = getV('qqq_ath');
                const currentDD = qqqAth > 0 ? ((qqqAth - qqqPrice) / qqqAth) * 100 : 0;
                
                let targetTqqqPct = 0; let phase = "正常巡航 (目標 100% QQQ)";
                if (currentDD >= 40) { targetTqqqPct = 60; phase = "第四階轉換區間 (目標 60% TQQQ)"; }
                else if (currentDD >= 30) { targetTqqqPct = 45; phase = "第三階轉換區間 (目標 45% TQQQ)"; }
                else if (currentDD >= 20) { targetTqqqPct = 30; phase = "第二階轉換區間 (目標 30% TQQQ)"; }
                else if (currentDD >= 10) { targetTqqqPct = 15; phase = "第一階轉換區間 (目標 15% TQQQ)"; }

                const targetTqqqVal = totalCapital * (targetTqqqPct / 100);
                const currentTqqqPctTotal = (valCore2 / safeTotal) * 100;
                
                const coreProfitLimit = getV('core_profit_pct') / 100;
                const coreLossLimit = getV('core_loss_pct') / 100;

                const coreExcessPct = targetTqqqVal > 0 ? (valCore2 - targetTqqqVal) / targetTqqqVal : 0;
                const coreShortfallPct = targetTqqqVal > 0 ? (targetTqqqVal - valCore2) / targetTqqqVal : 0;

                let coreAction = "維持現有配置比例"; let coreColor = "text-slate-600"; let coreDiff = 0;
                
                if (coreShortfallPct >= coreLossLimit && targetTqqqPct > 0) {
                    coreAction = `佔比衰退 -${(coreShortfallPct*100).toFixed(1)}%：建議賣出 QQQ 加碼 TQQQ 進行再平衡`; 
                    coreColor = "text-fin-down"; 
                    coreDiff = targetTqqqVal - valCore2;
                } 
                else if (coreExcessPct >= coreProfitLimit || (targetTqqqPct === 0 && valCore2 > 0)) {
                    const tAvg = getV('tqqq_avg_cost');
                    if (tAvg > 0 && tqqqPrice <= tAvg && targetTqqqPct > 0) {
                        coreAction = `成本保護中：TQQQ 現價($${tqqqPrice.toFixed(2)}) 低於成本($${tAvg})，暫緩收割`;
                        coreColor = "text-fin-warn";
                        coreDiff = 0;
                    } else {
                        coreAction = `佔比溢出 +${(coreExcessPct*100).toFixed(1)}%：建議賣出 TQQQ 換回 QQQ`; 
                        coreColor = "text-fin-up"; 
                        coreDiff = valCore2 - targetTqqqVal;
                    }
                } else if (currentDD >= 40) {
                    coreAction = "極端應對：持滿 TQQQ，嚴禁割肉不動等待回升"; coreColor = "text-slate-700";
                }

                const ladderPreview = [10, 20, 30, 40].map(pct => {
                    const triggerPrice = qqqAth * (1 - pct / 100);
                    const valueToMove = totalCapital * 0.15;
                    const estQqqSharesToSell = triggerPrice > 0 ? valueToMove / triggerPrice : 0;
                    return { pct, triggerPrice, valueToMove, estQqqSharesToSell, isTriggered: currentDD >= pct };
                });

                let gData = [];
                if (records.length) {
                     const sorted = [...records].sort((a,b) => new Date(a.date) - new Date(b.date));
                     let peakEq = 0;
                     gData = sorted.map(r => { 
                        if(r.total_equity > peakEq) peakEq = r.total_equity;
                        const dd = peakEq > 0 ? (r.total_equity - peakEq) / peakEq * 100 : 0;
                        return { date: r.date, equity: r.total_equity, dd }; 
                    });
                }

                return { 
                    totalCapital, satStats: mappedSatStats, graphData: gData, pieData, totalLeverageRatio,
                    classification: {
                        core: { u: valCore1, l: valCore2, total: totalCore, uPct: (valCore1/safeTotal)*100, lPct: (valCore2/safeTotal)*100, totalPct: (totalCore/safeTotal)*100 },
                        sat: { u: satValueU, l: satValueL, total: totalSat, uPct: (satValueU/safeTotal)*100, lPct: (satValueL/safeTotal)*100, totalPct: (totalSat/safeTotal)*100 },
                        reserve: { boxx: valBoxx, cash: cash, total: totalReserve, pct: (totalReserve/safeTotal)*100 }
                    },
                    coreStats: { qqqPrice, qqqAth, currentDD, targetTqqqPct, currentTqqqPctTotal, phase, coreAction, coreColor, coreDiff, ladderPreview }
                };
            }, [prices, inputs, records]);

            return (
                <div className="pb-32 min-h-screen transition-colors duration-300 font-bold text-left select-none overflow-x-hidden">
                    {message && <div className="fixed top-24 left-1/2 -translate-x-1/2 z-[60] animate-in fade-in slide-in-from-top-4"><div className="bg-white border border-brand-200 text-brand-800 px-6 py-3 rounded-full shadow-lg text-sm font-black flex items-center gap-2"><Icon name="CheckCircle" size={16} className="text-fin-up"/> {message}</div></div>}
                    
                    {authError && (
                        <div className="fixed top-4 left-4 right-4 z-[70] animate-in slide-in-from-top-4">
                            <div className="bg-red-50 border-l-4 border-red-500 p-4 rounded-lg shadow-lg flex gap-3">
                                <Icon name="AlertCircle" size={24} className="text-red-500 shrink-0" />
                                <div className="flex-1 overflow-hidden">
                                    <h4 className="text-red-800 font-black text-sm">系統提示</h4>
                                    <p className="text-red-600 text-xs mt-1 leading-relaxed whitespace-pre-wrap">{authError}</p>
                                </div>
                                <button onClick={() => setAuthError(null)} className="text-red-400 hover:text-red-600 self-start p-1"><Icon name="X" size={16}/></button>
                            </div>
                        </div>
                    )}

                    {isSwitching && !authError && <div className="loading-overlay"><div className="w-10 h-10 border-4 border-slate-600 border-t-white rounded-full animate-spin"></div><div className="text-sm font-black">連接雲端資料庫中...</div></div>}

                    {modal.type === 'DELETE_RECORD' && (
                        <Modal title="刪除紀錄" icon="Trash2" isOpen={true} onClose={() => setModal({type: null, data: null, temp: {}})}>
                            <p className="text-sm font-bold text-slate-600 mb-4">確定要刪除這筆歷史紀錄嗎？此動作無法復原。</p>
                            <button onClick={deleteRecord} className="w-full bg-fin-down text-white py-4 rounded-xl font-black transition-transform active:scale-[0.98]">確認刪除</button>
                        </Modal>
                    )}

                    {modal.type === 'EDIT_RECORD' && (
                        <Modal title="編輯紀錄" icon="Edit2" isOpen={true} onClose={() => setModal({type: null, data: null, temp: {}})}>
                            <div className="space-y-4">
                                <div>
                                    <label className="text-xs font-bold text-slate-500 mb-2 block">紀錄日期</label>
                                    <input type="date" className="w-full bg-slate-50 p-4 rounded-xl border border-slate-200 text-base font-black input-focus-ring outline-none transition-colors" defaultValue={modal.data.date?.split('T')[0]} onChange={e => setModal({...modal, temp: {...modal.temp, date: new Date(e.target.value).toISOString()}})} />
                                </div>
                                <div>
                                    <label className="text-xs font-bold text-slate-500 mb-2 block">總資產價值 ($)</label>
                                    <input type="number" inputMode="decimal" className="w-full bg-slate-50 p-4 rounded-xl border border-slate-200 font-mono text-xl font-black text-brand-700 input-focus-ring outline-none transition-colors" defaultValue={modal.data.total_equity} onChange={e => setModal({...modal, temp: {...modal.temp, equity: e.target.value}})} />
                                </div>
                                <button onClick={editRecord} className="w-full bg-brand-600 hover:bg-brand-700 text-white py-4 rounded-xl font-black transition-all active:scale-[0.98] mt-2 shadow-md">儲存變更</button>
                            </div>
                        </Modal>
                    )}

                    <header className="fixed top-0 inset-x-0 bg-white z-50 px-5 py-4 flex justify-between items-center shadow-sm border-b border-slate-200">
                        <div className="flex items-center gap-2 font-black text-slate-800"><Icon name="PieChart" className="text-brand-600" size={24} /><h1 className="text-xl">Alpha Horizon</h1></div>
                        <div className="flex gap-3">
                            <button onClick={() => fetchPrices(true)} className="p-2.5 rounded-xl bg-slate-50 text-slate-500 hover:bg-slate-100 border border-slate-200 relative transition-transform active:scale-[0.95]">
                                <Icon name="RefreshCcw" size={20} className={loadingPrices?"animate-spin":""} />
                                {!loadingPrices && <div className="absolute top-1 right-1 w-2 h-2 bg-fin-up rounded-full border border-white"></div>}
                            </button>
                        </div>
                    </header>

                    <main className="max-w-md mx-auto p-4 pt-24 space-y-6">
                        {view === 'dashboard' && (
                            <div className="space-y-6 animate-in fade-in">
                                
                                <div className="bg-white rounded-3xl p-5 shadow-sm border border-slate-200 relative group input-focus-ring transition-colors">

                                                <div className="bg-slate-800 p-3 rounded-xl border border-slate-700 shadow-sm focus-within:border-brand-500 transition-colors">
                                                    <div className="text-xs text-slate-400 font-bold mb-2">BOXX (股數)</div>
                                                    <input type="number" inputMode="decimal" value={inputs.qty_boxx} onChange={e=>handleInputChange('qty_boxx',e.target.value)} onBlur={e=>syncToCloud('qty_boxx',e.target.value)} className="w-full text-xl font-mono font-black text-brand-100 bg-slate-900 border border-slate-600 rounded-lg outline-none focus:ring-2 focus:ring-brand-500/50" />
                                                </div>
                                                <div className="bg-slate-50 p-3 rounded-xl border border-slate-200 shadow-sm focus-within:border-brand-300 transition-colors">
                                                    <div className="text-xs text-slate-500 font-bold mb-2">現金餘額 (USD)</div>
                                                    <input type="number" inputMode="decimal" value={inputs.cash_balance} onChange={e=>handleInputChange('cash_balance',e.target.value)} onBlur={e=>syncToCloud('cash_balance',e.target.value)} className="w-full text-xl font-mono font-black text-slate-800 bg-white border border-slate-200 shadow-sm rounded-lg input-focus-ring outline-none" />
                                                </div>
                                            </div>
                                        </div>

                                        <div className="pt-4 border-t border-slate-100 flex flex-col gap-2 relative">
                                            <div className="flex justify-between items-center">
                                                <label className="text-sm font-black text-slate-700">存檔日期</label>
                                                {recordDate !== getTodayStr() && (
                                                    <button 
                                                        onClick={() => setRecordDate(getTodayStr())}
                                                        className="text-[10px] text-brand-600 bg-brand-50 px-2.5 py-1 rounded-md font-bold hover:bg-brand-100 transition-colors shadow-sm active:scale-95"
                                                    >
                                                        回到今天
                                                    </button>
                                                )}
                                            </div>
                                            <input type="date" value={recordDate} onChange={e=>setRecordDate(e.target.value)} className="w-full bg-slate-50 border border-slate-200 rounded-xl p-4 text-lg font-mono text-slate-800 font-black input-focus-ring outline-none transition-colors" />
                                        </div>

                                        <button onClick={save} disabled={isSaving} className={`w-full py-5 rounded-2xl text-white font-black text-lg flex justify-center items-center gap-3 transition-all active:scale-[0.98] ${isSaving?'bg-slate-400':'bg-brand-600 hover:bg-brand-700 shadow-lg shadow-brand-500/30 mt-4'}`}><Icon name={isSaving?"RefreshCcw":"Save"} className={isSaving?"animate-spin":""} size={24} /> {isSaving?"安全儲存中...":"確認儲存當前紀錄"}</button>
                                    </div>
                                </CollapsibleCard>

                                <CollapsibleCard title="投資計畫書 (V_Final 2026)" icon="FileText" isOpen={sections.plan} onToggle={()=>toggleSection('plan')} className="bg-slate-50">
                                    <textarea value={inputs.planText} readOnly={isPlanLocked} onChange={e=>handleInputChange('planText',e.target.value)} onBlur={e=>syncToCloud('planText',e.target.value)} className={`w-full bg-transparent text-sm font-bold text-slate-700 outline-none resize-none leading-relaxed text-left h-[450px] transition-all ${isPlanLocked?'':'bg-white rounded-xl p-4 border border-brand-300 shadow-inner focus:ring-2 focus:ring-brand-500/20'}`} />
                                    <button onClick={(e) => {e.stopPropagation(); setIsPlanLocked(!isPlanLocked);}} className="absolute top-4 right-12 p-2 rounded-lg text-slate-400 hover:text-brand-600 bg-white border border-slate-100 shadow-sm transition-transform active:scale-95"><Icon name={isPlanLocked?"Lock":"Unlock"} size={16}/></button>
                                </CollapsibleCard>
                            </div>
                        )}

                        {view === 'settings' && (
                            <div className="space-y-6 animate-in fade-in">
                                <div className="bg-slate-800 rounded-3xl shadow-heavy border border-slate-700 p-6 flex flex-col justify-center">
                                    <div className="flex items-center gap-3 text-white mb-5 border-b border-slate-700 pb-4"><Icon name="Google" size={24} className="text-white" /><h2 className="text-base font-black">Google 帳號同步設定</h2></div>
                                    {user && !user.isAnonymous ? (
                                        <div className="flex flex-col gap-4">
                                            <div className="text-brand-300 text-sm font-black flex items-center gap-2"><Icon name="User" size={20} /> <span>{user.displayName || user.email || '已登入 Google 帳號'}</span></div>
                                            <p className="text-xs text-slate-400 leading-relaxed">您的投資設定與歷史紀錄已安全同步至您的 Google 帳號中。在任何裝置登入此帳號即可無縫接軌。</p>
                                            <button onClick={handleLogout} className="w-full bg-slate-700 text-white py-4 rounded-xl font-black text-sm hover:bg-slate-600 transition-all active:scale-[0.98] shadow-sm flex items-center justify-center gap-2 border border-slate-600"><Icon name="LogOut" size={18} /> 登出帳號</button>
                                        </div>
                                    ) : (
                                        <div className="flex flex-col gap-4">
                                            <p className="text-xs text-slate-400 leading-relaxed">您目前正在使用訪客模式。設定專屬的 Google 帳號後，您的投資資料將能跨越手機與電腦，實現真正的無縫同步與雲端備份。</p>
                                            <button onClick={handleGoogleLogin} className="w-full bg-white text-slate-800 py-4 rounded-xl font-black text-base hover:bg-slate-100 transition-all active:scale-[0.98] shadow-lg flex items-center justify-center gap-3"><Icon name="Google" size={20} className="text-brand-500" /> 使用 Google 登入並同步</button>
                                        </div>
                                    )}
                                </div>

                                <div className="bg-white rounded-3xl shadow-sm border border-slate-200 p-6">
                                    <div className="flex justify-between items-center mb-5 pb-3 border-b border-slate-100">
                                        <h2 className="text-base font-black text-slate-800 flex items-center gap-2"><Icon name="Settings" size={20} className="text-slate-500"/> 大盤核心參數</h2>
                                        <div className="text-[10px] bg-slate-100 text-slate-600 p-1.5 px-2.5 rounded-lg border border-slate-200 font-mono font-black shadow-sm">核心額度: {100 - (inputs.satellites || []).reduce((sum, s) => sum + getNum(s.target_pct), 0)}%</div>
                                    </div>
                                    <div className="space-y-4">
                                        <div>
                                            <label className="text-xs text-slate-500 font-bold block mb-2">QQQ 歷史高點 (計算回撤基準)</label>
                                            <div className="flex items-center gap-2 bg-slate-50 p-2 rounded-xl border border-slate-200 transition-colors focus-within:border-brand-400 focus-within:ring-2 focus-within:ring-brand-500/20">
                                                <span className="text-slate-400 pl-3 font-mono font-black text-lg">$</span>
                                                <input type="number" inputMode="decimal" value={inputs.qqq_ath} onChange={e=>handleInputChange('qqq_ath', e.target.value)} onBlur={e=>syncToCloud('qqq_ath',e.target.value)} className="w-full text-xl font-mono font-black text-slate-800 bg-transparent text-left outline-none" placeholder="450.00" />
                                            </div>
                                        </div>
                                        <div>
                                            <label className="text-xs text-fin-warn font-bold block mb-2">TQQQ 買入平均成本 (保護機制)</label>
                                            <div className="flex items-center gap-2 bg-amber-50/50 p-2 rounded-xl border border-amber-200 transition-colors focus-within:border-amber-400 focus-within:ring-2 focus-within:ring-amber-500/20">
                                                <span className="text-amber-400 pl-3 font-mono font-black text-lg">$</span>
                                                <input type="number" inputMode="decimal" value={inputs.tqqq_avg_cost} onChange={e=>handleInputChange('tqqq_avg_cost', e.target.value)} onBlur={e=>syncToCloud('tqqq_avg_cost',e.target.value)} className="w-full text-xl font-mono font-black text-slate-800 bg-transparent text-left outline-none" placeholder="0.00" />
                                            </div>
                                        </div>
                                        <div className="pt-4 border-t border-slate-100">
                                            <label className="text-xs text-brand-600 font-bold block mb-2 flex items-center gap-1"><Icon name="Activity" size={14}/> 核心動態再平衡標準</label>
                                            <div className="grid grid-cols-2 gap-3">
                                                <div>
                                                    <label className="text-[10px] text-fin-up font-bold block mb-1">獲利收割標準 (+%)</label>
                                                    <div className="flex items-center gap-1 bg-white p-2 rounded-xl border border-slate-200 transition-colors focus-within:border-brand-400">
                                                        <input type="number" inputMode="decimal" value={inputs.core_profit_pct} onChange={e=>handleInputChange('core_profit_pct', e.target.value)} onBlur={e=>syncToCloud('core_profit_pct',e.target.value)} className="w-full font-mono font-black text-slate-800 bg-transparent text-center outline-none" />
                                                        <span className="text-slate-400 pr-2 font-black">%</span>
                                                    </div>
                                                </div>
                                                <div>
                                                    <label className="text-[10px] text-fin-down font-bold block mb-1">加碼補倉標準 (-%)</label>
                                                    <div className="flex items-center gap-1 bg-white p-2 rounded-xl border border-slate-200 transition-colors focus-within:border-brand-400">
                                                        <input type="number" inputMode="decimal" value={inputs.core_loss_pct} onChange={e=>handleInputChange('core_loss_pct', e.target.value)} onBlur={e=>syncToCloud('core_loss_pct',e.target.value)} className="w-full font-mono font-black text-slate-800 bg-transparent text-center outline-none" />
                                                        <span className="text-slate-400 pr-2 font-black">%</span>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <div className="bg-white rounded-3xl shadow-sm border border-slate-200 p-6">
                                    <div className="flex justify-between items-center mb-5 pb-3 border-b border-slate-100">
                                        <h2 className="text-base font-black text-slate-800 flex items-center gap-2"><Icon name="Activity" size={20} className="text-fin-info"/> 個股佔比與雷達參數</h2>
                                        <div className="text-[10px] bg-brand-50 text-brand-600 p-1.5 px-2.5 rounded-lg border border-brand-200 font-mono font-black shadow-sm">衛星總計: {(inputs.satellites || []).reduce((sum, s) => sum + getNum(s.target_pct), 0)}%</div>
                                    </div>
                                    <div className="space-y-5">
                                        {(inputs.satellites || []).map(s => (
                                            <div key={s.id} className="bg-slate-50 p-4 rounded-2xl border border-slate-200 relative shadow-sm">
                                                <button onClick={() => removeSatellite(s.id)} className="absolute top-3 right-3 p-2 bg-white rounded-lg border border-slate-100 text-slate-400 hover:text-fin-down hover:bg-red-50 hover:border-red-200 transition-all active:scale-95 shadow-sm"><Icon name="Trash2" size={16} /></button>
                                                
                                                <div className="flex flex-col gap-3 mb-4 pr-10">
                                                    <div className="flex gap-3">
                                                        <div className="flex-1">
                                                            <label className="text-[10px] text-slate-500 font-bold block mb-1">現貨代號</label>
                                                            <input value={s.underlying} onChange={e=>updateSatellite(s.id, 'underlying', e.target.value.toUpperCase().trim())} onBlur={saveSatellites} className="w-full bg-white font-black text-sm p-3 rounded-xl border border-slate-200 uppercase input-focus-ring outline-none placeholder:font-normal placeholder:text-slate-300" placeholder="如 TSLA" />
                                                        </div>
                                                        <div className="flex-1">
                                                            <label className="text-[10px] text-brand-600 font-bold block mb-1">槓桿代號</label>
                                                            <input value={s.leveraged} onChange={e=>updateSatellite(s.id, 'leveraged', e.target.value.toUpperCase().trim())} onBlur={saveSatellites} className="w-full bg-brand-50 font-black text-brand-700 text-sm p-3 rounded-xl border border-brand-200 uppercase input-focus-ring focus:ring-brand-500/50 outline-none placeholder:font-normal placeholder:text-brand-300/50" placeholder="如 TSLL" />
                                                        </div>
                                                    </div>
                                                </div>
                                                
                                                <div className="mb-4 bg-white p-3 rounded-xl border border-brand-100 shadow-sm">
                                                    <label className="text-xs text-brand-600 font-bold block mb-2 flex items-center gap-1"><Icon name="PieChart" size={14}/> 佔比設定與再平衡標準</label>
                                                    <div className="grid grid-cols-3 gap-2">
                                                        <div><label className="text-[9px] text-slate-500 font-bold block mb-1">目標佔比 (%)</label><div className="flex items-center gap-1 bg-slate-50 p-1.5 rounded-lg border border-brand-200 focus-within:border-brand-400 transition-colors"><input type="number" inputMode="decimal" value={s.target_pct} onChange={e=>updateSatellite(s.id, 'target_pct', e.target.value)} onBlur={saveSatellites} className="w-full font-mono font-black text-brand-700 bg-transparent text-center outline-none" /></div></div>
                                                        <div><label className="text-[9px] text-fin-up font-bold block mb-1">收割 (+%)</label><div className="flex items-center gap-1 bg-slate-50 p-1.5 rounded-lg border border-slate-200 focus-within:border-brand-400 transition-colors"><input type="number" inputMode="decimal" value={s.profit_pct} onChange={e=>updateSatellite(s.id, 'profit_pct', e.target.value)} onBlur={saveSatellites} className="w-full font-mono font-black text-slate-800 bg-transparent text-center outline-none" /></div></div>
                                                        <div><label className="text-[9px] text-fin-down font-bold block mb-1">補倉 (-%)</label><div className="flex items-center gap-1 bg-slate-50 p-1.5 rounded-lg border border-slate-200 focus-within:border-brand-400 transition-colors"><input type="number" inputMode="decimal" value={s.loss_pct} onChange={e=>updateSatellite(s.id, 'loss_pct', e.target.value)} onBlur={saveSatellites} className="w-full font-mono font-black text-slate-800 bg-transparent text-center outline-none" /></div></div>
                                                    </div>
                                                </div>

                                                <div className="grid grid-cols-2 gap-3 mb-3">
                                                    <div><label className="text-[10px] text-slate-500 font-bold block mb-1">200 日均線 ($)</label><input type="number" inputMode="decimal" value={s.ma200} onChange={e=>updateSatellite(s.id, 'ma200', e.target.value)} onBlur={saveSatellites} className="w-full bg-white font-mono font-black text-sm p-3 rounded-xl border border-slate-200 input-focus-ring outline-none" placeholder="0" /></div>
                                                    <div><label className="text-[10px] text-fin-info font-bold block mb-1">10 日均線 ($) 止跌</label><input type="number" inputMode="decimal" value={s.ma10} onChange={e=>updateSatellite(s.id, 'ma10', e.target.value)} onBlur={saveSatellites} className="w-full bg-white font-mono font-black text-sm p-3 rounded-xl border border-slate-200 input-focus-ring outline-none" placeholder="0" /></div>
                                                </div>
                                                <div><label className="text-[10px] text-slate-500 font-bold block mb-1">已補倉次數 (Max: 2)</label><input type="number" inputMode="decimal" value={s.rescues} onChange={e=>updateSatellite(s.id, 'rescues', e.target.value)} onBlur={saveSatellites} className="w-full bg-white font-mono font-black text-sm p-3 rounded-xl border border-slate-200 input-focus-ring outline-none" placeholder="0" /></div>
                                            </div>
                                        ))}
                                        <button onClick={addSatellite} className="w-full py-4 mt-4 bg-white border-2 border-dashed border-slate-300 rounded-2xl text-slate-500 font-black text-sm flex items-center justify-center gap-2 hover:bg-slate-50 hover:border-brand-400 hover:text-brand-600 transition-all active:scale-[0.98]"><Icon name="Plus" size={20} /> 新增衛星部位</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {view === 'history' && (
                            <div className="space-y-6 animate-in fade-in">
                                <div className="bg-white rounded-3xl p-5 shadow-sm border border-slate-200 h-[350px]">
                                    <div className="text-sm font-black text-slate-700 mb-4 flex items-center gap-2"><Icon name="TrendingUp" size={18} className="text-brand-600"/> 資產歷史走勢</div>
                                    <ResponsiveContainer width="100%" height="85%">
                                        <ComposedChart data={metrics.graphData} margin={{top:10,right:10,left:0,bottom:20}}>
                                            <defs>
                                                <linearGradient id="colorEq" x1="0" y1="0" x2="0" y2="1"><stop offset="5%" stopColor="#3b82f6" stopOpacity={0.4}/><stop offset="95%" stopColor="#3b82f6" stopOpacity={0}/></linearGradient>
                                                <linearGradient id="colorDD" x1="0" y1="0" x2="0" y2="1"><stop offset="5%" stopColor="#ef4444" stopOpacity={0.15}/><stop offset="95%" stopColor="#ef4444" stopOpacity={0}/></linearGradient>
                                            </defs>
                                            <XAxis dataKey="date" tickFormatter={v=>new Date(v).toLocaleDateString(undefined,{month:'numeric',day:'numeric'})} tick={{fontSize:12, fill:'#64748b'}}/>
                                            <YAxis yAxisId="left" tickFormatter={v=>`${(v/1000).toFixed(0)}k`} tick={{fontSize:12, fill:'#64748b'}}/>
                                            <YAxis yAxisId="right" orientation="right" tickFormatter={v=>`${v.toFixed(0)}%`} tick={{fontSize:12, fill:'#ef4444'}} domain={['auto', 0]} />
                                            <Tooltip content={<CustomGraphTooltip />} cursor={{ stroke: '#cbd5e1', strokeWidth: 1, strokeDasharray: '3 3' }} />
                                            <Area yAxisId="left" type="stepAfter" dataKey="equity" stroke="#3b82f6" strokeWidth={3} fill="url(#colorEq)" name="總資產"/>
                                            <Area yAxisId="right" type="monotone" dataKey="dd" stroke="none" fill="url(#colorDD)" name="大盤跌幅"/>
                                        </ComposedChart>
                                    </ResponsiveContainer>
                                </div>

                                <div className="bg-white rounded-3xl shadow-sm border border-slate-200 p-5">
                                    <h3 className="text-base font-black text-slate-800 mb-4 flex items-center gap-2 border-b border-slate-100 pb-3"><Icon name="FileText" size={20} className="text-brand-600"/> 歷史紀錄明細</h3>
                                    {records.length === 0 ? (
                                        <div className="text-center text-sm text-slate-400 py-8 border-2 border-dashed border-slate-100 rounded-2xl bg-slate-50/50">尚未建立任何儲存紀錄</div>
                                    ) : (
                                        <div className="space-y-4 max-h-[500px] overflow-y-auto pr-2 pb-2">
                                            {records.sort((a,b)=>new Date(b.date)-new Date(a.date)).map(r => (
                                                <div key={r.id} className="bg-white p-4 rounded-2xl border-2 border-slate-100 text-sm shadow-sm transition-colors hover:border-brand-300">
                                                    <div className="flex justify-between items-center font-black border-b border-slate-100 pb-3 mb-3">
                                                        <span className="text-slate-500 font-mono bg-slate-50 px-2 py-1 rounded-lg">{new Date(r.date).toLocaleDateString()}</span>
                                                        <div className="flex items-center gap-4">
                                                            <span className="text-brand-600 text-lg">${r.total_equity.toLocaleString(undefined,{maximumFractionDigits:0})}</span>
                                                            <div className="flex gap-2">
                                                                <button onClick={() => setModal({type: 'EDIT_RECORD', data: r, temp: {}})} className="p-2 bg-slate-50 rounded-lg text-slate-400 hover:text-brand-600 hover:bg-brand-50 transition-colors active:scale-95"><Icon name="Edit2" size={16}/></button>
                                                                <button onClick={() => setModal({type: 'DELETE_RECORD', data: r})} className="p-2 bg-slate-50 rounded-lg text-slate-400 hover:text-fin-down hover:bg-red-50 transition-colors active:scale-95"><Icon name="Trash2" size={16}/></button>
                                                            </div>
                                                        </div>
                                                    </div>
                                                    <div className="grid grid-cols-4 gap-2 text-slate-700 font-mono mb-3">
                                                        <div className="bg-slate-50 p-2 rounded-xl border border-slate-100 text-center"><span className="text-[9px] text-slate-400 block font-sans font-bold mb-1">QQQ</span>{r.inputs?.qty_core_1 || 0}</div>
                                                        <div className="bg-slate-50 p-2 rounded-xl border border-slate-100 text-center"><span className="text-[9px] text-slate-400 block font-sans font-bold mb-1">TQQQ</span>{r.inputs?.qty_core_2 || 0}</div>
                                                        <div className="bg-slate-800 text-white p-2 rounded-xl border border-slate-700 text-center"><span className="text-[9px] text-slate-400 block font-sans font-bold mb-1">BOXX</span>{r.inputs?.qty_boxx || 0}</div>
                                                        <div className="bg-slate-50 p-2 rounded-xl border border-slate-100 text-center"><span className="text-[9px] text-slate-400 block font-sans font-bold mb-1">現金</span>${Number(r.inputs?.cash_balance || 0).toLocaleString()}</div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}
                    </main>

                    <nav className="fixed bottom-0 inset-x-0 bg-white border-t border-slate-200 z-50 py-3 pb-8 flex justify-around shadow-[0_-10px_15px_-3px_rgba(0,0,0,0.05)]">
                        {[{id:'dashboard',icon:'LayoutDashboard',l:'主控台'},{id:'settings',icon:'Settings',l:'參數設定'},{id:'history',icon:'TrendingUp',l:'歷史戰報'}].map(t => <button key={t.id} onClick={()=>{setView(t.id);}} className={`flex flex-col items-center gap-1.5 flex-1 transition-all pt-2 ${view===t.id?'text-brand-600 -mt-2':'text-slate-400 hover:text-slate-600'}`}><Icon name={t.icon} size={24}/><span className="text-[11px] font-black">{t.l}</span>{view===t.id && <div className="w-1.5 h-1.5 bg-brand-600 rounded-full mt-0.5"></div>}</button>)}
                    </nav>
                </div>
            );
        };
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
