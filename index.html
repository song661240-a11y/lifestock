<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="color-scheme" content="light only" />
  <title>Alpha Horizon Pro Aggressive v2.0 Single-File Clean</title>
  <link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%230f172a'/><path d='M24 72 L50 24 L76 72' stroke='%233b82f6' stroke-width='11' stroke-linecap='round' stroke-linejoin='round' fill='none'/><circle cx='50' cy='24' r='7' fill='%233b82f6'/></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { 50:'#eff6ff', 100:'#dbeafe', 500:'#3b82f6', 600:'#2563eb', 700:'#1d4ed8', 900:'#1e3a8a' },
            fin: { up:'#10b981', down:'#ef4444', warn:'#f59e0b', purple:'#8b5cf6', dark:'#0f172a' }
          },
          boxShadow: { soft:'0 12px 30px rgba(15,23,42,.08)' }
        }
      }
    };
  </script>
  <script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700;800&display=swap');
    html { color-scheme: light; background:#f1f5f9; }
    body { font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background:#f1f5f9; color:#0f172a; -webkit-tap-highlight-color: transparent; }
    .font-mono { font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace; }
    input, textarea, select { outline: none; }
    input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    input[type=number] { -moz-appearance: textfield; }
    ::-webkit-scrollbar { width:0; height:0; }
    .safe-bottom { padding-bottom: max(1rem, env(safe-area-inset-bottom)); }
    .content-bottom-space { padding-bottom: calc(9rem + env(safe-area-inset-bottom)); }
    @media (prefers-color-scheme: dark) { html, body { background:#f1f5f9 !important; color:#0f172a !important; } }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useCallback, useEffect, useMemo, useRef, useState } = React;

    /**********************************************************************
     * V2 SINGLE-FILE MODULE MAP
     * ------------------------------------------------------------------
     * 1. App meta / external services
     * 2. Shared utilities and formatters
     * 3. Strategy defaults and data migration
     * 4. Shared UI components
     * 5. Trade-plan formatter
     * 6. App shell: auth, sync, market data, tracking, strategy engine
     * 7. Pages: Home, Logs, Advanced
     *
     * 重要原則：仍維持單一 index.html，方便 GitHub Pages 自用；
     * 策略計算集中在 metrics useMemo，交易清單、複製與紀錄共用
     * actionPlan，避免畫面與紀錄內容互相飄掉。
     **********************************************************************/

    // --- 1) App meta / external services ---
    const FINNHUB_KEY = "d4q36b9r01qha6q0jclgd4q36b9r01qha6q0jcm0";
    const appId = "alpha-horizon-2026-v1";
    const firebaseConfig = {
      apiKey: "AIzaSyDMR8Q20z9vnWtQlafDowRujzBexV0h_lI",
      authDomain: "lifestock-83480.firebaseapp.com",
      projectId: "lifestock-83480",
      storageBucket: "lifestock-83480.firebasestorage.app",
      messagingSenderId: "615080626396",
      appId: "1:615080626396:web:407135b548f3ed5b5c4c19"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    // --- 2) Shared utilities and formatters ---
    const todayStr = () => {
      const d = new Date();
      d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
      return d.toISOString().split("T")[0];
    };
    const getNum = (v) => {
      const n = parseFloat(v);
      return Number.isFinite(n) ? n : 0;
    };
    const numWithDefault = (v, def) => {
      const n = parseFloat(v);
      return Number.isFinite(n) ? n : def;
    };
    const round2 = (v) => Math.round((Number(v) || 0) * 100) / 100;
    const getArr = (arr) => Array.isArray(arr) ? arr : (arr && typeof arr === "object" ? Object.values(arr) : []);
    const sanitize = (data) => JSON.parse(JSON.stringify(data, (k, v) => v === undefined ? null : v));
    const money = (v, digits = 0) => {
      const n = Number(v) || 0;
      return n.toLocaleString("en-US", { maximumFractionDigits: digits, minimumFractionDigits: digits });
    };
    const pct = (v, digits = 1) => `${Number(v || 0).toFixed(digits)}%`;
    const signedPct = (v, digits = 1) => `${v >= 0 ? "+" : ""}${Number(v || 0).toFixed(digits)}%`;
    const EPS = 1e-6;
    const APP_VERSION = "Aggressive v2.2 Strategy Defaults";
    const DATA_VERSION = "aggressive-v2.2-strategy-defaults";

    // --- 3) Strategy defaults ---
    const PLAN_TEXT = `Alpha Horizon Pro Aggressive 簡化版 v2.2 Strategy Defaults
— 執行摘要 —

1. 常態配置：核心 75% QQQ、衛星 10%（可關閉）、BOXX / 現金 15%；核心-only 時核心提高至 85%。
2. 狂熱模式：QQQ 突破最近 52 週最高收盤價後，達到自訂門檻（預設 +15%）時，核心 QQQ 與未結清 TQQQ 全數轉 SPMO。
3. SPMO 退出：不看 RS；SPMO 自身高點回撤 -5% 時，全數轉回 QQQ，並同日檢查 QQQ 是否達 TQQQ 加碼階梯。
4. 下跌加碼：預設 -5%、-10%、-15%、-20%、-25%；核心轉 TQQQ 預設 10%、10%、10%、10%、0%；BOXX / 現金動用預設 3%、3%、3%、2%、1%。階梯可新增、刪除與自訂，全部以總資產百分比計算。
5. 風控：核心轉 TQQQ 上限 40%；BOXX / 現金動用上限 12%；BOXX 底線 3%；QQQ 回撤 -30% 後停止新增 TQQQ。
6. 反彈卸除：QQQ 自本輪低點反彈 +8%、+15%、+25%、+35% 時分批賣 TQQQ，優先補 BOXX / 現金，再買回 QQQ。
7. 熔斷：QQQ 跌破 200MA、200MA 下彎且持續超過 60 交易日，停止新增 TQQQ；既有 TQQQ 依反彈卸除處理。
8. 衛星：不使用 LEAPS / Call / Put / TSLL；BOXX 低於 5% 時停止衛星補倉。
9. 鐵律：策略沒寫的交易一律不做；禁止因新聞、情緒、帳面損益或 FOMO 改變策略。`;

    const DEFAULT_DROP_LADDER = [
      { id:"d1", drop_pct:5, move_core_pct:10, use_reserve_pct:3 },
      { id:"d2", drop_pct:10, move_core_pct:10, use_reserve_pct:3 },
      { id:"d3", drop_pct:15, move_core_pct:10, use_reserve_pct:3 },
      { id:"d4", drop_pct:20, move_core_pct:10, use_reserve_pct:2 },
      { id:"d5", drop_pct:25, move_core_pct:0, use_reserve_pct:1 }
    ];
    const DEFAULT_BOUNCE_LADDER = [
      { id:"b1", bounce_pct:8, sell_pct:25, refill_reserve_pct:8 },
      { id:"b2", bounce_pct:15, sell_pct:25, refill_reserve_pct:10 },
      { id:"b3", bounce_pct:25, sell_pct:25, refill_reserve_pct:10 },
      { id:"b4", bounce_pct:35, sell_pct:25, refill_reserve_pct:15 }
    ];
    const DEFAULT_SATELLITES = [
      { id:"s1", underlying:"TSLA", qty_u:0, avg_cost:250, target_pct:5, limit_pct:10, loss_pct:14, rescues:0, ma5:0, ma10:0, scenario_beta:2 },
      { id:"s2", underlying:"IBIT", qty_u:0, avg_cost:35, target_pct:5, limit_pct:10, loss_pct:14, rescues:0, ma5:0, ma10:0, scenario_beta:1.5 }
    ];

    const DEFAULT_INPUTS = {
      version: DATA_VERSION,
      planText: PLAN_TEXT,
      reserve_target_pct: 15,
      reserve_floor_pct: 3,
      core_tqqq_cap_pct: 40,
      reserve_tqqq_cap_pct: 12,
      stop_add_after_drawdown_pct: 30,
      satellites_enabled: false,
      auto_high_tracking: true,
      auto_tracking_state: "BASE",
      auto_tracking_last_sync: "",
      qqq_history_high_52w: 0,
      qqq_history_sync_date: "",
      qqq_locked_ath: 0,
      qqq_breakout_active: false,
      qqq_breakout_lock_price: 0,
      qqq_latest_high: 0,
      qqq_wave_low: 0,
      spmo_latest_high: 0,
      mania_trailing_stop_pct: 5,
      mania_entry_pct: 15,
      mania_cooldown_until_high: 0,
      is_bear_meltdown: false,
      sim_qqq_price: "",
      scenario_qqq_move_pct: -10,
      scenario_tqqq_beta: 3,
      scenario_spmo_beta: 1,
      max_loss_amount: 0,
      motto: "嚴守紀律，摒除主觀判斷；依據量化指標，執行絕對配置。",
      motto_visible: true,
      params_unlocked: false,
      execution_logs: [],
      pending_execution_note: "",
      qty_core_1: 0,
      qty_core_2: 0,
      qty_spmo: 0,
      qty_boxx: 0,
      cash_balance: 0,
      drop_ladder: DEFAULT_DROP_LADDER,
      bounce_ladder: DEFAULT_BOUNCE_LADDER,
      satellites: DEFAULT_SATELLITES
    };

    // --- 4) Data migration / backward compatibility ---
    const normalizeDropLadder = (src) => {
      if (src.drop_ladder) return getArr(src.drop_ladder);
      if (src.core_ladder) return getArr(src.core_ladder).map((x, i) => ({
        id: x.id || `d${i + 1}`,
        drop_pct: getNum(x.drop_pct),
        move_core_pct: getNum(x.move_pct),
        use_reserve_pct: getNum(x.use_boxx)
      }));
      return DEFAULT_DROP_LADDER;
    };

    const normalizeBounceLadder = (src) => {
      const raw = src.bounce_ladder || src.core_bounce_ladder;
      if (!raw) return DEFAULT_BOUNCE_LADDER;
      return getArr(raw).map((x, i) => ({
        id: x.id || `b${i + 1}`,
        bounce_pct: getNum(x.bounce_pct),
        sell_pct: getNum(x.sell_pct),
        refill_reserve_pct: x.refill_reserve_pct ?? (i === 0 ? 8 : i === 1 ? 10 : i === 2 ? 10 : 15)
      }));
    };

    const normalizeSatellites = (src) => {
      const raw = getArr(src.satellites);
      if (!raw.length) return DEFAULT_SATELLITES;
      return raw.map(s => {
        const clean = { ...s };
        ["lev_val", "lev_ratio", "qty_l", "leveraged"].forEach(k => delete clean[k]);
        const sym = String(clean.underlying || "").toUpperCase();
        return {
          ...clean,
          target_pct: clean.target_pct ?? 5,
          limit_pct: clean.limit_pct ?? 10,
          loss_pct: clean.loss_pct ?? 14,
          ma5: clean.ma5 ?? 0,
          ma10: clean.ma10 ?? 0,
          scenario_beta: clean.scenario_beta ?? (sym === "TSLA" ? 2 : sym === "IBIT" ? 1.5 : 1.5)
        };
      });
    };

    const migrate = (raw) => {
      const src = raw || {};
      const next = { ...DEFAULT_INPUTS, ...src };
      if (src.reserve_pct_normal !== undefined && src.reserve_target_pct === undefined) next.reserve_target_pct = src.reserve_pct_normal;
      next.drop_ladder = normalizeDropLadder(src);
      next.bounce_ladder = normalizeBounceLadder(src);
      next.satellites = normalizeSatellites(src);
      next.execution_logs = getArr(next.execution_logs).slice(0, 200);
      next.pending_execution_note = next.pending_execution_note ?? "";
      next.motto = next.motto || DEFAULT_INPUTS.motto;
      next.motto_visible = next.motto_visible !== false;
      next.params_unlocked = next.params_unlocked === true;
      next.mania_trailing_stop_pct = getNum(next.mania_trailing_stop_pct) || 5;
      next.mania_entry_pct = next.mania_entry_pct === undefined || next.mania_entry_pct === null || next.mania_entry_pct === "" ? 15 : Math.max(0, getNum(next.mania_entry_pct));
      next.planText = PLAN_TEXT;
      next.version = DATA_VERSION;
      return next;
    };

    // --- 5) Shared UI components ---
    class ErrorBoundary extends React.Component {
      constructor(props) { super(props); this.state = { hasError:false, message:"" }; }
      static getDerivedStateFromError(error) { return { hasError:true, message:error?.message || "Unknown error" }; }
      render() {
        if (!this.state.hasError) return this.props.children;
        return (
          <div className="min-h-screen bg-slate-950 text-white flex items-center justify-center p-6">
            <div className="max-w-sm text-center bg-slate-900 border border-slate-700 rounded-3xl p-6 shadow-2xl">
              <div className="text-5xl mb-4">⚠️</div>
              <h1 className="text-xl font-black mb-2">系統保護模式</h1>
              <p className="text-sm text-slate-300 mb-3">網頁載入時發生錯誤，可能是舊資料格式造成。</p>
              <p className="text-[11px] text-slate-500 font-mono break-all mb-5">{this.state.message}</p>
              <button onClick={() => { localStorage.removeItem("ah_core_v5_backup"); localStorage.removeItem("ah_local_backup_2026"); location.reload(); }} className="w-full py-3 rounded-xl bg-red-600 font-black active:scale-95">清除本機快取並重載</button>
            </div>
          </div>
        );
      }
    }

    const Pill = ({ children, tone="slate" }) => {
      const cls = {
        slate:"bg-slate-100 text-slate-700 border-slate-200",
        blue:"bg-brand-50 text-brand-700 border-brand-100",
        green:"bg-emerald-50 text-emerald-700 border-emerald-100",
        red:"bg-red-50 text-red-700 border-red-100",
        amber:"bg-amber-50 text-amber-700 border-amber-100",
        purple:"bg-purple-700 text-white border-purple-700",
        dark:"bg-slate-900 text-white border-slate-800"
      }[tone] || "bg-slate-100 text-slate-700 border-slate-200";
      return <span className={`inline-flex items-center px-2.5 py-1 rounded-full border text-[11px] font-black ${cls}`}>{children}</span>;
    };

    const Card = ({ children, className="" }) => <div className={`bg-white rounded-3xl border border-slate-200 shadow-soft ${className}`}>{children}</div>;

    const normalizeNumberText = (raw, allowNegative=false) => {
      let s = String(raw ?? "").replace(/[，]/g, ".").replace(/[－−–—]/g, "-").replace(/,/g, "").trim();
      const allowed = allowNegative ? /[^0-9.\-]/g : /[^0-9.]/g;
      s = s.replace(allowed, "");
      if (allowNegative) s = s.replace(/(?!^)-/g, "");
      else s = s.replace(/-/g, "");
      const parts = s.split(".");
      if (parts.length > 2) s = parts.shift() + "." + parts.join("");
      return s;
    };

    const NumberInput = ({ label, value, onChange, suffix="", hint="", disabled=false, allowNegative=false }) => {
      const commit = (raw) => onChange(normalizeNumberText(raw, allowNegative));
      const flipSign = () => {
        if (disabled) return;
        const current = normalizeNumberText(value, true);
        if (!current || current === "0") onChange("-");
        else if (current.startsWith("-")) onChange(current.slice(1));
        else onChange("-" + current);
      };
      return (
        <label className={`block bg-slate-50 border rounded-2xl p-3 ${disabled ? "opacity-50" : "border-slate-200 focus-within:border-brand-400 focus-within:ring-2 focus-within:ring-brand-100"}`}>
          <div className="text-[10px] font-black text-slate-500 mb-1">{label}</div>
          <div className="flex items-center gap-2">
            {allowNegative && (
              <button type="button" disabled={disabled} onClick={flipSign} className="shrink-0 px-3 py-2 rounded-xl bg-white border border-slate-200 text-slate-700 font-black text-sm active:scale-95 disabled:opacity-40">±</button>
            )}
            <input
              disabled={disabled}
              type="text"
              inputMode={allowNegative ? "text" : "decimal"}
              enterKeyHint="done"
              autoComplete="off"
              autoCorrect="off"
              spellCheck={false}
              value={value ?? ""}
              onChange={e => commit(e.target.value)}
              className="w-full bg-transparent text-center font-mono font-black text-lg text-slate-900 min-h-[44px]"
              style={{ fontSize: "16px" }}
            />
            {suffix && <span className="text-xs text-slate-400 font-black">{suffix}</span>}
          </div>
          {allowNegative && <div className="text-[10px] text-slate-400 mt-1 leading-relaxed">三星鍵盤若沒有負號，可先輸入數字再按 ± 切換正負。</div>}
          {hint && <div className="text-[10px] text-slate-400 mt-1 leading-relaxed">{hint}</div>}
        </label>
      );
    };

    const AllocationRow = ({ name, currentPct, targetPct, diff, value, tone="slate" }) => {
      const barTone = tone === "purple" ? "bg-purple-500" : tone === "red" ? "bg-red-500" : tone === "green" ? "bg-emerald-500" : tone === "blue" ? "bg-brand-500" : "bg-slate-500";
      const diffTone = diff > 50 ? "text-red-600" : diff < -50 ? "text-emerald-600" : "text-slate-500";
      return (
        <div className="py-3 border-b border-slate-100 last:border-b-0">
          <div className="flex justify-between gap-3 items-center mb-1">
            <div className="font-black text-sm text-slate-800">{name}</div>
            <div className="font-mono text-xs text-slate-500">現 {pct(currentPct)} → 目標 {pct(targetPct)}</div>
          </div>
          <div className="h-2 bg-slate-100 rounded-full overflow-hidden mb-1">
            <div className={`h-full ${barTone}`} style={{ width: `${Math.max(0, Math.min(100, targetPct))}%` }} />
          </div>
          <div className="flex justify-between text-[11px] font-bold">
            <span className="text-slate-400">市值 ${money(value)}</span>
            <span className={diffTone}>{Math.abs(diff) < 50 ? "不動" : `${diff > 0 ? "買入" : "賣出"} $${money(Math.abs(diff))}`}</span>
          </div>
        </div>
      );
    };

    const ScenarioRow = ({ name, beta, value, pnl, tone="slate" }) => {
      const pnlTone = pnl > 0 ? "text-emerald-600" : pnl < 0 ? "text-red-600" : "text-slate-500";
      const dotTone = tone === "purple" ? "bg-purple-500" : tone === "red" ? "bg-red-500" : tone === "green" ? "bg-emerald-500" : tone === "blue" ? "bg-brand-500" : "bg-slate-400";
      return (
        <div className="flex items-center justify-between gap-3 py-2 border-b border-slate-100 last:border-b-0">
          <div className="min-w-0 flex items-center gap-2">
            <span className={`w-2.5 h-2.5 rounded-full ${dotTone}`} />
            <div className="min-w-0">
              <div className="font-black text-sm text-slate-800 truncate">{name}</div>
              <div className="text-[10px] text-slate-400 font-bold">市值 ${money(value)}｜係數 {Number(beta || 0).toFixed(1)}x</div>
            </div>
          </div>
          <div className={`font-mono text-sm font-black ${pnlTone}`}>{pnl >= 0 ? "+" : "-"}${money(Math.abs(pnl))}</div>
        </div>
      );
    };

    const StressScenarioCard = ({ row, lossLimit }) => {
      const over = lossLimit > 0 && row.pnl < 0 && Math.abs(row.pnl) > lossLimit;
      return (
        <div className={`rounded-3xl border p-3 ${over ? "bg-red-50 border-red-100" : "bg-white border-slate-100"}`}>
          <div className="flex justify-between items-start gap-2 mb-2">
            <div>
              <div className="text-[10px] font-black text-slate-500">QQQ 情境</div>
              <div className="font-mono text-xl font-black text-red-600">{row.movePct}%</div>
            </div>
            <div className={`px-2 py-1 rounded-full text-[10px] font-black ${over ? "bg-red-600 text-white" : "bg-slate-100 text-slate-500"}`}>{over ? "超過承受線" : "承受線內"}</div>
          </div>
          <div className="grid grid-cols-2 gap-2 text-xs">
            <div className="bg-slate-50 rounded-2xl p-2">
              <div className="text-[10px] text-slate-400 font-black">模擬資產</div>
              <div className="font-mono font-black text-slate-900">${money(row.total)}</div>
            </div>
            <div className="bg-slate-50 rounded-2xl p-2 text-right">
              <div className="text-[10px] text-slate-400 font-black">預估損益</div>
              <div className="font-mono font-black text-red-600">-${money(Math.abs(row.pnl))}</div>
            </div>
          </div>
          <div className="mt-2 text-[11px] font-bold text-slate-500">資產變動 {signedPct(row.pct)}</div>
        </div>
      );
    };

    const ActionList = ({ actions, plan=null, dark=false }) => {
      const sourceItems = getArr(plan?.fundingSources);
      const buyItems = getArr(plan?.purchases);
      const targetItems = getArr(plan?.targetSummary);
      const simpleActions = getArr(actions);
      const renderMoneyLine = (item, tone) => (
        <div key={item.name} className="flex items-start justify-between gap-3 py-2 border-b border-slate-100 last:border-b-0">
          <div className="min-w-0">
            <div className="text-sm font-black text-slate-800 leading-snug">{item.label}</div>
            {item.hint && <div className="text-[10px] font-bold text-slate-400 leading-relaxed mt-0.5">{item.hint}</div>}
          </div>
          <div className={`font-mono text-sm font-black shrink-0 ${tone}`}>${money(item.amount)}</div>
        </div>
      );
      if (plan) return (
        <div className="bg-white border border-slate-200 rounded-2xl p-4">
          <div className="flex items-center justify-between gap-3 mb-3">
            <div>
              <div className="text-[11px] font-black text-slate-500 mb-1">今日交易清單</div>
              <div className="text-sm font-black text-slate-900 leading-relaxed">{plan.triggerText}</div>
            </div>
            <Pill tone={plan.tradeNeeded ? "red" : "green"}>{plan.tradeNeeded ? "需交易" : "不動"}</Pill>
          </div>

          {plan.stepText && <div className="mb-3 bg-amber-50 border border-amber-100 rounded-2xl p-3 text-xs font-black text-amber-800 leading-relaxed">{plan.stepText}</div>}

          <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
            <div className="bg-slate-50 border border-slate-100 rounded-2xl p-3">
              <div className="text-[10px] font-black text-slate-500 mb-1">資金來源</div>
              {sourceItems.length ? sourceItems.map(item => renderMoneyLine(item, "text-emerald-600")) : <div className="text-sm font-bold text-slate-400 py-2">沒有需要賣出或動用的部位。</div>}
            </div>
            <div className="bg-slate-50 border border-slate-100 rounded-2xl p-3">
              <div className="text-[10px] font-black text-slate-500 mb-1">買入 / 補回</div>
              {buyItems.length ? buyItems.map(item => renderMoneyLine(item, "text-red-600")) : <div className="text-sm font-bold text-slate-400 py-2">沒有需要買入的部位。</div>}
            </div>
          </div>

          <div className="mt-3 bg-slate-950 rounded-2xl p-3 text-white">
            <div className="text-[10px] font-black text-slate-300 mb-2">執行後目標配置</div>
            <div className="grid grid-cols-4 gap-2 text-center">
              {targetItems.map(item => (
                <div key={item.name} className="bg-white/10 rounded-xl p-2">
                  <div className="text-[10px] font-black text-slate-300">{item.name}</div>
                  <div className="font-mono text-sm font-black">{pct(item.pct)}</div>
                </div>
              ))}
            </div>
          </div>

          <ul className="mt-3 space-y-2">
            {simpleActions.map((a, i) => {
              const isBuy = a.includes("買入") || a.includes("補回");
              const isSell = a.includes("賣出") || a.includes("動用") || a.includes("清空") || a.includes("退回");
              const badge = isBuy ? "買" : isSell ? "源" : "訊";
              const badgeCls = isBuy ? "bg-red-500 text-white" : isSell ? "bg-emerald-500 text-white" : "bg-slate-100 text-slate-500";
              return (
                <li key={i} className="flex gap-2 text-xs font-bold leading-relaxed items-start">
                  <span className={`mt-0.5 shrink-0 w-5 h-5 rounded-full flex items-center justify-center text-[10px] ${badgeCls}`}>{badge}</span>
                  <span className="text-slate-500">{a}</span>
                </li>
              );
            })}
          </ul>
        </div>
      );
      return (
        <div className={`${dark ? "bg-white/10 border-white/10" : "bg-white border-slate-200"} border rounded-2xl p-4`}>
          <div className={`text-[11px] font-black mb-2 ${dark ? "text-slate-400" : "text-slate-500"}`}>今日交易清單</div>
          <ul className="space-y-2">
            {simpleActions.map((a, i) => {
              const isBuy = a.includes("買入");
              const isSell = a.includes("賣出") || a.includes("清空") || a.includes("退回") || a.includes("動用");
              const badge = isBuy ? "買" : isSell ? "賣" : "訊";
              const badgeCls = isBuy ? "bg-red-500 text-white" : isSell ? "bg-emerald-500 text-white" : (dark ? "bg-white/10 text-slate-300" : "bg-slate-100 text-slate-500");
              return (
                <li key={i} className="flex gap-2 text-sm font-black leading-relaxed items-start">
                  <span className={`mt-0.5 shrink-0 w-6 h-6 rounded-full flex items-center justify-center text-[11px] ${badgeCls}`}>{badge}</span>
                  <span className={dark ? "text-white" : "text-slate-800"}>{a}</span>
                </li>
              );
            })}
          </ul>
        </div>
      );
    };

    const AdvancedGroupTitle = ({ title, desc }) => (
      <div className="px-1 pt-1">
        <div className="text-[11px] font-black tracking-widest text-brand-600 uppercase">{title}</div>
        {desc && <div className="text-xs text-slate-500 mt-1 leading-relaxed">{desc}</div>}
      </div>
    );

    const SectionTitle = ({ title, desc, right }) => (
      <div className="flex items-end justify-between gap-3 mb-3">
        <div>
          <h2 className="font-black text-slate-900">{title}</h2>
          {desc && <p className="text-xs text-slate-500 mt-1 leading-relaxed">{desc}</p>}
        </div>
        {right}
      </div>
    );

    // --- 6) Trade-plan text formatter ---
    const formatTradePlanText = (metrics, inputs) => {
      const lineItems = (items) => getArr(items).length
        ? getArr(items).map(x => `- ${x.label}：約 $${money(x.amount)}`).join("\n")
        : "- 無";
      return `【Alpha Horizon Pro ${APP_VERSION}】
日期：${todayStr()}
狀態：${metrics.title}
總資產市值：$${money(metrics.values.total)}
股票等效曝險：$${money(metrics.values.stockEquivalentExposure)}
總曝險槓桿：${metrics.values.totalLeverageRatio.toFixed(2)}x
成長部位槓桿：${metrics.values.growthLeverageRatio.toFixed(2)}x

觸發狀態：
${metrics.actionPlan?.triggerText || metrics.instruction}
${metrics.actionPlan?.stepText ? `\n${metrics.actionPlan.stepText}\n` : ""}
資金來源：
${lineItems(metrics.actionPlan?.fundingSources)}

買入 / 補回：
${lineItems(metrics.actionPlan?.purchases)}

原始指令：
${getArr(metrics.actions).map(x => `- ${x}`).join("\n")}

執行後目標配置：QQQ ${pct(metrics.t.q)} / TQQQ ${pct(metrics.t.tq)} / SPMO ${pct(metrics.t.sm)} / BOXX ${pct(metrics.t.r)}${inputs.satellites_enabled ? ` / 衛星 ${pct(metrics.t.sat)}` : ""}`;
    };

    // --- 7) Main App shell ---
    const App = () => {
      /* -------------------- App state -------------------- */
      const [inputs, setInputs] = useState(() => {
        try {
          const local = localStorage.getItem("ah_core_v5_backup") || localStorage.getItem("ah_local_backup_2026");
          return local ? migrate(JSON.parse(local)) : DEFAULT_INPUTS;
        } catch (e) { return DEFAULT_INPUTS; }
      });
      const [prices, setPrices] = useState({});
      const [lastPriceUpdatedAt, setLastPriceUpdatedAt] = useState(null);
      const [user, setUser] = useState(null);
      const [authError, setAuthError] = useState("");
      const [page, setPage] = useState("home");
      const [message, setMessage] = useState("");
      const [loadingPrices, setLoadingPrices] = useState(false);
      const [syncingHistory, setSyncingHistory] = useState(false);
      const [saving, setSaving] = useState(false);
      const [cloudReady, setCloudReady] = useState(false);
      const [cloudLoaded, setCloudLoaded] = useState(false);
      const saveTimerRef = useRef(null);
      const ignoreSnapshotRef = useRef(false);
      const [collapsed, setCollapsed] = useState(() => {
        try { return JSON.parse(localStorage.getItem("ah_core_v5_collapsed")) || {}; }
        catch (e) { return {}; }
      });
      const toggleCollapse = useCallback((id) => {
        setCollapsed(prev => {
          const next = { ...prev, [id]: !prev[id] };
          try { localStorage.setItem("ah_core_v5_collapsed", JSON.stringify(next)); } catch (e) {}
          return next;
        });
      }, []);

      /* -------------------- UI feedback -------------------- */
      const showToast = useCallback((txt) => {
        setMessage(txt);
        setTimeout(() => setMessage(""), 2600);
      }, []);

      /* -------------------- Cross-device sync / auth -------------------- */
      const refs = useCallback(() => {
        if (!user) return null;
        return { confRef: db.collection("artifacts").doc(appId).collection("users").doc(user.uid).collection("config").doc("current") };
      }, [user]);

      useEffect(() => {
        const init = async () => {
          try {
            if (!auth.currentUser) await auth.signInAnonymously();
          } catch (e) { setAuthError("跨裝置同步初始化異常，請檢查瀏覽器是否封鎖第三方或彈窗。"); }
        };
        const unsub = auth.onAuthStateChanged(usr => {
          if (usr) { setUser(usr); setAuthError(""); }
          else init();
        });
        return () => unsub();
      }, []);

      useEffect(() => {
        const r = refs();
        if (!r) return;
        setCloudLoaded(false);
        const unsub = r.confRef.onSnapshot(snap => {
          if (ignoreSnapshotRef.current) return;
          if (snap.exists) {
            const data = snap.data() || {};
            setInputs(prev => migrate({ ...prev, ...data }));
          }
          setCloudReady(true);
          setCloudLoaded(true);
        }, err => {
          console.error(err);
          setAuthError("跨裝置同步讀取失敗，可能是權限或網路問題。");
          setCloudReady(false);
          setCloudLoaded(true);
        });
        return () => unsub();
      }, [refs]);

      useEffect(() => {
        try { localStorage.setItem("ah_core_v5_backup", JSON.stringify(inputs)); } catch (e) {}
        if (!user || !cloudLoaded) return;
        clearTimeout(saveTimerRef.current);
        saveTimerRef.current = setTimeout(async () => {
          const r = refs();
          if (!r) return;
          try {
            ignoreSnapshotRef.current = true;
            await r.confRef.set(sanitize(inputs), { merge:true });
            setTimeout(() => { ignoreSnapshotRef.current = false; }, 500);
          } catch (e) {
            ignoreSnapshotRef.current = false;
            console.error(e);
            setAuthError("跨裝置自動同步失敗，請稍後再試。");
          }
        }, 1200);
        return () => clearTimeout(saveTimerRef.current);
      }, [inputs, user, cloudLoaded, refs]);

      /* -------------------- Sync actions -------------------- */
      const handleGoogleLogin = async () => {
        try {
          const provider = new firebase.auth.GoogleAuthProvider();
          if (auth.currentUser && auth.currentUser.isAnonymous) {
            try { await auth.currentUser.linkWithPopup(provider); showToast("跨裝置同步已啟用"); }
            catch (e) {
              if (e.code === "auth/credential-already-in-use" && e.credential) {
                await auth.signInWithCredential(e.credential);
                showToast("跨裝置同步已啟用");
              } else if (e.code === "auth/credential-already-in-use") {
                await auth.signInWithPopup(provider);
                showToast("跨裝置同步已啟用");
              } else throw e;
            }
          } else {
            await auth.signInWithPopup(provider);
            showToast("跨裝置同步已啟用");
          }
          setAuthError("");
        } catch (e) {
          console.error(e);
          setAuthError(e.message || "跨裝置同步啟用失敗");
        }
      };

      const handleLogout = async () => {
        try {
          await auth.signOut();
          await auth.signInAnonymously();
          showToast("已關閉跨裝置同步，改為本機模式");
        } catch (e) { setAuthError("登出失敗"); }
      };

      const setField = (key, value) => setInputs(prev => ({ ...prev, [key]: value }));
      const updateArr = (arrKey, id, field, value) => {
        setInputs(prev => ({ ...prev, [arrKey]: getArr(prev[arrKey]).map(x => x.id === id ? { ...x, [field]: value } : x) }));
      };

      const addDropLadderRow = () => {
        setInputs(prev => {
          const rows = getArr(prev.drop_ladder);
          const maxLevel = rows.reduce((m, x) => Math.max(m, getNum(x.drop_pct)), 0);
          return { ...prev, drop_ladder: [...rows, { id:`d${Date.now()}`, drop_pct:maxLevel > 0 ? maxLevel + 5 : 5, move_core_pct:0, use_reserve_pct:0 }] };
        });
      };

      const addBounceLadderRow = () => {
        setInputs(prev => {
          const rows = getArr(prev.bounce_ladder);
          const maxLevel = rows.reduce((m, x) => Math.max(m, getNum(x.bounce_pct)), 0);
          return { ...prev, bounce_ladder: [...rows, { id:`b${Date.now()}`, bounce_pct:maxLevel > 0 ? maxLevel + 10 : 8, sell_pct:25, refill_reserve_pct:getNum(prev.reserve_target_pct) || 15 }] };
        });
      };

      const removeLadderRow = (arrKey, id) => {
        setInputs(prev => {
          const rows = getArr(prev[arrKey]);
          if (rows.length <= 1) return prev;
          return { ...prev, [arrKey]: rows.filter(x => x.id !== id) };
        });
      };

      const cloneRows = (rows) => rows.map(r => ({ ...r }));

      const resetLaddersToDefault = () => {
        setInputs(prev => ({ ...prev, drop_ladder: cloneRows(DEFAULT_DROP_LADDER), bounce_ladder: cloneRows(DEFAULT_BOUNCE_LADDER) }));
        showToast("已套用回撤 / 反彈預設階梯");
      };

      const applyStrategyDefaults = () => {
        setInputs(prev => ({
          ...prev,
          reserve_target_pct: DEFAULT_INPUTS.reserve_target_pct,
          reserve_floor_pct: DEFAULT_INPUTS.reserve_floor_pct,
          core_tqqq_cap_pct: DEFAULT_INPUTS.core_tqqq_cap_pct,
          reserve_tqqq_cap_pct: DEFAULT_INPUTS.reserve_tqqq_cap_pct,
          stop_add_after_drawdown_pct: DEFAULT_INPUTS.stop_add_after_drawdown_pct,
          mania_entry_pct: DEFAULT_INPUTS.mania_entry_pct,
          mania_trailing_stop_pct: DEFAULT_INPUTS.mania_trailing_stop_pct,
          scenario_tqqq_beta: DEFAULT_INPUTS.scenario_tqqq_beta,
          scenario_spmo_beta: DEFAULT_INPUTS.scenario_spmo_beta,
          drop_ladder: cloneRows(DEFAULT_DROP_LADDER),
          bounce_ladder: cloneRows(DEFAULT_BOUNCE_LADDER),
          satellites: getArr(prev.satellites).length ? getArr(prev.satellites).map(s => {
            const base = DEFAULT_SATELLITES.find(d => String(d.underlying).toUpperCase() === String(s.underlying).toUpperCase());
            return base ? { ...s, target_pct: base.target_pct, limit_pct: base.limit_pct, loss_pct: base.loss_pct, scenario_beta: base.scenario_beta } : s;
          }) : cloneRows(DEFAULT_SATELLITES)
        }));
        showToast("已套用策略預設參數");
      };

      /* -------------------- Market data -------------------- */
      const symbols = useMemo(() => {
        const base = ["QQQ", "TQQQ", "SPMO", "BOXX"];
        if (inputs.satellites_enabled) {
          getArr(inputs.satellites).forEach(s => { if (s.underlying) base.push(String(s.underlying).trim().toUpperCase()); });
        }
        return [...new Set(base.filter(Boolean))];
      }, [inputs.satellites_enabled, inputs.satellites]);

      const fetchPrices = useCallback(async () => {
        if (loadingPrices) return;
        setLoadingPrices(true);
        try {
          const jobs = symbols.map(sym => fetch(`https://finnhub.io/api/v1/quote?symbol=${encodeURIComponent(sym)}&token=${FINNHUB_KEY}`).then(r => r.json()).then(d => ({ sym, price:getNum(d.c) })));
          const res = await Promise.allSettled(jobs);
          const patch = {};
          res.forEach(item => {
            if (item.status === "fulfilled" && item.value.price > 0) patch[item.value.sym] = item.value.price;
          });
          if (Object.keys(patch).length) {
            setPrices(prev => ({ ...prev, ...patch }));
            setLastPriceUpdatedAt(new Date());
          }
          else showToast("報價暫時沒有更新");
        } catch (e) {
          console.error(e);
          showToast("報價更新失敗");
        } finally { setLoadingPrices(false); }
      }, [loadingPrices, symbols, showToast]);

      const symbolsKey = useMemo(() => symbols.join(","), [symbols]);
      useEffect(() => { fetchPrices(); }, [symbolsKey]);

      const fetchQQQHistory = useCallback(async (manual = false) => {
        if (syncingHistory || inputs.auto_high_tracking === false) return;
        setSyncingHistory(true);
        try {
          const to = Math.floor(Date.now() / 1000);
          const from = to - 370 * 24 * 60 * 60;
          const res = await fetch(`https://finnhub.io/api/v1/stock/candle?symbol=QQQ&resolution=D&from=${from}&to=${to}&token=${FINNHUB_KEY}`);
          const data = await res.json();
          if (data?.s === "ok" && Array.isArray(data.c) && data.c.length) {
            const closes = data.c.map(Number).filter(v => v > 0);
            const high52w = closes.length ? Math.max(...closes) : 0;
            if (high52w > 0) {
              setInputs(prev => {
                if (prev.auto_high_tracking === false) return prev;
                const q = getNum(prices.QQQ);
                const hasSpmo = getNum(prev.qty_spmo) > 0;
                const cooldown = getNum(prev.mania_cooldown_until_high) > 0;
                const next = { ...prev, qqq_history_high_52w: round2(high52w), qqq_history_sync_date: todayStr() };
                if (!hasSpmo && !cooldown) {
                  next.qqq_locked_ath = round2(high52w);
                  next.qqq_breakout_active = q > high52w;
                  next.qqq_breakout_lock_price = q > high52w ? round2(high52w) : 0;
                } else if (getNum(prev.qqq_locked_ath) <= 0) {
                  next.qqq_locked_ath = round2(high52w);
                }
                if (getNum(prev.qqq_latest_high) <= 0) next.qqq_latest_high = round2(Math.max(high52w, q || 0));
                if (getNum(prev.qqq_wave_low) <= 0 && q > 0) next.qqq_wave_low = round2(q);
                return next;
              });
              if (manual) showToast("已同步 QQQ 52W 收盤高");
            }
          } else if (manual) showToast("52W 同步失敗，保留目前資料");
        } catch (e) {
          console.error(e);
          if (manual) showToast("52W 同步失敗");
        } finally { setSyncingHistory(false); }
      }, [syncingHistory, inputs.auto_high_tracking, prices.QQQ, showToast]);

      useEffect(() => { if (prices.QQQ > 0) fetchQQQHistory(false); }, [prices.QQQ]);

      /* -------------------- Auto high/low tracking -------------------- */
      const firstDropPct = useCallback((ladder) => {
        const xs = getArr(ladder).map(x => getNum(x.drop_pct)).filter(v => v > 0).sort((a,b) => a - b);
        return xs[0] || 7;
      }, []);

      const autoUpdateTracking = useCallback(() => {
        if (inputs.auto_high_tracking === false) return;
        const qBase = getNum(prices.QQQ);
        const qSim = getNum(inputs.sim_qqq_price);
        const q = qSim > 0 ? qSim : qBase;
        const spmo = getNum(prices.SPMO);
        if (q <= 0 && spmo <= 0) return;

        setInputs(prev => {
          if (prev.auto_high_tracking === false) return prev;
          const next = { ...prev };
          let changed = false;
          const write = (key, value) => {
            const normalized = typeof value === "number" ? round2(value) : value;
            if (next[key] !== normalized) { next[key] = normalized; changed = true; }
          };
          const hasSpmo = getNum(prev.qty_spmo) > 0;

          if (q > 0) {
            const oldHigh = getNum(prev.qqq_latest_high);
            const madeNewHigh = oldHigh <= 0 || q >= oldHigh;
            const latestHigh = madeNewHigh ? q : oldHigh;
            write("qqq_latest_high", latestHigh);

            const drop1 = firstDropPct(prev.drop_ladder);
            const currentDD = latestHigh > 0 && q < latestHigh ? ((latestHigh - q) / latestHigh) * 100 : 0;
            const oldLow = getNum(prev.qqq_wave_low);
            let waveLow = oldLow > 0 ? oldLow : q;
            if (madeNewHigh) waveLow = q;
            else if (currentDD + EPS >= drop1) waveLow = oldLow > 0 && oldLow < latestHigh ? Math.min(oldLow, q) : q;
            write("qqq_wave_low", waveLow);

            let locked = getNum(prev.qqq_locked_ath);
            let breakoutActive = prev.qqq_breakout_active === true;
            let breakoutLock = getNum(prev.qqq_breakout_lock_price);
            const high52 = getNum(prev.qqq_history_high_52w);
            if (locked <= 0) locked = high52 || q;
            if (!breakoutActive && locked > 0 && q > locked) {
              breakoutActive = true;
              breakoutLock = locked;
            }
            if (breakoutActive && breakoutLock > 0) locked = breakoutLock;
            const breakoutFailed = breakoutActive && breakoutLock > 0 && !hasSpmo && q < breakoutLock * 0.98;
            if (breakoutFailed) {
              breakoutActive = false;
              breakoutLock = 0;
              locked = high52 || locked;
            }
            write("qqq_locked_ath", locked);
            write("qqq_breakout_active", breakoutActive);
            write("qqq_breakout_lock_price", breakoutLock);

            const stopPct = Math.max(1, getNum(prev.mania_trailing_stop_pct) || 5);
            const spmoHighForStop = getNum(next.spmo_latest_high || prev.spmo_latest_high);
            const maniaStopNow = hasSpmo && spmo > 0 && spmoHighForStop > 0 && spmo <= spmoHighForStop * (1 - stopPct / 100) + 0.01;
            if (maniaStopNow) write("mania_cooldown_until_high", latestHigh);
            const cooldownHigh = getNum(next.mania_cooldown_until_high);
            if (cooldownHigh > 0 && q >= cooldownHigh) write("mania_cooldown_until_high", 0);

            const cooldownNow = getNum(next.mania_cooldown_until_high) > 0 && q < getNum(next.mania_cooldown_until_high);
            const riseFromLocked = locked > 0 ? ((q - locked) / locked) * 100 : 0;
            const maniaEntryPct = Math.max(0, numWithDefault(prev.mania_entry_pct, 15));
            const maniaNow = !cooldownNow && (hasSpmo || riseFromLocked >= maniaEntryPct);
            write("auto_tracking_state", maniaStopNow ? "MANIA_EXIT" : (cooldownNow ? "COOLDOWN" : (maniaNow ? "MANIA" : (currentDD >= drop1 ? "DRAWDOWN" : "BASE"))));
            write("auto_tracking_last_sync", todayStr());
          }

          if (spmo > 0) {
            const oldSpmoHigh = getNum(prev.spmo_latest_high);
            if (hasSpmo) write("spmo_latest_high", oldSpmoHigh > 0 ? Math.max(oldSpmoHigh, spmo) : spmo);
            else if (oldSpmoHigh > 0) write("spmo_latest_high", 0);
          }
          return changed ? next : prev;
        });
      }, [inputs.auto_high_tracking, inputs.sim_qqq_price, prices.QQQ, prices.SPMO, firstDropPct]);

      useEffect(() => { autoUpdateTracking(); }, [autoUpdateTracking]);

      /* -------------------- Strategy engine + scenario simulator -------------------- */
      const metrics = useMemo(() => {
        const pQQQReal = getNum(prices.QQQ);
        const sim = getNum(inputs.sim_qqq_price);
        const pQQQ = sim > 0 ? sim : pQQQReal;
        const pTQQQ = getNum(prices.TQQQ);
        const pSPMO = getNum(prices.SPMO);
        const pBOXX = getNum(prices.BOXX) || 100;
        const vQQQ = getNum(inputs.qty_core_1) * pQQQ;
        const vTQQQ = getNum(inputs.qty_core_2) * pTQQQ;
        const vSPMO = getNum(inputs.qty_spmo) * pSPMO;
        const vBOXX = getNum(inputs.qty_boxx) * pBOXX;
        const cash = getNum(inputs.cash_balance);
        const satellitesEnabled = inputs.satellites_enabled === true;
        const satStats = satellitesEnabled ? getArr(inputs.satellites).map(s => {

        const vSat = satStats.reduce((sum, s) => sum + s.value, 0);

          .filter(l => l.bounce_pct > 0)

        const firstDrop = dropLadderSorted[0]?.drop_pct || firstDropPct(inputs.drop_ladder);

        let state = "BASE";

        else if (maniaHoldActive || maniaEntrySignal) { state = "MANIA"; title = maniaEntrySignal ? "狂熱模式啟動" : "SPMO 狂熱持有中"; tone = "purple"; instruction = "核心部位目標維持 SPMO；未觸發 SPMO 自身回撤退出前，不切回 QQQ / TQQQ。"; }
        else if (inputs.is_bear_meltdown) { state = "MELTDOWN"; title = "熊市熔斷"; tone = "red"; instruction = "停止新增 TQQQ，保留 BOXX，等待熔斷解除。"; }
        else if (cBounce + EPS >= firstBounce && vTQQQ > 50) { state = "BOUNCE"; title = "反彈卸除區"; tone = "green"; instruction = `QQQ 自本輪低點反彈 ${pct(cBounce)}，依反彈階梯卸除 TQQQ。`; }
        else if (cDD + EPS >= firstDrop) { state = "DRAWDOWN"; title = "回撤加碼區"; tone = "red"; instruction = `QQQ 自本輪高點回撤 ${pct(cDD)}，依階梯配置 TQQQ。`; }
        else if (cooldownActive) { state = "COOLDOWN"; title = "狂熱冷卻中"; tone = "amber"; instruction = "維持 QQQ；QQQ 重新突破冷卻解除價前，不重啟 SPMO。"; }
        else if (cRise !== null && cRise >= 0) { state = "BREAKOUT"; title = "突破確認中"; tone = "green"; instruction = `QQQ 高於 Locked ATH ${signedPct(cRise)}，尚未達 +${pct(maniaEntryPct, 0)} 則維持 QQQ。`; }

        let targetReservePct = reservePct;

          tSPMOPct = coreBasePct; tQQQPct = 0; tTQQQPct = 0;
        } else {
          let tqqqFromCore = 0;
          let tqqqFromReserve = 0;
          const stopAddAfter = Math.max(0, getNum(inputs.stop_add_after_drawdown_pct) || 30);
          if (cDD + EPS >= firstDrop && !inputs.is_bear_meltdown) {
            dropLadderSorted.forEach(l => {
              const level = getNum(l.drop_pct);
              const allowedByStop = stopAddAfter <= 0 || level < stopAddAfter;
              if (allowedByStop && cDD + EPS >= level) {
                tqqqFromCore += getNum(l.move_core_pct);
                tqqqFromReserve += getNum(l.use_reserve_pct);
              }
            });
          }
          let bounceSell = 0;
          let highestBounce = 0;
          let bounceReserveTarget = 0;
          if (cBounce > 0) {
            bounceLadderSorted.forEach(l => {
              if (cBounce + EPS >= getNum(l.bounce_pct)) {
                bounceSell += getNum(l.sell_pct);
                highestBounce = Math.max(highestBounce, getNum(l.bounce_pct));
                bounceReserveTarget = Math.max(bounceReserveTarget, getNum(l.refill_reserve_pct));
              }
            });
          }
          bounceSell = Math.min(100, bounceSell);
          const retain = (100 - bounceSell) / 100;
          const coreCapPct = Math.max(0, getNum(inputs.core_tqqq_cap_pct) || 40);

          tqqqFromCore = Math.min(coreCapPct, Math.max(0, tqqqFromCore)) * retain;
          tqqqFromReserve = Math.min(reserveCapPct, Math.max(0, tqqqFromReserve)) * retain;
          const maxReserveUseByFloor = Math.max(0, reservePct - reserveFloorPct);
          tqqqFromReserve = Math.min(tqqqFromReserve, maxReserveUseByFloor);
          targetReservePct = Math.min(reservePct, Math.max(reserveFloorPct, reservePct - tqqqFromReserve, bounceReserveTarget));
          const coreDynamicPct = Math.max(0, 100 - targetReservePct - effectiveSatTargetPct);
          tTQQQPct = Math.min(coreDynamicPct, tqqqFromCore + tqqqFromReserve);
          if (inputs.is_bear_meltdown) tTQQQPct = Math.min(tTQQQPct, (vTQQQ / safeTotal) * 100);

        const fundingSources = [];

        if (diffTQQQ < -50) fundingSources.push(moneyItem("TQQQ", "賣出 TQQQ", diffTQQQ, state === "BOUNCE" ? "反彈卸除，降低槓桿。" : "依目標配置降低 TQQQ。"));
        if (diffSPMO < -50) fundingSources.push(moneyItem("SPMO", "賣出 SPMO", diffSPMO, state === "MANIA_EXIT" ? "SPMO 自身回撤達退出線，先退回 QQQ。" : "依目標配置降低 SPMO。"));

        const targetSummary = [

        } else if (state === "BOUNCE") {

        } else if (state === "MANIA") {
          triggerText = maniaEntrySignal ? `觸發狂熱模式：QQQ 距 Locked ATH ${signedPct(cRise || 0)}，核心轉 SPMO。` : "SPMO 狂熱持有中：尚未觸發自身 -5% 退出。";
        } else if (state === "MELTDOWN") triggerText = "熊市熔斷中：停止新增 TQQQ，只保留必要調整。";
        else if (state === "COOLDOWN") triggerText = "狂熱冷卻中：不重新買回 SPMO，等待 QQQ 重新突破冷卻價。";
        else if (state === "BREAKOUT") triggerText = `突破確認中：高於 Locked ATH，但尚未達 +${pct(maniaEntryPct, 0)} 狂熱轉換門檻。`;
        const actionPlan = { triggerText, stepText, fundingSources, purchases, targetSummary, tradeNeeded: total > 0 && (fundingSources.length > 0 || purchases.length > 0) };

        const rows = [
          { name:"QQQ", currentPct:vQQQ / safeTotal * 100, targetPct:tQQQPct, diff:diffQQQ, value:vQQQ, tone:"blue" },

        ];
