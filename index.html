        // --- 主程式 ---
        const App = () => {
            const [user, setUser] = useState(null);

            const [prices, setPrices] = useState({});

            const [sections, setSections] = useState(() => {

            const [inputs, setInputs] = useState(() => {

                        // 清理舊有的 ma10 並補上 rolls

                                const newSat = { ...s, rolls: s.rolls || 0 };

                                return newSat;

                        return { ...defInputs, ...parsed };
                    }

                } else {

                }

                if (cRise !== null && cRise >= 0 && tDiff > 0 && sDiff === 0) {
                    cAct = `【注意】現價已突破波段高點，禁買 TQQQ`; cCol = "text-fin-warn";
                    tDiff = 0; qDiff = 0; bDiff = 0;
                }

                if (Math.abs(tDiff) < 50) tDiff = 0;
                if (Math.abs(sDiff) < 50) sDiff = 0;
                if (Math.abs(bDiff) < 50) bDiff = 0;
                if (Math.abs(qDiff) < 50) qDiff = 0;

                let pEq = 0;
                let mdd = 0;
                const safeRecords = Array.isArray(records) ? [...records] : [];
                const gData = safeRecords.sort((a,b) => new Date(a.date) - new Date(b.date)).map(r => { 
                    if(r && r.total_equity > pEq) pEq = r.total_equity; 
                    const dd = pEq > 0 ? ((r?.total_equity || 0) - pEq) / pEq * 100 : 0;
                    if (dd < mdd) mdd = dd; 
                    return { date: r?.date, equity: r?.total_equity, dd: dd }; 
                });

                return { 
                    totalCapital: tCap, safeTotal: safeT, satStats: mappedSatStats, graphData: gData, 
                    historicalPeak: pEq, mdd: mdd, growthLeverageRatio: gLev, totalLeverageRatio: tLev,
                    cls: { 
                        c: { u: valCore1, l: valCore2, sm: valSpmo, t: tCore, p: (tCore/safeT)*100 }, 
                        s: { u: vSatU, l: vSatL, c: vSatC, t: (vSatU+vSatL+vSatC), p: ((vSatU+vSatL+vSatC)/safeT)*100 }, 
                        r: { b: vBOXX, c: cash, t: tRes, p: (tRes/safeT)*100 } 
                    },
                    tgt: { r: { p: tgtRPct }, s: { p: satSumPct }, q: { p: tgtQqqPct }, t: { p: tTqqqPct }, sm: { p: tSpmoPct } },
                    core: { 
                        pQQQ, pTQQQ, qAthLocked, qLatestHigh, qWaveLow, cDD, cRise, tTqqqPct, tSpmoPct, phase, cAct, cCol, tDiff, sDiff, qDiff, bDiff, cBounce, diagnosticMsg,
                        dnL: mappedDnLadder, 
                        upL: safeUpLadder.map(s => ({ p: getNum(s.rise_pct), tp: getNum(s.target_pct), sp: getNum(s.spmo_pct), tr: qAthLocked*(1+getNum(s.rise_pct)/100), t: cRise !== null && cRise >= getNum(s.rise_pct) })) 
                    }
                };
            }, [prices, inputs, records]);

            return (
                <div className="pb-32 min-h-screen transition-colors font-bold select-none bg-slate-50 text-slate-800">
                    {message && <div className="fixed top-24 left-1/2 -translate-x-1/2 z-[60] bg-white border border-brand-200 px-6 py-3 rounded-full shadow-lg text-sm flex items-center gap-2 animate-in fade-in slide-in-from-top-4"><Icon name="CheckCircle" className="text-fin-up"/>{message}</div>}
                    {authError && <div className="fixed top-4 inset-x-4 z-[70] bg-red-50 border-l-4 border-red-500 p-4 rounded-lg shadow-lg flex gap-3 animate-in slide-in-from-top-4"><Icon name="AlertCircle" className="text-red-500"/><div className="flex-1"><h4 className="text-red-800 text-sm">提示</h4><p className="text-red-600 text-xs">{authError}</p><button onClick={handleLogout} className="mt-2 text-xs bg-red-100 hover:bg-red-200 text-red-700 px-3 py-1.5 rounded-lg active:scale-95 transition-all">緊急登出</button></div><button onClick={() => setAuthError(null)} className="text-red-400 p-1 self-start"><Icon name="X" size={16}/></button></div>}
                    {isSwitching && !authError && <div className="loading-overlay"><div className="w-10 h-10 border-4 border-slate-600 border-t-white rounded-full animate-spin"/><div className="text-sm">同步中...</div></div>}

                    {modal.type === 'DELETE_RECORD' && <Modal title="刪除紀錄" icon="Trash2" isOpen={true} onClose={() => setModal({type:null})}><p className="text-sm text-slate-600 mb-4">確定刪除此紀錄？</p><button onClick={deleteRecord} className="w-full bg-fin-down text-white py-4 rounded-xl active:scale-95">刪除</button></Modal>}
                    {modal.type === 'EDIT_RECORD' && <Modal title="編輯紀錄" icon="Edit2" isOpen={true} onClose={() => setModal({type:null})}><div className="space-y-4"><div><label className="text-xs text-slate-500 mb-2 block">日期</label><input type="date" className="w-full bg-slate-50 p-4 rounded-xl border font-black outline-none input-focus-ring text-left px-3" defaultValue={modal.data.date?.split('T')[0]} onChange={e => setModal({...modal,temp:{...modal.temp,date:new Date(e.target.value).toISOString()}})} /></div><div><label className="text-xs text-slate-500 mb-2 block">總資產 ($)</label><input type="number" inputMode="decimal" className="w-full bg-slate-50 p-4 rounded-xl border font-mono text-xl text-brand-700 outline-none input-focus-ring text-center" defaultValue={modal.data.total_equity} onChange={e => setModal({...modal,temp:{...modal.temp,equity:e.target.value}})} onFocus={e=>e.target.select()} /></div><button onClick={editRecord} className="w-full bg-brand-600 text-white py-4 rounded-xl active:scale-95">儲存變更</button></div></Modal>}

                    <header className="fixed top-0 inset-x-0 bg-white z-50 px-5 py-3 flex justify-between items-center shadow-sm border-b border-slate-200">
                        <div className="flex items-center gap-2">
                            <div className="w-8 h-8 bg-slate-900 rounded-lg flex items-center justify-center"><span className="text-brand-500 font-black text-lg">A</span></div>
                            <h1 className="text-lg">Alpha Horizon <span className="text-brand-600 text-xs ml-1">V_Final</span></h1>
                        </div>
                        <div className="flex items-center gap-2">
                            <button onClick={() => fetchPrices(true)} className={`p-2 rounded-lg bg-slate-100 text-slate-500 active:scale-95 ${loadingPrices?'animate-spin':''}`}><Icon name="RefreshCcw" size={18}/></button>
                            <button onClick={saveRecord} disabled={isSaving} className="flex items-center gap-1 bg-brand-600 hover:bg-brand-700 text-white px-3 py-2 rounded-lg text-xs font-black active:scale-95 transition-colors shadow-sm">
                                <Icon name="Save" size={14}/> {isSaving ? '儲存中...' : '儲存'}
                            </button>
                        </div>
                    </header>

                    <main className="max-w-md mx-auto p-4 pt-24 space-y-6">
                        {view === 'dashboard' && (
                            <div className="space-y-6 animate-in fade-in">
                                
                                <div className="bg-white rounded-3xl p-6 shadow-sm border border-slate-200">
                                    <div className="text-xs text-slate-500 font-bold mb-1">動態總資產價值 (USD)</div>
                                    <div className="text-5xl font-mono tracking-tight font-black">${metrics.totalCapital.toLocaleString(undefined,{maximumFractionDigits:0})}</div>
                                    
                                    <div className="mt-6 bg-slate-900 text-white p-4 rounded-xl shadow-inner font-mono relative overflow-hidden">
                                        <div className="absolute -right-4 -top-4 opacity-10"><Icon name="Activity" size={80}/></div>
                                        <div className="flex justify-between items-end border-b border-slate-700 pb-3 mb-3 relative z-10">
                                            <span className="text-xs text-brand-400 font-bold">當前 QQQ 報價</span>
                                            <span className="text-2xl font-black">${metrics.core.pQQQ.toFixed(2)}</span>
                                        </div>
                                        <div className="grid grid-cols-3 gap-2 text-center relative z-10">
                                            <div className="bg-slate-800 p-2 rounded-lg border border-slate-700">
                                                <div className="text-slate-400 text-[9px] mb-1">上次波段高點(ATH)</div>
                                                <div className="font-bold text-sm">{metrics.core.qAthLocked > 0 ? `$${metrics.core.qAthLocked}` : '--'}</div>
                                                <div className={`text-[10px] mt-1 ${metrics.core.cRise !== null && metrics.core.cRise >= 0 ? "text-fin-up" : "text-slate-500"}`}>
                                                    突破: {metrics.core.cRise !== null ? (metrics.core.cRise >= 0 ? `+${metrics.core.cRise.toFixed(1)}%` : `${metrics.core.cRise.toFixed(1)}%`) : '--'}
                                                </div>
                                            </div>
                                            <div className="bg-slate-800 p-2 rounded-lg border border-slate-700">
                                                <div className="text-slate-400 text-[9px] mb-1">本次最新高點</div>
                                                <div className="font-bold text-sm">{metrics.core.qLatestHigh > 0 ? `$${metrics.core.qLatestHigh}` : '--'}</div>
                                                <div className={`text-[10px] mt-1 ${metrics.core.cDD !== null && metrics.core.cDD > 0 ? "text-fin-down" : "text-slate-500"}`}>
                                                    回撤: {metrics.core.cDD !== null ? `-${metrics.core.cDD.toFixed(1)}%` : '--'}
                                                </div>
                                            </div>
                                            <div className="bg-slate-800 p-2 rounded-lg border border-slate-700">
                                                <div className="text-slate-400 text-[9px] mb-1">波段反彈低點</div>
                                                <div className="font-bold text-sm">{metrics.core.qWaveLow > 0 ? `$${metrics.core.qWaveLow}` : '--'}</div>
                                                <div className={`text-[10px] mt-1 ${metrics.core.cBounce !== null && metrics.core.cBounce > 0 ? "text-fin-up" : "text-slate-500"}`}>
                                                    反彈: {metrics.core.cBounce !== null ? `+${metrics.core.cBounce.toFixed(1)}%` : '--'}
                                                </div>
                                            </div>
                                        </div>
                                        <div className="mt-3 pt-3 border-t border-slate-700 text-[10px] text-slate-300 relative z-10 flex flex-col gap-1 text-left">
                                            <span className="text-brand-300 font-bold">💡 系統狀態診斷：</span>
                                            <span>{metrics.core.diagnosticMsg}</span>
                                        </div>
                                    </div>
                                </div>

                                {/* 新增：衛星標的即時監控面板 (可收合) */}
                                <CollapsibleCard title="衛星標的即時監控" icon="Activity" isOpen={sections.satMonitor} onToggle={() => toggleSection('satMonitor')}>
                                    <div className="space-y-4">
                                        {metrics.satStats.map(s => {
                                            if (!s.underlying) return null;
                                            
                                            // 判定 LEAPS 條件：必須輸入 200MA，且現價 < 200MA，且從前高回撤超過 20%
                                            const isLeapsTriggered = s.uP > 0 && s.ma200 > 0 && s.uP < s.ma200 && s.peakDD >= 20;
                                            
                                            return (
                                                <div key={s.id} className="bg-slate-900 text-white p-4 rounded-xl shadow-inner font-mono relative overflow-hidden">
                                                    <div className="flex justify-between items-end border-b border-slate-700 pb-3 mb-3 relative z-10">
                                                        <span className="text-xs text-brand-400 font-bold">當前 {s.underlying} 報價</span>
                                                        <span className="text-2xl font-black">{s.uP > 0 ? `$${s.uP.toFixed(2)}` : '--'}</span>
                                                    </div>
                                                    <div className="grid grid-cols-2 gap-2 text-center relative z-10">
                                                        <div className="bg-slate-800 p-2 rounded-lg border border-slate-700">
                                                            <div className="text-slate-400 text-[9px] mb-1">距 200MA ({s.ma200 > 0 ? s.ma200 : '--'})</div>
                                                            <div className={`text-xs font-bold ${s.ma200 > 0 && s.uP < s.ma200 ? 'text-fin-down' : (s.ma200 > 0 ? 'text-fin-up' : 'text-slate-500')}`}>
                                                                {s.ma200 > 0 ? (s.uP < s.ma200 ? '📉 跌破' : '📈 站上') : '--'}
                                                            </div>
                                                        </div>
                                                        <div className="bg-slate-800 p-2 rounded-lg border border-slate-700">
                                                            <div className="text-slate-400 text-[9px] mb-1">距前高 ({s.peak_p > 0 ? s.peak_p : '--'})</div>
                                                            <div className={`text-xs font-bold ${s.peakDD >= 20 ? 'text-fin-down' : 'text-slate-300'}`}>
                                                                {s.peak_p > 0 ? `回撤 -${s.peakDD.toFixed(1)}%` : '--'}
                                                            </div>
                                                        </div>
                                                    </div>
                                                    <div className="mt-3 pt-3 border-t border-slate-700 text-[10px] text-slate-300 relative z-10 text-center flex flex-col gap-1 items-center justify-center min-h-[30px]">
                                                        {isLeapsTriggered ? (
                                                            <span className="text-fin-info font-bold flex items-center justify-center gap-1 text-xs">
                                                                ✅ 條件達成：可將現股轉為 Deep ITM Call
                                                            </span>
                                                        ) : (
                                                            <span className="text-slate-500">未達 LEAPS 啟動條件<br/>(需跌破 200MA 且回撤達 20%)</span>
                                                        )}
                                                    </div>
                                                </div>
                                            );
                                        })}
                                        {metrics.satStats.filter(s => s.underlying).length === 0 && (
                                            <div className="text-center text-xs text-slate-400 py-4">尚未設定衛星標的</div>
                                        )}
                                    </div>
                                </CollapsibleCard>

                                <div className="bg-white rounded-3xl p-6 shadow-sm border border-slate-200">
                                    <div className="text-xs font-black text-slate-700 mb-4 flex items-center gap-1"><Icon name="Activity" size={14} className="text-brand-600"/> 大盤系統觸發雷達 (距目標)</div>
                                    
                                    <div className="mb-4">
                                        <div className="flex justify-between text-[10px] text-slate-500 mb-1">
                                            <span>🟢 QQQ 波段反彈 (看波段低點：目標 +10% / +20%)</span>
                                            <span className={metrics.core.cBounce >= 10 ? 'text-fin-up font-bold' : ''}>{metrics.core.cBounce !== null ? `+${metrics.core.cBounce.toFixed(1)}%` : '--'}</span>
                                        </div>
                                        <div className="w-full bg-slate-100 h-1.5 rounded-full overflow-hidden">
                                            <div className="h-full bg-fin-up transition-all duration-500" style={{width:`${Math.min(100, ((metrics.core.cBounce||0)/20)*100)}%`}}></div>
                                        </div>
                                    </div>

                                    <div className="mb-4">
                                        <div className="flex justify-between text-[10px] text-slate-500 mb-1">
                                            <span>🟣 SPMO 狂熱期啟動 (看上次高點：目標 +14%)</span>
                                            <span className={metrics.core.cRise >= 14 ? 'text-purple-600 font-bold' : ''}>{metrics.core.cRise !== null ? (metrics.core.cRise >= 0 ? `+${metrics.core.cRise.toFixed(1)}%` : '未過高') : '--'}</span>
                                        </div>
                                        <div className="w-full bg-slate-100 h-1.5 rounded-full overflow-hidden">
                                            <div className="h-full bg-purple-500 transition-all duration-500" style={{width:`${Math.min(100, Math.max(0, (metrics.core.cRise||0)/14)*100)}%`}}></div>
                                        </div>
                                    </div>
                                    
                                    <div>
                                        <div className="flex justify-between text-[10px] text-slate-500 mb-1">
                                            <span>🔴 QQQ 回撤加碼階梯 (看最新高點：目標 -35%)</span>
                                            <span className={(metrics.core.cRise === null || metrics.core.cRise < 0) ? 'text-fin-down font-bold' : ''}>{(metrics.core.cRise === null || metrics.core.cRise < 0) ? (metrics.core.cDD !== null ? `-${metrics.core.cDD.toFixed(1)}%` : '--') : '創新高中'}</span>
                                        </div>
                                        <div className="w-full bg-slate-100 h-1.5 rounded-full overflow-hidden">
                                            <div className="h-full bg-fin-down transition-all duration-500" style={{width:`${Math.min(100, ((metrics.core.cDD||0)/35)*100)}%`}}></div>
                                        </div>
                                    </div>
                                </div>

                                <div className="bg-white rounded-3xl p-6 shadow-sm border border-slate-200">
                                    <div className="text-xs font-black text-slate-700 mb-3 flex items-center justify-between">
                                        <span className="flex items-center gap-1"><Icon name="PieChart" size={14} className="text-brand-600"/> 系統目標 vs 實際配比</span>
                                        <span className="text-[9px] text-slate-400 font-normal">落差</span>
                                    </div>
                                    <div className="space-y-1.5">
                                        <AllocRow name="QQQ" actual={(metrics.cls.c.u/metrics.safeTotal*100)} target={metrics.tgt.q.p} color="text-slate-800" />
                                        <AllocRow name="TQQQ" actual={(metrics.cls.c.l/metrics.safeTotal*100)} target={metrics.tgt.t.p} color="text-brand-600" />
                                        <AllocRow name="SPMO" actual={(metrics.cls.c.sm/metrics.safeTotal*100)} target={metrics.tgt.sm.p} color="text-purple-600" />
                                        <AllocRow name="戰備防禦 (BOXX+現)" actual={(metrics.cls.r.t/metrics.safeTotal*100)} target={metrics.tgt.r.p} color="text-fin-warn" />
                                        {metrics.satStats.map(s => s.underlying && (
                                            <AllocRow key={s.id} name={`衛星 ${s.underlying}`} actual={s.cPct} target={s.tPct} color="text-slate-600" />
                                        ))}
                                    </div>
                                </div>

                                <div className="bg-slate-800 p-5 rounded-3xl text-white shadow-heavy border border-slate-700">
                                    <div className="flex justify-between items-center mb-4 border-b border-slate-700 pb-3">
                                        <span className="text-sm font-black text-brand-400 flex items-center gap-2"><Icon name="Zap" size={18}/> 本日操作指令</span>
                                        <div className="flex gap-2">
                                            <span className="text-[10px] bg-slate-700 px-2 py-0.5 rounded text-brand-100 truncate max-w-[120px]">{metrics.core.phase}</span>
                                            <button onClick={copyCommand} className="text-[10px] bg-brand-600 px-2 py-0.5 rounded text-white active:scale-95">複製</button>
                                        </div>
                                    </div>
                                    
                                    <div className="space-y-3">
                                        <div className={`text-center text-sm py-1 font-black ${metrics.core.cCol}`}>{metrics.core.cAct}</div>
                                        
                                        {(metrics.core.tDiff !== 0 || metrics.core.sDiff !== 0 || metrics.core.qDiff !== 0 || metrics.core.bDiff !== 0) && (
                                            <div className="space-y-3 mt-2 pt-3 border-t border-slate-700">
                                                {metrics.core.qDiff !== 0 && (
                                                    <div className="flex justify-between items-center bg-slate-900 p-2.5 rounded-lg border border-slate-700">
                                                        <span className="text-xs text-slate-400">大盤 QQQ</span>
                                                        <span className={`font-mono text-sm ${metrics.core.qDiff > 0 ? 'text-fin-up' : 'text-fin-down'}`}>
                                                            {metrics.core.qDiff > 0 ? '買入' : '賣出'} ${Math.abs(Math.round(metrics.core.qDiff)).toLocaleString()}
                                                        </span>
                                                    </div>
                                                )}
                                                {metrics.core.tDiff !== 0 && (
                                                    <div className="flex justify-between items-center bg-slate-900 p-2.5 rounded-lg border border-slate-700">
                                                        <span className="text-xs text-brand-400">槓桿 TQQQ</span>
                                                        <span className={`font-mono text-sm ${metrics.core.tDiff > 0 ? 'text-fin-up' : 'text-fin-down'}`}>
                                                            {metrics.core.tDiff > 0 ? '買入' : '賣出'} ${Math.abs(Math.round(metrics.core.tDiff)).toLocaleString()}
                                                        </span>
                                                    </div>
                                                )}
                                                {metrics.core.sDiff !== 0 && (
                                                    <div className="flex justify-between items-center bg-slate-900 p-2.5 rounded-lg border border-slate-700">
                                                        <span className="text-xs text-purple-400">動能 SPMO</span>
                                                        <span className={`font-mono text-sm ${metrics.core.sDiff > 0 ? 'text-purple-400' : 'text-red-400'}`}>
                                                            {metrics.core.sDiff > 0 ? '買入' : '賣出'} ${Math.abs(Math.round(metrics.core.sDiff)).toLocaleString()}
                                                        </span>
                                                    </div>
                                                )}
                                                {metrics.core.bDiff !== 0 && (
                                                    <div className="flex justify-between items-center bg-slate-900 p-2.5 rounded-lg border border-slate-700">
                                                        <span className="text-xs text-fin-warn">戰備 BOXX</span>
                                                        <span className={`font-mono text-sm ${metrics.core.bDiff > 0 ? 'text-fin-warn' : 'text-fin-down'}`}>
                                                            {metrics.core.bDiff > 0 ? '買入' : '賣出'} ${Math.abs(Math.round(metrics.core.bDiff)).toLocaleString()}
                                                        </span>
                                                    </div>
                                                )}
                                            </div>
                                        )}

                                        {metrics.satStats.some(s => Math.abs(s.gapVal) > 50) && (
                                            <div className="mt-4 pt-3 border-t border-slate-700 space-y-2">
                                                <div className="text-[10px] text-slate-500 mb-2 flex items-center gap-1">衛星作戰指令</div>
                                                {metrics.satStats.map(s => s.underlying && Math.abs(s.gapVal) > 50 && (
                                                    <div key={s.id} className="flex justify-between items-center bg-slate-900 p-2.5 rounded-lg border border-slate-700">
                                                        <div className="flex flex-col">
                                                            <span className="text-xs text-slate-300">{s.underlying}</span>
                                                            <span className={`text-[9px] ${s.alert ? 'text-red-400' : 'text-slate-500'}`}>{s.alert || s.act}</span>
                                                        </div>
                                                        <span className={`font-mono text-sm ${s.alert ? 'text-red-500' : s.gapVal > 50 ? 'text-fin-up' : 'text-fin-down'}`}>
                                                            {!s.alert && (s.gapVal > 50 ? '買入' : '賣出')} ${Math.abs(Math.round(s.gapVal)).toLocaleString()}
                                                        </span>
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                </div>

                                <CollapsibleCard title="資產數量與市值更新" icon="Package" isOpen={sections.holdings} onToggle={() => toggleSection('holdings')}>
                                    <div className="space-y-4">
                                        <div className="bg-slate-50 p-3 rounded-xl border focus-within:border-brand-400 transition-colors">
                                            <div className="flex justify-between items-center mb-2 border-b border-slate-200 pb-2">
                                                <span className="text-xs font-black text-slate-700">大盤核心 (QQQ)</span>
                                            </div>
                                            <div>
                                                <label className="text-[9px] text-slate-500 block mb-1">QQQ 股數</label>
                                                <input type="number" inputMode="decimal" value={inputs.qty_core_1} onChange={e=>handleInput('qty_core_1',e.target.value)} onFocus={e=>e.target.select()} className="w-full font-mono text-xl outline-none bg-white p-2 rounded-lg border shadow-sm text-center"/>
                                            </div>
                                        </div>

                                        <div className="bg-slate-50 p-3 rounded-xl border focus-within:border-brand-400 transition-colors">
                                            <div className="flex justify-between items-center mb-2 border-b border-slate-200 pb-2">
                                                <span className="text-xs font-black text-slate-700">核心槓桿 (TQQQ)</span>
                                            </div>
                                            <div>
                                                <label className="text-[9px] text-slate-500 block mb-1">TQQQ 股數</label>
                                                <input type="number" inputMode="decimal" value={inputs.qty_core_2} onChange={e=>handleInput('qty_core_2',e.target.value)} onFocus={e=>e.target.select()} className="w-full font-mono text-xl outline-none bg-white p-2 rounded-lg border shadow-sm text-center"/>
                                            </div>
                                        </div>

                                        <div className="bg-purple-50 p-3 rounded-xl border border-purple-200 focus-within:border-purple-400 transition-colors">

                                                            <span className="text-brand-600 font-mono font-black">${(r.total_equity||0).toLocaleString()}</span>
                                                            <div className="flex gap-1">
                                                                <button onClick={()=>setModal({type:'EDIT_RECORD', data:r, temp:{}})} className="text-slate-400 hover:text-brand-600 p-1"><Icon name="Edit2" size={14}/></button>
                                                                <button onClick={()=>setModal({type:'DELETE_RECORD', data:r})} className="text-slate-400 hover:text-fin-down p-1"><Icon name="Trash2" size={14}/></button>
                                                            </div>
                                                        </div>
                                                    </div>
                                                    <div className="grid grid-cols-5 gap-1 text-center font-mono text-[9px]">
                                                        <div className="bg-white p-1 rounded border"><div className="text-[7px] text-slate-400">QQQ</div>{r.inputs?.qty_core_1||0}</div>
                                                        <div className="bg-white p-1 rounded border"><div className="text-[7px] text-slate-400">TQQQ</div>{r.inputs?.qty_core_2||0}</div>
                                                        <div className="bg-purple-50 text-purple-700 p-1 rounded border border-purple-200"><div className="text-[7px] text-purple-400">SPMO</div>{r.inputs?.qty_spmo||0}</div>
                                                        <div className="bg-slate-800 text-brand-100 p-1 rounded border border-slate-700"><div className="text-[7px] text-slate-400">BOXX</div>{r.inputs?.qty_boxx||0}</div>
                                                        <div className="bg-white p-1 rounded border"><div className="text-[7px] text-slate-400">現金</div>{Math.round(r.inputs?.cash_balance||0)}</div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}
                    </main>

                    <nav className="fixed bottom-0 inset-x-0 bg-white border-t z-50 py-2 pb-6 flex justify-around shadow-lg">
                        {[{id:'dashboard',icon:'LayoutDashboard',l:'主控台'},{id:'settings',icon:'Settings',l:'參數設定'},{id:'history',icon:'TrendingUp',l:'戰報'}].map(t => (
                            <button key={t.id} onClick={()=>setView(t.id)} className={`flex flex-col items-center gap-1 flex-1 pt-1 transition-all ${view===t.id?'text-brand-600 -translate-y-1':'text-slate-400'}`}>
                                <Icon name={t.icon} size={22}/>
                                <span className="text-[10px] font-black">{t.l}</span>
                                {view===t.id && <div className="w-1 h-1 bg-brand-600 rounded-full mt-0.5"></div>}
                            </button>
                        ))}
                    </nav>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
