                                                        <div className="flex gap-1 items-center mb-1">
                                                            <div className="flex-1 bg-slate-50 border rounded flex items-center px-1">
                                                                <span className="text-[8px] text-slate-400">跌</span>
                                                                <input type="number" inputMode="decimal" value={l.drop_pct} onChange={e=>updateArr('core_ladder', l.id, 'drop_pct', e.target.value)} onFocus={e=>e.target.select()} className="w-full py-1 px-0.5 bg-transparent font-mono text-[12px] outline-none text-center min-w-0"/>%
                                                            </div>
                                                            <div className="flex-1 bg-brand-50 border border-brand-100 rounded flex items-center px-1">
                                                                <span className="text-[8px] text-brand-400 whitespace-nowrap">轉TQQQ</span>
                                                                <input type="number" inputMode="decimal" value={l.move_pct} onChange={e=>updateArr('core_ladder', l.id, 'move_pct', e.target.value)} onFocus={e=>e.target.select()} className="w-full py-1 px-0.5 bg-transparent text-brand-700 font-mono text-[12px] outline-none text-center min-w-0"/>%
                                                            </div>
                                                            <div className="flex-1 bg-fin-warn/10 border border-fin-warn/20 rounded flex items-center px-1">
                                                                <span className="text-[8px] text-fin-warn whitespace-nowrap">用BOXX</span>
                                                                <input type="number" inputMode="decimal" value={l.use_boxx !== undefined ? l.use_boxx : 0} onChange={e=>updateArr('core_ladder', l.id, 'use_boxx', e.target.value)} onFocus={e=>e.target.select()} className="w-full py-1 px-0.5 bg-transparent text-fin-warn font-mono text-[12px] outline-none text-center min-w-0"/>%
                                                            </div>
                                                            <button onClick={()=>removeArr('core_ladder',l.id)} className="p-1 text-slate-400 hover:text-red-500"><Icon name="X" size={14}/></button>
                                                        </div>
                                                        <div className="text-[9px] text-slate-500 pl-1 font-mono">
                                                            ↳ 觸發價: QQQ 跌破 <span className="font-bold text-fin-down">${trigPrice}</span>
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                            <button onClick={()=>addArr('core_ladder', {drop_pct:0, move_pct:0, use_boxx:0})} className="w-full py-2 mt-1 border-dashed border-2 rounded-lg text-xs text-slate-500 active:scale-95">+ 新增階梯</button>
                                        </div>

                                        <div className="pt-4 border-t text-left">
                                            <label className="text-[10px] text-brand-600 font-bold mb-1 block">反彈卸除階梯 (TQQQ ➜ QQQ)</label>
                                            <div className="text-[8px] text-slate-400 mb-2">📌 系統將依此階梯：<span className="font-bold text-slate-600">賣出設定比例之 TQQQ 轉回 QQQ (滿 100% 即清倉)</span></div>
                                            {[...getArr(inputs.core_bounce_ladder)].sort((a,b)=>getNum(a.bounce_pct)-getNum(b.bounce_pct)).map((l,i) => {
                                                const trigPrice = (getNum(inputs.qqq_wave_low) * (1 + getNum(l.bounce_pct)/100)).toFixed(2);
                                                return (
                                                    <div key={l.id} className="mb-3">
                                                        <div className="flex gap-1 items-center mb-1">
                                                            <div className="flex-1 bg-slate-50 border rounded flex items-center px-1">
                                                                <span className="text-[8px] text-slate-400">彈</span>
                                                                <input type="number" inputMode="decimal" value={l.bounce_pct} onChange={e=>updateArr('core_bounce_ladder', l.id, 'bounce_pct', e.target.value)} onFocus={e=>e.target.select()} className="w-full py-1 px-0.5 bg-transparent font-mono text-[12px] outline-none text-center min-w-0"/>%
                                                            </div>
                                                            <div className="flex-1 bg-fin-up/10 border border-fin-up/20 rounded flex items-center px-1">
                                                                <span className="text-[8px] text-fin-up whitespace-nowrap">賣出 TQQQ</span>
                                                                <input type="number" inputMode="decimal" value={l.sell_pct} onChange={e=>updateArr('core_bounce_ladder', l.id, 'sell_pct', e.target.value)} onFocus={e=>e.target.select()} className="w-full py-1 px-0.5 bg-transparent text-fin-up font-mono text-[12px] outline-none text-center min-w-0"/>%
                                                            </div>
                                                            <button onClick={()=>removeArr('core_bounce_ladder',l.id)} className="p-1 text-slate-400 hover:text-red-500"><Icon name="X" size={14}/></button>
                                                        </div>
                                                        <div className="text-[9px] text-slate-500 pl-1 font-mono">
                                                            ↳ 觸發價: QQQ 站上 <span className="font-bold text-fin-up">${trigPrice}</span>
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                            <button onClick={()=>addArr('core_bounce_ladder', {bounce_pct:0, sell_pct:0})} className="w-full py-2 mt-1 border-dashed border-2 rounded-lg text-xs text-slate-500 active:scale-95">+ 新增階梯</button>
                                        </div>
                                        
                                        <div className="pt-4 border-t text-left">
                                            <label className="text-[10px] text-brand-600 font-bold mb-1 block">突破收割階梯 (TQQQ/SPMO 目標保留%)</label>
                                            <div className="text-[8px] text-slate-400 mb-2">📌 系統將依此階梯：<span className="font-bold text-slate-600">將核心部位 ➜ 轉為 SPMO</span></div>
                                            {[...getArr(inputs.core_up_ladder)].sort((a,b)=>getNum(a.rise_pct)-getNum(b.rise_pct)).map((l,i) => {
                                                const trigPrice = (getNum(inputs.qqq_locked_ath) * (1 + getNum(l.rise_pct)/100)).toFixed(2);
                                                return (
                                                    <div key={l.id} className="mb-3">
                                                        <div className="flex gap-1 items-center mb-1">
                                                            <div className="flex-1 bg-slate-50 border rounded flex items-center px-1">
                                                                <span className="text-xs text-brand-500">+</span>
                                                                <input type="number" inputMode="decimal" value={l.rise_pct} onChange={e=>updateArr('core_up_ladder', l.id, 'rise_pct', e.target.value)} onFocus={e=>e.target.select()} className="w-full py-1 px-0.5 bg-transparent font-mono text-[12px] outline-none text-center min-w-0"/>%
                                                            </div>
                                                            <Icon name="ChevronDown" size={14} className="-rotate-90 text-slate-300"/>
                                                            <div className="flex-[1.5] flex gap-1">
                                                                <div className="flex-1 bg-fin-up/10 border border-fin-up/20 rounded flex items-center px-1 hidden">
                                                                    <input type="number" inputMode="decimal" value={l.target_pct} onChange={e=>updateArr('core_up_ladder', l.id, 'target_pct', e.target.value)} onFocus={e=>e.target.select()} className="w-full"/>
                                                                </div>
                                                                <div className="flex-1 bg-purple-50 border border-purple-200 rounded flex items-center px-1">
                                                                    <span className="text-[8px] text-purple-600 whitespace-nowrap pr-1">轉 SPMO</span>
                                                                    <input type="number" inputMode="decimal" value={l.spmo_pct || 0} onChange={e=>updateArr('core_up_ladder', l.id, 'spmo_pct', e.target.value)} onFocus={e=>e.target.select()} className="w-full py-1 px-0.5 bg-transparent text-purple-700 font-mono text-[12px] outline-none text-center min-w-0"/>%
                                                                </div>
                                                            </div>
                                                            <button onClick={()=>removeArr('core_up_ladder',l.id)} className="p-1 text-slate-400 hover:text-red-500"><Icon name="X" size={14}/></button>
                                                        </div>
                                                        <div className="text-[9px] text-slate-500 pl-1 font-mono">
                                                            ↳ 觸發價: QQQ 突破 <span className="font-bold text-purple-600">${trigPrice}</span>
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                            <button onClick={()=>addArr('core_up_ladder', {rise_pct:0, target_pct:0, spmo_pct:0})} className="w-full py-2 mt-1 border-dashed border-2 rounded-lg text-xs text-slate-500 active:scale-95">+ 新增階梯</button>
                                        </div>
                                    </div>
                                </div>

                                <div className="bg-white rounded-3xl p-6 border border-slate-200 text-left">
                                    <div className="flex justify-between mb-4 border-b pb-2"><h2 className="font-black flex items-center gap-2"><Icon name="Activity" size={18} className="text-fin-info"/>衛星標的設定</h2></div>
                                    
                                    <div className="text-[9px] text-slate-500 mb-4 bg-slate-50 p-2.5 rounded-lg border border-slate-200 leading-relaxed">
                                        💡 <span className="font-bold text-slate-700">衛星動態再平衡指南：</span><br/>
                                        • 跌破均價達 [補倉-%] ➜ <span className="text-fin-down font-bold">賣 BOXX 買入現股，精準補回 [權重%]</span><br/>
                                        • 權重膨脹達 [上限%] ➜ <span className="text-fin-up font-bold">賣出超額現股，壓縮回 [權重%]</span>
                                    </div>

                                    <div className="space-y-4">
                                        {getArr(inputs.satellites).map(s => (
                                            <div key={s.id} className="bg-slate-50 p-3 rounded-xl border relative">
                                                <button onClick={()=>removeArr('satellites', s.id)} className="absolute top-2 right-2 text-slate-400 hover:text-fin-down active:scale-95"><Icon name="Trash2" size={14}/></button>
                                                
                                                <div className="flex gap-2 mb-2 pr-6">
                                                    <input value={s.underlying} onChange={e=>updateArr('satellites',s.id,'underlying',e.target.value.toUpperCase().trim())} className="w-24 bg-white text-xs p-1.5 rounded border font-black uppercase outline-none text-center" placeholder="正股"/>
                                                </div>

                                                <div className="grid grid-cols-4 gap-1 mb-2 bg-white p-1 rounded border">
                                                    <div className="text-center flex flex-col items-center">
                                                        <label className="text-[8px] text-slate-400">前高</label>
                                                        <input type="number" inputMode="decimal" value={s.peak_p} onChange={e=>updateArr('satellites',s.id,'peak_p',e.target.value)} onFocus={e=>e.target.select()} className="w-full font-mono text-[11px] bg-transparent outline-none text-center min-w-0"/>
                                                    </div>
                                                    <div className="text-center border-l flex flex-col items-center">
                                                        <label className="text-[8px] text-slate-400">建倉均價</label>
                                                        <input type="number" inputMode="decimal" value={s.avg_cost} onChange={e=>updateArr('satellites',s.id,'avg_cost',e.target.value)} onFocus={e=>e.target.select()} className="w-full font-mono text-[11px] bg-transparent outline-none text-center min-w-0"/>
                                                    </div>
                                                    <div className="text-center border-l flex flex-col items-center">
                                                        <label className="text-[8px] text-slate-400">補倉次</label>
                                                        <input type="number" inputMode="decimal" value={s.rescues} onChange={e=>updateArr('satellites',s.id,'rescues',e.target.value)} onFocus={e=>e.target.select()} className="w-full font-mono text-[11px] bg-transparent outline-none text-center min-w-0"/>
                                                    </div>
                                                </div>

                                                <div className="grid grid-cols-3 gap-1 bg-white p-1 rounded border">
                                                    <div className="text-center flex flex-col items-center">
                                                        <label className="text-[8px] text-brand-600">權重%</label>
                                                        <input type="number" inputMode="decimal" value={s.target_pct} onChange={e=>updateArr('satellites',s.id,'target_pct',e.target.value)} onFocus={e=>e.target.select()} className="w-full font-mono text-[11px] bg-transparent outline-none text-center min-w-0"/>
                                                    </div>
                                                    <div className="text-center border-l flex flex-col items-center">
                                                        <label className="text-[8px] text-fin-up">上限%</label>
                                                        <input type="number" inputMode="decimal" value={s.limit_pct} onChange={e=>updateArr('satellites',s.id,'limit_pct',e.target.value)} onFocus={e=>e.target.select()} className="w-full font-mono text-[11px] bg-transparent outline-none text-center min-w-0"/>
                                                    </div>
                                                    <div className="text-center border-l flex flex-col items-center">
                                                        <label className="text-[8px] text-fin-down">補倉-%</label>
                                                        <input type="number" inputMode="decimal" value={s.loss_pct} onChange={e=>updateArr('satellites',s.id,'loss_pct',e.target.value)} onFocus={e=>e.target.select()} className="w-full font-mono text-[11px] bg-transparent outline-none text-center min-w-0"/>
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                        <button onClick={()=>addArr('satellites', { underlying:'', qty_u:0, peak_p:0, avg_cost:0, target_pct:5, limit_pct:10, loss_pct:14, rescues:0 })} className="w-full py-3 border-dashed border-2 rounded-xl text-slate-500 text-sm active:scale-95">+ 新增衛星</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* =========================================
                            戰報 History
                           ========================================= */}
                        {view === 'history' && (
                            <div className="space-y-6 animate-in fade-in">
                                {hasCharts && metrics.graphData && metrics.graphData.length > 0 && (
                                    <div className="grid grid-cols-2 gap-3">
                                        <div className="bg-white rounded-3xl p-4 shadow-sm border border-slate-200">
                                            <div className="text-[10px] text-slate-400 mb-1 font-bold">歷史最高資產 (ATH)</div>
                                            <div className="text-lg font-mono font-black text-slate-800">
                                                ${metrics.historicalPeak.toLocaleString(undefined,{maximumFractionDigits:0})}
                                            </div>
                                        </div>
                                        <div className="bg-white rounded-3xl p-4 shadow-sm border border-red-100 bg-red-50/30">
                                            <div className="text-[10px] text-red-400 mb-1 font-bold">最大回撤 (MDD)</div>
                                            <div className="text-lg font-mono font-black text-fin-down">
                                                {metrics.mdd?.toFixed(1)}%
                                            </div>
                                        </div>
                                    </div>
                                )}

                                <div className="bg-white rounded-3xl p-5 shadow-sm border h-[300px]">
                                    <div className="text-xs font-black text-slate-700 mb-2 flex items-center gap-1"><Icon name="TrendingUp" size={14} className="text-brand-600"/> 資產歷史走勢</div>
                                    {hasCharts && metrics.graphData && metrics.graphData.length > 0 ? (
                                        <ResponsiveContainer width="100%" height="85%">
                                            <ComposedChart data={metrics.graphData} margin={{top:5,right:0,left:-20,bottom:0}}>
                                                <defs>
                                                    <linearGradient id="cEq" x1="0" y1="0" x2="0" y2="1"><stop offset="5%" stopColor="#3b82f6" stopOpacity={0.4}/><stop offset="95%" stopColor="#3b82f6" stopOpacity={0}/></linearGradient>
                                                    <linearGradient id="cDD" x1="0" y1="0" x2="0" y2="1"><stop offset="5%" stopColor="#ef4444" stopOpacity={0.15}/><stop offset="95%" stopColor="#ef4444" stopOpacity={0}/></linearGradient>
                                                </defs>
                                                <XAxis dataKey="date" tickFormatter={v=>new Date(v).toLocaleDateString(undefined,{month:'numeric',day:'numeric'})} tick={{fontSize:10, fill:'#94a3b8'}} axisLine={false} tickLine={false}/>
                                                <YAxis yAxisId="left" tickFormatter={v=>`${Number(v/1000 || 0).toFixed(0)}k`} tick={{fontSize:10, fill:'#64748b'}} axisLine={false} tickLine={false}/>
                                                <YAxis yAxisId="right" orientation="right" tickFormatter={v=>`${Number(v || 0).toFixed(0)}%`} tick={{fontSize:10, fill:'#ef4444'}} domain={['auto', 0]} axisLine={false} tickLine={false}/>
                                                <Tooltip content={<CustomTooltip/>} cursor={{ stroke:'#cbd5e1', strokeDasharray:'3 3' }}/>
                                                <Area yAxisId="left" type="stepAfter" dataKey="equity" stroke="#3b82f6" strokeWidth={2} fill="url(#cEq)" name="總資產"/>
                                                <Area yAxisId="right" type="monotone" dataKey="dd" stroke="none" fill="url(#cDD)" name="大盤跌幅"/>
                                            </ComposedChart>
                                        </ResponsiveContainer>
                                    ) : <div className="h-full flex items-center justify-center text-slate-400 text-xs border border-dashed rounded-xl">尚無歷史戰報</div>}
                                </div>
                                <div className="bg-white rounded-3xl shadow-sm border p-4">
                                    <h3 className="text-sm font-black mb-3 border-b pb-2 flex items-center gap-1"><Icon name="FileText" size={14}/> 歷史紀錄</h3>
                                    {!getArr(records).length ? (
                                        <div className="text-center text-xs text-slate-400 py-6">尚無紀錄</div>
                                    ) : (
                                        <div className="space-y-3 max-h-[500px] overflow-y-auto">
                                            {[...getArr(records)].sort((a,b)=>new Date(b.date)-new Date(a.date)).map(r => (
                                                <div key={r.id} className="bg-slate-50 p-3 rounded-xl border border-slate-100">
                                                    <div className="flex justify-between items-center border-b pb-2 mb-2">
                                                        <span className="text-[10px] font-mono bg-white px-2 py-0.5 rounded border">{new Date(r.date).toLocaleDateString()}</span>
                                                        <div className="flex items-center gap-3">
                                                            <span className="text-brand-600 font-mono font-black">${(r.total_equity||0).toLocaleString()}</span>
                                                            <div className="flex gap-1">
                                                                <button onClick={()=>setModal({type:'EDIT_RECORD', data:r, temp:{}})} className="text-slate-400 hover:text-brand-600 p-1"><Icon name="Edit2" size={14}/></button>
                                                                <button onClick={()=>setModal({type:'DELETE_RECORD', data:r})} className="text-slate-400 hover:text-fin-down p-1"><Icon name="Trash2" size={14}/></button>
                                                            </div>
                                                        </div>
                                                    </div>
                                                    <div className="grid grid-cols-5 gap-1 text-center font-mono text-[9px]">
                                                        <div className="bg-white p-1 rounded border"><div className="text-[7px] text-slate-400">QQQ</div>{r.inputs?.qty_core_1||0}</div>
                                                        <div className="bg-white p-1 rounded border"><div className="text-[7px] text-slate-400">TQQQ</div>{r.inputs?.qty_core_2||0}</div>
                                                        <div className="bg-purple-50 text-purple-700 p-1 rounded border border-purple-200"><div className="text-[7px] text-purple-400">SPMO</div>{r.inputs?.qty_spmo||0}</div>
                                                        <div className="bg-slate-800 text-brand-100 p-1 rounded border border-slate-700"><div className="text-[7px] text-slate-400">BOXX</div>{r.inputs?.qty_boxx||0}</div>
                                                        <div className="bg-white p-1 rounded border"><div className="text-[7px] text-slate-400">現金</div>{Math.round(r.inputs?.cash_balance||0)}</div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}
                    </main>

                    <nav className="fixed bottom-0 inset-x-0 bg-white border-t z-50 py-2 pb-6 flex justify-around shadow-lg">
                        {[{id:'dashboard',icon:'LayoutDashboard',l:'主控台'},{id:'settings',icon:'Settings',l:'參數設定'},{id:'history',icon:'TrendingUp',l:'戰報'}].map(t => (
                            <button key={t.id} onClick={()=>setView(t.id)} className={`flex flex-col items-center gap-1 flex-1 pt-1 transition-all ${view===t.id?'text-brand-600 -translate-y-1':'text-slate-400'}`}>
                                <Icon name={t.icon} size={22}/>
                                <span className="text-[10px] font-black">{t.l}</span>
                                {view===t.id && <div className="w-1 h-1 bg-brand-600 rounded-full mt-0.5"></div>}
                            </button>
                        ))}
                    </nav>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<ErrorBoundary><App /></ErrorBoundary>);
    </script>
</body>
</html>
